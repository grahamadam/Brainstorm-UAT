## Module brief

This is the trickiest module in the course, and it's worth being upfront about why. The first two modules dealt with what AI is and how we got here. Both of those have factual answers. This module is about where it's going, which doesn't. Predictions about AI have a long track record of being either wildly overoptimistic or wildly underestimated, and people in the field have been wrong in both directions plenty of times.

So this module isn't going to give you predictions. It's going to give you something more useful: a working framework for thinking about the trajectory honestly, the trends that are most likely to keep going, and the signals worth watching as the technology evolves. The goal is for you to leave this module with calibrated bearings, not a roadmap.

We'll lean heavily on what Anthropic and other credible sources have actually published, because those are arguments you can engage with rather than assertions to take on faith. Where we venture into interpretation, we'll mark it as such. You should feel free to disagree with anything in this module, because confident certainty about AI's future is itself a kind of red flag.

The honest stance for an L2 user in 2026 is: I have a working sense of where this is going, I'm watching specific signals to update my view, and I'm comfortable holding the uncertainty without it paralyzing me.

## Learning objectives

By the end of this module you should be able to:

1. Distinguish, in your own thinking, between what we can reasonably project from current trends and what's genuinely speculative.
2. Name the trends that are real and likely to continue, and why.
3. Articulate what's most likely to change for knowledge work over the next two to three years.
4. Build a personal practice of watching specific signals so you can stay oriented as the technology evolves.

---

## Lesson 1: How to think about AI predictions

Before we talk about what's coming, we need a way to think about *thinking about* what's coming. AI is a domain where confidence is cheap and accuracy is hard, and that combination produces a lot of bad predictions. The first move at L2 is recognizing this and developing a more disciplined way to engage with forecasts.

A useful frame: any claim about AI's future falls somewhere on a spectrum from "extrapolating from solid trends" to "pure speculation." Both ends of that spectrum exist in the public conversation, often presented with the same level of confidence, which is part of what makes the discourse so confusing.

Here's how the spectrum looks in practice:

**Reasonable extrapolation.** "Models will continue to get better at coding tasks over the next year." This is well-grounded. The trend is real, the data shows it's continuing, and the underlying drivers (scaling, better training, better tooling) are all progressing. You can plan around predictions like this.

**Plausible projection.** "Within two years, AI will be able to handle most routine knowledge work tasks at a quality level useful in professional contexts." This is reasonable but uncertain. It depends on continued capability gains, on adoption keeping pace, and on the integration challenges being solved. Not crazy, but not bankable.

**Speculation.** "AI will replace most knowledge workers within five years." This is in territory where confident claims are more about the speaker's worldview than about evidence. The honest answer to "how many knowledge workers will be replaced by AI in five years" is "we don't know, and the people who tell you they do know are usually selling something."

**Pure conjecture.** "AI will achieve consciousness within a decade." There's no rigorous basis for forecasts like this in either direction. They're worth ignoring, full stop.

When you read AI predictions in the wild, learn to silently sort them onto this spectrum. The further out a prediction goes, the higher the confidence interval around it should be. When you see someone making a five-year forecast with the same certainty as a six-month forecast, that's a signal that something is off in their epistemics.

This isn't about being skeptical for skepticism's sake. It's about being able to update at the right pace. People who hold confident predictions firmly tend to either ignore evidence that contradicts them or flip dramatically when reality outpaces their model. People who hold their views with appropriate uncertainty can update smoothly as new data arrives. The L2 move is the second one.

> **Try this (3 minutes).** Find a recent article about AI's future (search "AI predictions 2026" or similar). Read the first three predictions in it. For each one, silently sort it onto the spectrum above: reasonable extrapolation, plausible projection, speculation, or pure conjecture. Notice if the article's tone matches the actual epistemic strength of the claims. Most articles don't make this distinction, which is part of why the discourse is so noisy.

---

## Lesson 2: The trends that are real

With the epistemics in place, we can actually look at what's happening. There are at least four trends that are well-documented enough to project forward with reasonable confidence.

### Capability gains are continuing

The simplest and most important trend is that AI models are continuing to get more capable. Anthropic's CEO Dario Amodei has written that, behind the volatility of public sentiment, there has been a smooth and unyielding increase in cognitive capability since the field's modern era began. Every few months public discourse swings between "AI is hitting a wall" and "AI is about to change everything," but the underlying capability curve has been remarkably steady.

The practical implication is that the model you're using today is probably not the best one you'll use in six months. Capabilities that feel novel right now are likely to feel ordinary by the end of this year. This is why the principle-based learning philosophy in M01 matters: skills tied to specific tool capabilities will go stale, but skills tied to how to work with AI will keep paying off.

### Adoption is broadening, not narrowing

The other major trend is that AI is moving from niche tool to general infrastructure. Anthropic's Economic Index, which tracks usage patterns across the economy, shows that as of early 2026 about 49% of jobs have seen at least a quarter of their tasks performed using Claude. That figure has grown steadily across multiple reports. The data also shows usage diversifying. The top 10 tasks accounted for 19% of conversations in February 2026, down from 24% in November 2025. People are using AI for more things, not just more of the same things.

This pattern has direct implications. If 49% of jobs are seeing meaningful AI use today and the trend is broadening, it's reasonable to project that within 12 to 18 months, "uses AI in their work" will go from being notable to being the default among knowledge workers. That's not a wild prediction. It's an extrapolation of a trend that's already well underway.

### The user experience gap is widening

This is one of the most under-appreciated patterns in the data, and it matters specifically for you as a learner. Anthropic's research has found that more experienced AI users have measurably higher success rates than newcomers, and that the gap is showing up in observable behaviors. Experienced users iterate and refine; newcomers tend to use AI in a single-shot, directive way. Experienced users treat AI as a thinking partner; newcomers treat it as a vending machine.

The implication is that fluency itself is becoming an asset. The gap between people who know how to use these tools well and people who don't isn't theoretical. It's measurable, and it's growing. This is a major part of why Brainstorm exists. The L2 transition isn't just a personal milestone. It's the beginning of being on the right side of a widening gap.

### The work is shifting toward augmentation, not automation

There's a common assumption that AI's main effect on work will be automation: AI takes over a task, and the human is no longer needed for it. The data shows something more nuanced. As of early 2026, the majority of professional AI use is *augmentative*, meaning AI is collaborating with the user to produce better work, faster, rather than replacing the user entirely. This pattern has held across multiple Economic Index reports.

That doesn't mean automation isn't happening. It is, especially in narrow workflows that lend themselves to it (customer support routing, certain coding tasks, structured data processing). But the broader pattern is that AI is changing *how* people work more than it's changing *whether* people work. Anthropic's data shows that even where automation is increasing, the dominant mode of professional use remains augmentation.

This too has implications. If the dominant pattern is augmentation, then the people who win are the people who become genuinely good at working with AI as a partner. If the dominant pattern were full automation, the right strategy would be different. The data so far supports the augmentation framing, with the caveat that the pattern is still evolving.

> **Try this (2 minutes).** For each of the four trends above, ask yourself: *if this trend continues for the next two years, what changes for me in my work?* You don't have to write your answers down. Just notice which trends feel most relevant to your role and which feel more abstract. That's a useful starting point for the activity at the end of this module.

---

## Lesson 3: What's likely to change for knowledge work

Now we can be more specific about implications. Several shifts in knowledge work are already underway and likely to deepen over the next two to three years. Each is grounded in current data, with the explicit caveat that "likely" doesn't mean "certain."

**The baseline expectation will rise.** Tasks that took two hours and produced average work will take 30 minutes and produce above-average work, because AI handles the first draft. This isn't speculation. It's already happening for early adopters. As adoption broadens, what's "normal output" will shift, and the work that distinguishes you from a baseline performer will be different than it is today. Less about producing the deliverable, more about the judgment, context, and verification you bring to it.

**The role of expertise will shift but not disappear.** A common worry is that AI will make expertise obsolete. The data suggests something subtler. AI is currently most useful when paired with someone who has domain knowledge, because that person knows what to ask, how to evaluate the answer, and where the model is likely to be wrong. Expertise becomes the lens through which AI's output gets refined. In Anthropic's survey data, people in higher-skill jobs reported the largest productivity gains from AI, which is consistent with expertise being multiplicative with AI capability, not replaced by it.

**Some specific tasks will get automated.** Some tasks that were full jobs five years ago will be partially or mostly automated within the next two years. This is happening fastest in coding (where API workflows for routine code generation have grown rapidly), customer support (especially structured support workflows), and certain kinds of data analysis. Other tasks will resist automation longer because they require physical presence, complex relationships, or judgment that's hard to formalize.

**The learning curve gets steeper for newcomers.** This is the consequence of the experience gap from Lesson 2. As the people who've been using AI well for two or three years pull ahead, the difficulty of catching up grows. Someone starting from zero in 2027 will be facing a different competitive landscape than someone who started in 2024. The L2 transition is meaningful precisely because it puts you on the early side of this curve, even if you feel late to the party.

### What's not likely (caveats and counterweights)

A few things worth noting on the other side.

We are *not* on a smooth glide path. The AI Fluency Index research found that even as AI capability has grown, several behaviors that are critical for using it well (like questioning the model's reasoning or identifying missing context) have actually *decreased* in conversations where AI produces polished outputs. Capability and fluency aren't moving in lockstep. The technology is getting more powerful faster than the user base is getting more sophisticated. That gap has consequences and isn't automatically going to close.

We don't know what the medium-term economic shape will look like. There's healthy debate about whether AI will primarily augment knowledge workers (most people use AI to do their existing job better) or displace them (some jobs significantly contract or disappear). The current data favors augmentation, but the picture could shift. Anyone who tells you with confidence which way it'll land is overclaiming.

We don't know how much of the recent capability gains will continue at the same rate. Scaling laws have held for a long time, but every technology eventually hits diminishing returns. The current evidence suggests we're not there yet, but it's a real open question that the field is watching.

The honest stance is: the trends that are real are likely to keep going for at least the next year or two. Beyond that, uncertainty grows fast.

---

## Lesson 4: How to stay oriented

You can't predict where AI is going, but you can build a practice of watching specific signals so you update at the right pace. This is the practical takeaway of the module: a personal framework for staying calibrated as the technology evolves.

Here's how it works.

**Pick a few signals you'll watch.** Not 20. Three to five. The signals should be specific (not "AI capability") and ideally observable in ways that don't require expert interpretation. Examples of good signals: the latest Anthropic Economic Index report, a specific benchmark you'll check quarterly, a specific use case in your own work where you'll track whether the model is getting better, the rate of new tool integrations within Gong's stack.

**Decide in advance what would change your mind.** This is the underrated step. For each signal, write down what you'd expect to see if the trend is continuing and what you'd expect to see if it's breaking. That way, when new data arrives, you can update your view based on actual evidence rather than vibes. If you don't decide in advance, you'll rationalize whatever data comes in to fit your existing belief.

**Set a cadence.** Once a month, once a quarter, whatever fits. The point is to actually look at the signals on a schedule, rather than only when the discourse pulls your attention. Most of what you read about AI in the news is noise. Your own watch list is signal.

**Stay open to being wrong.** This is the discipline at the heart of all of it. The people who navigate technology shifts well aren't the ones who predict them most accurately. They're the ones who notice when they're wrong and adjust. This applies to optimists and skeptics equally. If the trend lines you're watching break, you should update toward the new picture, even if it contradicts what you previously thought.

The version of you that's most useful in 2027 isn't the one with the most confident view of where AI is going. It's the one with the most honest, regularly-updated view, who's watching specific things and adjusting as new evidence arrives.

---

## Key takeaways

- AI predictions live on a spectrum from reasonable extrapolation to pure conjecture. The further out a forecast goes, the higher the uncertainty should be. Be wary of confident long-term predictions.
- Four trends are well-documented enough to project forward: **capability gains are continuing**, **adoption is broadening**, **the experience gap between fluent and novice users is widening**, and **the dominant mode of professional use remains augmentation rather than full automation**.
- Likely shifts for knowledge work over the next two to three years: **the baseline expectation rises**, **expertise becomes more multiplicative with AI**, **some specific tasks will get automated**, and **the learning curve gets steeper for newcomers**.
- What's *not* likely: a smooth glide path. The technology is getting more capable faster than the user base is getting more sophisticated, and that gap has consequences.
- The L2 practice for staying oriented: pick a few specific signals, decide in advance what would change your mind, watch them on a regular cadence, and stay open to updating.
- Confident certainty about AI's future is itself a red flag. The best stance is calibrated bearings, not a roadmap.

---

**AI 101 · Module 5 of 7**
**Estimated time: 30 minutes content + 10 to 15 minute knowledge check + applied activity**
**Level transition: This module addresses the most consequential L1 → L2 shift. The L1 user trusts what the model produces. The L2 user verifies it.**

---

## Module brief

In M04 you learned how to get good output from an AI model. In M05 you're going to learn that "good output" and "true output" aren't the same thing.

The single most consequential failure mode of large language models is the hallucination: a confident, plausible, well-written claim that turns out to be factually wrong or made up. This isn't a bug that's about to be fixed. It's a structural feature of how these models work. Understanding why hallucinations happen, when they're most likely, and how to catch them isn't optional knowledge for an L2 user. It's the discipline that prevents real damage in your work.

In the 4Ds framework, this is the **Discernment** competency: evaluating what the model gives you with a critical eye. The AI Fluency Index research found that this is the area where most users fall furthest behind, especially when the AI produces output that looks polished. The good news is that discernment is learnable. There are specific patterns to look for, specific habits to build, and a verification practice that, once it's a reflex, will protect you from the kinds of mistakes that hurt customers and burn credibility.

This module is the most directly practical one in the literacy and craft halves combined. By the end, you should be able to look at any AI-generated output and have a working sense of where the risks are, what to verify, and how to verify it.

## Learning objectives

By the end of this module you should be able to:

1. Explain, in plain language, why language models hallucinate.
2. Identify the conditions under which hallucinations are most likely to occur.
3. Recognize the specific signals that flag potential hallucinations in real output.
4. Apply a consistent verification practice to any AI-generated work before you ship it under your name.

---

## Lesson 1: Why models hallucinate

Recall from M01 that an LLM works by predicting the most likely next piece of text, one piece at a time, based on patterns it learned during training. Sit with that for a moment, because the answer to "why do they hallucinate" is hiding in plain sight in that definition.

The model is producing **statistically likely text**. Sometimes the statistically likely text is also true. Often, when the topic is well-represented in training data and the answer is unambiguous, it is. But the model is not checking whether the text is true as it writes. It's checking whether the text is *probable*. Those are not the same standard, and that gap is where hallucinations live.

Anthropic's own [interpretability research](https://www.anthropic.com/research/tracing-thoughts-language-model) has uncovered a more specific picture. Researchers have found that inside the model there are two competing mechanisms at play. One identifies "known entities" that the model has seen patterns about during training. Another corresponds to "I don't know this" or "I can't answer this." Their correct interplay is what guards models from hallucinating.

When this works, asking about a topic the model wasn't well-trained on triggers the "I don't know" response. But the mechanism can misfire. As Anthropic puts it, sometimes Claude recognizes a name but doesn't know much else about that person. In those cases, the "known entity" feature can fire and incorrectly suppress the "don't know" feature. The model then proceeds to confabulate, generating a plausible but unfortunately untrue response.

The takeaway for you isn't the technical detail. It's this: hallucinations aren't the model "lying" or "trying to deceive." There's no intent. The model is producing statistically likely text under conditions where its internal "I don't know this" signal failed to override its "I can answer this" signal. The output is wrong, but it's wrong the same way a confidently incorrect human is wrong: it filled in a gap with something that sounded right.

This framing matters because it changes how you respond. You don't argue with the model. You verify the output.

> **Try this (3 minutes).** Open Claude.ai and ask it: *"Why do AI models hallucinate? Explain in your own words, then specifically address: is the model 'lying' when it does this? What's actually happening inside?"* Read the answer. Notice that the model itself can articulate this clearly. The fact that it can describe the failure mode doesn't prevent the failure mode from happening. Self-awareness about the limitation isn't the same as the limitation going away.

---

## Lesson 2: When hallucinations are most likely

Hallucinations are not equally likely across all kinds of questions. There are specific patterns that make them dramatically more probable, and recognizing those patterns is half the battle. Here are the conditions under which you should be on highest alert.

### Specific factual claims about obscure things

The model is most likely to hallucinate when asked for specific facts about things it didn't see much of in training. The population of a small town. A quote from a specific page of a specific book. The contents of an obscure paper. Statistics about a niche topic. These are exactly the kinds of questions where the "known entity" mechanism is most likely to misfire. The model recognizes that there's a real thing being asked about, but it doesn't actually have reliable information, so it generates plausible-sounding content to fill the gap.

If you're asking AI for specific numbers, dates, quotes, or names from a low-traffic topic area, treat the output as a hypothesis until verified. Always.

### Citations and sources

This is one of the most common and most dangerous patterns. AI models are infamous for inventing citations: plausible-sounding paper titles, author names, journal names, page numbers, and DOIs that simply don't exist. The format is right. The content is fabricated. Lawyers have been sanctioned for filing AI-generated briefs containing fake case citations. Researchers have published papers with invented references. This isn't a hypothetical risk. It happens often.

If you ever ask AI to provide sources or citations, the verification rule is non-negotiable: **check every single one** before relying on it. Don't trust the URL. Don't trust the author name. Click through, search the actual journal, confirm the source exists and says what the model claims it says.

### Recent events past the knowledge cutoff

Models have a knowledge cutoff. Without web search enabled, anything that happened after that date is territory where the model has no real information but may still produce confident answers about it. M01 covered this in the vocabulary, and M03 covered the broader trend. The risk for verification is straightforward: anything time-sensitive or news-related needs to be cross-checked, period.

### Anything you don't have your own knowledge of

This one is the most uncomfortable, but the most important. Hallucinations are easier to spot when you know enough about the topic to recognize that something is off. They're hardest to spot when the model is your only source of information, because you have no way to evaluate what you're reading.

The implication is sobering: **you are most at risk of accepting hallucinations in exactly the topic areas where you most need help.** This is why discernment isn't just a check after the fact. It's a habit of asking, before you trust any output: do I have enough independent knowledge to evaluate this, or am I taking it on faith?

### Polished, confident-sounding output

The AI Fluency Index research found that when AI produces output that *looks* finished (working code, a clean document, a confident analysis), users actually evaluate it less critically than they evaluate rougher output. This is the polished output trap from M04, and it shows up here too. Polish is not accuracy. The cleaner the output looks, the more disciplined you have to be about checking it.

> **Try this (3 minutes).** Pick a topic you genuinely don't know much about. Ask AI for five specific factual claims about it (e.g., "give me five specific facts about the history of [obscure topic]"). Now try to verify each one. Use Wikipedia, primary sources, search engines, whatever you have. Notice how much friction there is in verification, and how easily it would have been to just accept the AI's output as fact. That gap is the hallucination risk in your daily work.

---

## Lesson 3: The signals that flag possible hallucinations

You won't always have time to verify everything in everything you generate. So part of L2 discernment is developing pattern recognition for the specific signals that suggest "this might be a hallucination, slow down and check."

Here are the signals worth training yourself to notice.

**Suspiciously specific details about a topic that's hard to verify.** When the model offers a precise number, a specific date, or a granular detail that would require external checking and has no obvious source, treat it with extra suspicion. The very specificity that makes it sound credible is what should make you skeptical.

**Round numbers in surprising places.** Real statistics tend to be messy. "23.7% of customers" is plausible. "25% of customers" is suspicious unless there's a clear reason it'd be a round number. The model has a tendency to generate round numbers when it's filling in a gap because round numbers feel canonical.

**Confident attribution to "studies show" or "research finds" without specifics.** If the model says "studies show that X" without naming the study, the year, the researchers, or providing a citation, the cited finding may not exist. If you ask for the source and it produces one immediately and confidently, that source still needs to be checked. Confident-sounding sources are the most likely category to be fabricated.

**Quotes attributed to real people.** If the model produces a direct quote attributed to a real person, especially a specific quote about a specific topic, the verification bar should be very high. Real quotes can be checked. Fabricated ones often can't, and the model is happy to produce convincing-sounding quotes that the supposed speaker never said.

**Detailed descriptions of obscure things.** If the model produces a richly detailed description of something niche (a conference, a product, a person, a paper), and you can't easily verify the basic existence of the thing being described, the details are likely fabricated even if the existence isn't.

**Confidence that doesn't match the difficulty of the question.** This is more of a feel than a checklist item, but it matters. When you ask a hard question and get back a smooth, confident, well-structured answer with no caveats, that's a signal. Real expertise tends to come with hedges and qualifications. Hallucinations often don't.

**A mismatch between the topic's complexity and the response's tidiness.** Reality is messy. If the model gives you a clean, simple answer to a question that should have nuance, ambiguity, or competing perspectives, the cleanness might be artificial.

> **Try this (3 minutes).** Pick a piece of AI-generated work you've created recently. Read through it slowly, looking specifically for the signals above. How many do you notice? For each one you notice, ask yourself: did I verify that, or did I take it on faith? You don't need to fix anything yet. Just calibrate your eye.

---

## Lesson 4: The verification practice

Knowing the signals is half the work. The other half is having a verification practice that you actually run, every time, before AI output goes out under your name.

Here's a simple practice you can adopt today.

### The pre-publish checklist

Before you ship anything that AI helped you produce, run through this:

1. **What in this output would matter if it were wrong?** Identify the load-bearing claims: facts, numbers, quotes, citations, names, dates. Anything that, if false, would damage credibility or cause harm.

2. **What of that have I personally verified?** Be honest. Verification means you checked an independent source, not just that the output sounded right.

3. **What can be verified now, in the next few minutes?** Anything verifiable should be verified. Citations: click through. Numbers: search for the source. Quotes: find the original. Names: confirm spelling and identity.

4. **What can't be verified, and what does that mean for the output?** Sometimes you can't fully verify a claim in the time available. Then your options are: cut it, soften it ("typically" instead of a specific stat), or flag the uncertainty in the output itself.

5. **Does the polished surface match the actual confidence I have?** This is the gut-check. If the output is written confidently but you can't actually back the claims, that gap is your problem to close.

This whole pass takes a few minutes for most pieces of work. It's not optional. The cost of skipping it shows up the moment something wrong reaches a customer or a teammate.

### Specific techniques from Anthropic's documentation

A few techniques from Anthropic's [hallucination guidance](https://platform.claude.com/docs/en/test-and-evaluate/strengthen-guardrails/reduce-hallucinations) work directly in your prompt to reduce the rate of hallucinations in the first place:

**Give the model permission to say "I don't know."** This sounds obvious, but it matters. Models are sometimes biased toward producing an answer rather than admitting uncertainty. Adding "if you don't know or aren't sure, say so" to your prompts reduces fabrication rates.

**Ask for source quotes when working with documents.** If you've given the model a long document to work with, ask it to extract relevant direct quotes from the document before producing its analysis. This grounds the response in the actual text and makes it harder for the model to drift into fabrication.

**Ask for citations alongside claims.** Have the model cite its sources for each significant claim, then verify the citations. If the model can't produce a citation, it has to retract the claim.

**Compare multiple outputs.** Run the same prompt twice (or use a different model the second time). If the answers are inconsistent on a factual claim, that's a signal that one of them is fabricated.

**Ask the model to verify itself.** After producing an output, ask: "Look back at what you just wrote. Are there any specific factual claims you're not actually confident about? Mark them." The model is sometimes able to flag its own uncertainty when explicitly asked.

These techniques don't eliminate hallucinations. Nothing does. But they significantly reduce the rate, and combined with the pre-publish checklist, they make hallucinations a manageable risk rather than a constant exposure.

### The mindset to carry forward

The L2 mindset on output is: trust nothing on first read. This sounds harsh, but it's the practical reality, and once it becomes a habit, it stops feeling like extra work. It's just how you work.

You're not paranoid. You're a professional who knows the failure mode of the tool you're using and adjusts accordingly. The same way a doctor double-checks a dosage, the same way a pilot runs a pre-flight checklist, the same way a lawyer cite-checks a brief. The work is part of using the tool well.

---

## Key takeaways

- Hallucinations are a structural feature of how language models work, not a bug. The model produces statistically likely text, which is sometimes (but not always) the same as true text.
- Anthropic's interpretability research has identified specific internal mechanisms that produce hallucinations, including a misfire of the "known entity" feature when the model recognizes a name but lacks deeper information about it.
- Hallucinations are most likely in: **specific factual claims about obscure topics**, **citations and sources**, **recent events past the knowledge cutoff**, **topics you don't have independent knowledge of**, and **polished, confident-sounding output** of any kind.
- Specific signals to watch for: **suspiciously specific details**, **round numbers in surprising places**, **vague "studies show" claims**, **direct quotes attributed to real people**, **detailed descriptions of obscure things**, and **confidence that doesn't match the difficulty of the question**.
- The L2 verification practice has a pre-publish checklist: identify load-bearing claims, verify what's verifiable, cut or soften what isn't, and gut-check whether the polished surface matches your actual confidence.
- Specific in-prompt techniques reduce the rate of hallucinations: **give the model permission to say "I don't know"**, **ask for source quotes from documents**, **request citations**, **compare multiple outputs**, and **ask the model to flag its own uncertainty**.
- The mindset: trust nothing on first read. Verify before you ship. This is professional practice, not paranoia.

## Module brief

Up to this point, AI 101 has mostly treated "AI" as a single thing. In practice you'll have access to several different AI tools, and learning to pick the right one for a given task is part of the L2 transition.

Here's the good news up front: at the L1/L2 level, the differences between major AI tools matter less than the public discourse suggests. The frontier models from Anthropic (Claude), OpenAI (GPT), and Google (Gemini) are all very capable at most knowledge work tasks, and most days, the tool you happen to have open is going to be perfectly adequate for what you're doing. People who paralyze themselves trying to pick the "best" AI tool for every task are usually optimizing for the wrong thing.

That said, the differences are real. Each tool has genuine strengths, distinct quirks, and specific contexts where it's a notably better or worse choice. Knowing the broad shape of those differences, plus when to reach for a specialized tool like Gong AI, will save you time and produce better work than blindly defaulting to whichever tool you used last.

This module is also the most likely to go stale fastest in the course, because the AI tool landscape is changing quickly. Treat the specific tool descriptions as a snapshot, not a permanent reference. The frameworks for choosing will outlast any specific product detail.

## Learning objectives

By the end of this module you should be able to:

1. Describe the broad strengths and characteristic styles of the major frontier models (Claude, GPT, Gemini) without overclaiming.
2. Recognize when to reach for a specialized tool (like Gong AI) instead of a general-purpose model.
3. Apply a simple decision framework for choosing between tools without getting paralyzed.
4. Hold the right mental model: the choice matters less than the principle-based skills you bring to whichever tool you use.

## Lesson 1: The frontier model landscape

There are currently three companies producing what are usually called "frontier" models: AI systems at the leading edge of capability that get used as general-purpose assistants. They are:

**Claude** (made by Anthropic). The model family this course's source material comes from. Available via Claude.ai, the Claude apps, and integrated into various tools including Brainstorm.

**GPT** (made by OpenAI). The most consumer-recognizable family because of ChatGPT, which made AI broadly visible to the public in late 2022.

**Gemini** (made by Google). Integrated deeply into Google's ecosystem, including Workspace tools.

All three are very capable. All three are continuously improving. All three can do most knowledge work tasks at a quality level that's genuinely useful. The differences below are the ones that matter at the L2 level, but they should be held loosely. The companies leapfrog each other on specific benchmarks, and what's true today may shift in six months.

### Where Claude tends to be strong

Claude is generally considered strong at long-form writing, careful reasoning, and coding. It has a reputation for being more verbose by default and more inclined to ask clarifying questions or note its uncertainty. Anthropic places particular emphasis on safety and honesty in its training, which translates into a model that's somewhat more inclined to push back, hedge appropriately, and decline tasks it sees as risky. Some users prefer this; some find it too conservative. Both reactions are reasonable.

If you're doing extended writing, working through complex reasoning, or want a model that errs toward flagging its own uncertainty, Claude tends to be a strong default.

### Where GPT tends to be strong

GPT (especially via ChatGPT) has a large ecosystem around it: plugins, custom GPTs, image generation, web search, voice, and a wide third-party integration footprint. The product surface is broad, and OpenAI has often led on multimodal capabilities (image, audio, video). GPT models tend to be more direct and brief by default, and the default ChatGPT product is widely used as a general-purpose assistant.

If you want web-connected search alongside conversation, image generation, or any of the broader tooling around the GPT family, that's where it has real advantages.

### Where Gemini tends to be strong

Gemini's clearest advantage is integration with Google's ecosystem. If you're already in Google Workspace (Docs, Sheets, Gmail, Drive), Gemini can work with your content directly without copy-paste. It also has Google Search baked in natively, which makes it well-suited for tasks that benefit from current information.

If your workflow centers on Google products, Gemini removes friction that the other tools have to work around.

### What this means in practice

Here's the honest summary: most of the time, you'll be fine with whichever tool you have access to. The cases where the tool choice meaningfully changes the outcome are narrower than people think. Specific writing styles, specific code performance on hard problems, specific integration needs: those matter. For "summarize this," "draft an email," "explain this concept," "rewrite this," any frontier model will produce comparable output.

The L2 move is to develop a working sense of when the differences matter and when they don't, which mostly comes from trying the same task across two tools occasionally and noticing where the output is meaningfully different.

> **Try this (3 minutes).** Take one of the prompts you've worked with so far in this course (from M04 ideally) and run it on two different AI tools you have access to. If you only have access to one, pick a different recent task. Compare the outputs side by side. What's different about the style, the structure, the tone? What's similar? Notice your own reactions. Sometimes the "better" output is a matter of preference, not capability.

---

## Lesson 2: Specialized tools and when they beat general ones

Frontier models are general-purpose. They're trained on broad text and can handle a wide range of tasks. But for some tasks, a specialized tool that's purpose-built for that domain will outperform a general model.

The clearest example for your work is **Gong AI**, which is purpose-built for revenue conversation analysis. Gong AI is trained on call data, deal data, and the specific patterns of B2B sales and customer success conversations. For tasks like:

- Summarizing a customer call accurately
- Identifying coaching moments from a rep's calls
- Surfacing risk signals across deals
- Tracking topic patterns across customer conversations

Gong AI has structural advantages over a general model. It has access to data the general model doesn't have. It's designed for the workflow you're already in. It connects directly to your CRM and call recordings. For these tasks, reaching for a general model means giving up real value.

The principle generalizes: any time a tool is purpose-built for the specific task you're doing, and you have access to it, that's usually the right tool. General models are great defaults, but specialization wins on the tasks it was specialized for.

### Other specialized tools worth knowing

The landscape of specialized AI tools is broad and growing. Some categories worth being aware of:

**Code-focused tools** (GitHub Copilot, Cursor, Claude Code). Built specifically for software development, with deep integrations into the code editing environment.

**Image generation tools** (Midjourney, DALL·E, Stable Diffusion). Built for visual content, not text.

**Meeting and transcription tools** (Otter, Fireflies, Gong). Built for capturing and analyzing spoken conversations.

**Search and research tools** (Perplexity). Built around AI-augmented web search, blending generation with sourcing.

**Domain-specific tools** (legal AI, medical AI, financial AI). Built for the specific data, terminology, and risk profiles of their domain.

You don't need to know all of these. The point is to know that specialization exists and to ask, when reaching for AI: *is there a tool built specifically for what I'm trying to do, and do I have access to it?*

---

## Lesson 3: A simple decision framework

Here's a working framework for choosing between tools that doesn't require you to memorize every model's strengths.

### Step 1: Is there a specialized tool built for this exact task that I have access to?

If yes, use it. Gong AI for revenue conversation analysis. A code-focused tool for serious programming work. A purpose-built tool will almost always outperform a general model on the task it was purpose-built for.

### Step 2: Does the task require capabilities only one tool has?

A few examples that matter at the L2 level:
- Working directly with a Google Doc without copy-paste? Gemini has the integration advantage.
- Generating an image as part of the task? GPT (via ChatGPT) has DALL·E integration.
- Need a model with strong default verbosity for long-form analysis? Claude has a reputation for that.
- Need access to current web information? Whichever tool has search enabled in your workflow.

If the task requires a specific capability, that decides it.

### Step 3: Otherwise, use whatever you have open.

Most of the time, this is the answer. Frontier models are close enough on most tasks that the friction cost of switching tools usually outweighs the marginal output difference. The L2 user does not optimize tool choice for every interaction. They build comfort with one or two tools they trust and use them consistently.

### What not to do

A few patterns to actively avoid.

**Don't switch tools mid-task to "see if the other one is better."** This is a productivity trap. You'll spend more time comparing outputs than improving them. Pick a tool, do the work, evaluate the result, decide if a different tool is needed.

**Don't assume newer means better.** Every few months, one company releases a model that beats the others on a specific benchmark, and there's a wave of "X is now the best AI." For the kind of work you're doing, the practical difference is often small. Stable, reliable use of one tool tends to produce more value than chasing the latest release.

**Don't pick tools by hype.** The discourse moves on capability before capability moves in real life. Trust your own evaluation against your own work.

> **Try this (2 minutes).** Pick three real tasks you've used AI for in the past month. For each one, ask: would a specialized tool have been better? Would a different general model have been better? Or was whatever I used fine? Most honest answers will be "fine." That's a useful calibration point.

---

## Lesson 4: The thing that matters more than tool choice

Here's the quiet truth that most "best AI tool" content avoids saying. The biggest variable in the quality of your AI output isn't the tool. It's you.

Every module in this course so far has been about skills that work across tools. Knowing what AI is and isn't (M01). Having historical context (M02). Staying oriented to the trajectory (M03). Writing clear prompts (M04). Verifying output (M05). None of those skills are tool-specific. They transfer.

The implication is liberating: you don't have to be optimizing tool choice. You have to be building skill. Someone using GPT well will outperform someone using Claude poorly, and vice versa. The skill is the thing.

This is also why principle-based learning matters more than tool-based learning. Tools change. Skills compound. The L2 user has a working sense of the tool landscape, knows when to reach for a specialized tool, and otherwise focuses on getting better at the underlying craft regardless of which interface they're typing into.

This is the right mental frame to carry into the rest of your work. Pick a primary tool you trust. Know when to reach for a specialized one. Stop optimizing the tool choice. Start optimizing the skill.

---

## Key takeaways

- The three frontier models, **Claude (Anthropic)**, **GPT (OpenAI)**, and **Gemini (Google)**, are all very capable at most knowledge work tasks. The differences are real but smaller than the public discourse suggests.
- General tendencies: Claude tends to favor long-form writing, careful reasoning, and uncertainty-flagging. GPT has a broad ecosystem with strong multimodal and web tooling. Gemini integrates deeply with Google Workspace. Hold these as tendencies, not absolutes.
- **Specialized tools** like Gong AI outperform general models on the tasks they're purpose-built for. Always ask whether a specialized tool exists for what you're doing.
- The decision framework: (1) Use a specialized tool if one exists and fits. (2) Use the tool with the specific capability you need if the task requires it. (3) Otherwise, use whatever you have open.
- Avoid common traps: don't switch tools mid-task to compare, don't assume newer means better, don't pick tools by hype.
- The biggest variable in output quality is **you**, not the tool. Skills transfer across tools; tools change. Focus on building skill, not on optimizing tool selection for every interaction.

This module is the **Diligence** competency from the 4Ds framework: taking responsibility for what you do with AI and how you do it. Diligence is the discipline that holds the other three competencies together. You can be excellent at delegation, description, and discernment, and still produce work that's harmful, irresponsible, or wrong if you don't own it. This module is about building the habits, rituals, and personal commitments that make ownership real, not theoretical.

1. Articulate the accountability principle and what it means in practice for your day-to-day work.
2. Run a pre-publish ritual on any AI-assisted work before it goes out under your name.

## Lesson 1: The accountability principle

The simplest way to state the principle is the one Brainstorm uses across the program: **AI is a draft, never a decision.** When you ship work that AI helped you produce, what you're shipping is *your* work. Your name is on it. Your judgment chose to send it out. Your reputation lives or dies by it. The AI doesn't share that accountability with you, because the AI doesn't have a name, a job, or a stake in the outcome.

This sounds obvious. In practice it's the principle people violate most often, usually without noticing. The pattern looks like this: someone uses AI to draft an email, glances at it, sends it. The email contains a small inaccuracy. A customer notices. The person says, "Sorry, the AI drafted that." They might say it as a joke, or as a deflection, or as an honest explanation. In every case, the framing is wrong.

The AI didn't send the email. The person did. The accountability was always with the person.

The L2 stance on this is unequivocal. You don't blame the tool when something goes wrong. You don't disclaim responsibility for AI-assisted work. You don't ship things you wouldn't be willing to defend on your own credibility. The AI is a tool you're using; the work is yours.

A useful test: imagine that everything AI helped you produce has your name printed at the top in 24-point font, and that you'll be asked to defend each specific claim if questioned. If that's a reasonable bar for the work you're sending out, you're operating at L2. If you'd flinch at that level of accountability for some of what you've sent recently, that's exactly where the work is.

### Why this matters more as capability grows

Here's the part that often gets missed. As AI gets more capable, the accountability problem gets *harder*, not easier.

When AI was clearly limited, people naturally treated its output as a starting point. They edited, verified, and rewrote, because they had to. As AI gets better, the temptation rises to ship what it produces with less and less of your own thought layered on top. That's the trap. The polished output looks finished. It feels finished. It often *is* finished, in a literal sense. But polished isn't the same as yours. Polish without ownership is how AI-assisted work goes off the rails at scale.

The L2 user inverts the instinct. The better the AI gets, the more deliberate your ownership has to be. Not because you're suspicious of the model. Because you're committed to the work being yours.

> **Try this (3 minutes).** Think about something you've sent or shipped in the past week that AI helped with. Just one piece. Now imagine you're being asked, point by point: what did you write yourself, what came from AI, what did you verify, what did you take on faith? Not as a gotcha. Just as a working professional describing your process. How comfortable are you with your answers? The discomfort, if there is any, is information about where your habits need to grow.

---

## Lesson 2: The pre-publish ritual

In M05 you learned a verification practice specifically focused on hallucinations. The pre-publish ritual is broader. It's the full check before AI-assisted work goes out under your name, and it includes verification but adds the ownership and judgment dimensions.

Here's a working version of the ritual. It takes a few minutes for most pieces of work.

**1. Did I add my own thinking, or am I shipping the AI's first draft?**

This is the ownership question. If the only thing distinguishing what you're sending from what the AI produced is "I read it once and didn't change anything," that's a flag. AI-assisted work should reflect *your* judgment, not just the model's output. What did you change? What did you keep? Why?

It's fine for the bones of a piece to come from AI. The voice, the judgment calls, and the specific decisions about what to include or exclude should be yours.

**2. Have I verified the load-bearing claims?**

This is M05's verification practice. Identify what would matter if it were wrong, check what's checkable, cut or soften what isn't. Specifically watch for: numbers, dates, names, citations, quotes, and anything time-sensitive.

**3. Does the tone match the relationship and the audience?**

AI defaults can be off-tone for your specific context. Too formal, too casual, too American, too generic. Read it as if you're the recipient. Does it sound like you would actually say this, to this person, in this context? If not, edit until it does.

**4. Am I shipping anything I wouldn't say in my own voice?**

Sometimes AI output includes a turn of phrase you wouldn't naturally use. A joke that doesn't sound like you. A claim more confident than your actual view. A flourish that's cleaner than your normal writing. These small mismatches accumulate; over time they erode the consistency of your professional voice. Edit them out. Your voice is part of your value.

**5. Would I be comfortable having this work attributed to me, with the AI assistance entirely invisible?**

This is the final test. If the answer is yes, ship it. If the answer is "well, mostly..." then there's something specific to fix.

### Making it a reflex, not a checklist

Reading the ritual takes longer than running it. After a few weeks of deliberate use, the questions collapse into a single quick instinct: *would I defend this as mine?* That instinct is the L2 standard. It runs in seconds, not minutes, and it catches the things that matter.

The discipline is in the early reps. Build the habit deliberately for a few weeks. After that, it becomes how you work.

> **Try this (3 minutes).** Take the most recent AI-assisted piece of work you produced. Run it through the five questions above. Be honest about each one. You don't need to redo the work. Just notice which questions you answered confidently and which ones gave you pause. The pauses are where your habits need attention.

## Lesson 3: Data handling and the boundaries

The other side of accountability is what you put *into* AI tools. Pasting things into a prompt is, in many cases, equivalent to putting that information into a third-party system. Treating that casually is one of the highest-risk L1 mistakes.

The full data governance picture is too big for a 101 course, and it varies by tool, by company, and by region. But here are the principles every L2 user needs to internalize.

### Different tools have different data policies

When you put data into an AI tool, what happens to it depends on the tool. Some tools train their models on user inputs by default. Some don't. Some retain conversation data; some don't. Some are configured for enterprise use with specific data protections; some are consumer products with different rules.

For Brainstorm and Gong-approved tools, this has been thought through carefully. There are policies in place about what data can go where, and the tools you have access to inside Gong are configured for safe use. You can put more in those tools than you can put in personal AI accounts.

For personal AI accounts on consumer tools, the rules are different. Treat anything you put into a personal ChatGPT, Claude.ai, or Gemini account the way you'd treat anything you'd post on a public forum. Maybe that's overkill in many cases, but it's the right safety margin, because the actual data handling depends on settings that may have changed since you last checked.

### The categories of information that need extra care

A few categories of information warrant extra caution regardless of tool:

**Customer-identifying information.** Names, contact info, deal-specific details, contract terms, anything that identifies a specific Gong customer. This is what makes Gong-approved tools the right choice. Putting customer details into a consumer AI account, even casually, is risky.

**Confidential internal information.** Strategy documents, financial data, unreleased product information, internal personnel details. The stuff that's clearly marked confidential, plus a lot of stuff that isn't formally marked but obviously is.

**Legal or compliance-sensitive content.** Anything that could be discoverable in litigation, anything covered by specific regulatory frameworks, anything where the chain of custody matters.

**Data covered by specific contractual obligations.** Customer data covered by your own agreements. Partner data covered by NDAs. Anything where you've made a specific commitment about how it will be handled.

**Personal data covered by privacy regulations.** GDPR, CCPA, and similar regulations apply to AI tools just like they apply to other systems.

When in doubt, ask before pasting. A two-minute check with security or legal beats a much bigger conversation about a leak after the fact.

### The reflex to build

The L2 reflex on data is: *what tool am I using, what's its data policy, and is what I'm about to paste in appropriate for that policy?* Three quick questions. They take seconds. They prevent the kind of mistake that's hard to come back from.

If you don't know your tool's data policy, that's the first homework. Take five minutes to look it up. Bookmark the page. The policy may shift over time, but knowing where it is gets you 80% of the way there.

> **Try this (3 minutes).** For each AI tool you use regularly, can you answer these questions: Does my company allow this tool? Is it approved for sensitive data? Where does my conversation data go? If you're not sure on any of them, take note. You don't have to fix it right now. But the questions belong to L2, and the answers should be ones you can produce confidently.

## Lesson 4: Building your personal AI policy

You've now covered everything in AI 101. The last thing to do is convert the course into something you'll actually use: a personal AI policy.

A personal AI policy is a short document, written by you for you, that captures how you'll use AI going forward. It covers the things that should be reflexive but only become reflexive if you've thought them through deliberately at least once. The act of writing it is the value, more than the document itself.

A useful structure for a personal AI policy includes:

**1. What I'll use AI for.** The categories of work where AI assistance fits well in your role. Prompted by M03 and M06.

**2. What I won't use AI for.** The categories where you've decided AI isn't the right tool. Maybe because the stakes are too high, the verification cost is too great, the data is too sensitive, or the work is yours specifically. Drawing a line here is more important than people realize.

**3. What verification I'll always run.** Your version of the pre-publish ritual. Specific to your work, but informed by M05 and this module.

**4. What data I won't put into which tools.** Your own data-handling rules, informed by Lesson 3 and the policies of your specific tools.

**5. How I'll disclose AI use.** When you'll mention that AI was involved (e.g., on certain kinds of work, in certain contexts) and when you won't (e.g., on routine work where it'd be noise to mention). There's no universal answer to this; it depends on your role, your audience, and your norms.

**6. What I'll keep learning.** A short note on what you'll do to stay sharp as the technology evolves. Brainstorm itself is part of this for you, since AI 201 and beyond are coming. But also: the signals you'll watch from M03, the prompts you'll keep refining from M04, the tools you'll experiment with from M06.

This isn't a binding policy. It's a working agreement with yourself. You'll revise it as your understanding deepens and as the tools change. The point isn't to write the perfect version. It's to make your default behavior intentional.

### One more thing: the disclosure question

Disclosure deserves a brief note, because it's the place where reasonable people most disagree, and there's no universal right answer.

In some contexts, disclosing AI use is clearly the right move. Academic work. Some kinds of journalism. Anywhere where the value of the work depends on it being demonstrably yours.

In other contexts, disclosing every AI use would be noisy and weird. Nobody mentions when they used spell-check. Nobody flags when they used a calendar tool to find a time. As AI integrates into more of the workflow, the case for routine disclosure of every use weakens.

The middle ground is judgment. Disclose when the level of AI involvement might matter to the recipient. Disclose when it'd be misleading to imply otherwise. Don't disclose every routine use that doesn't change the meaning of the work.

The principle that holds across the spectrum is honesty: never imply that work is more "yours" than it is in a way that misleads someone making a decision based on that. Beyond that, your specific disclosure norms are something to build into your personal policy.

**You own the work.** Always. The polish of the AI output doesn't transfer ownership; it just makes ownership feel less necessary. Stay deliberate about it.

**Iterate.** Your first prompt is a hypothesis. Your first reading of the output is a hypothesis. The work is in the second pass, and the third, and the fourth.

**Trust nothing on first read.** Verify what's checkable. Cut or soften what isn't. The cleaner the output, the more disciplined you should be.

**Skill compounds across tools.** The next great AI tool will arrive. The prompt-writing, verification, and ownership skills you've built will transfer. Build the skill; the tool is downstream.

**Stay curious, stay calibrated.** The technology is going to keep changing. Your job is not to predict where it goes. Your job is to stay oriented and update at the right pace. Watch your signals. Hold your views with appropriate uncertainty.

That's it. AI 101 doesn't try to make you an expert. It tries to make you safe and capable. The deeper specialization (how to use AI in your specific role, how to chain tools together, how to lead AI adoption) comes in 201 and beyond.

## Where this sits in Brainstorm

Brainstorm uses a five-level fluency progression to describe where any GTM employee sits today and how they grow over time:

| Level | Name | What it looks like |
|---|---|---|
| L1 | **The Risk** | Uses unvetted tools without a security or accuracy mindset |
| L2 | **The Novice** | Can write a prompt and use AI for simple tasks, but mostly as a "user" |
| L3 | **The Practitioner** | Co-creates with AI, fact-checks outputs, and iterates |
| L4 | **The Strategist** | Orchestrates multi-step workflows across tools |
| L5 | **The Architect** | Builds new systems, coaches peers, leads transformation |

**AI 101 moves you from L1 to L2.** That sounds modest, and it is, by design. The honest truth is that most of the GTM org sits somewhere between L1 and L2 today. Getting solidly to L2 is the single most valuable shift you can make, because it eliminates the categories of mistakes that hurt customers and waste time. Every module in this course is designed around making that transition real and durable.

## The framework you'll keep coming back to

Throughout AI 101 you'll see a four-part framework called the **4Ds**: **Delegation, Description, Discernment, and Diligence.** It's not a Gong invention. It was developed by Professors Rick Dakan (Ringling College of Art and Design) and Joseph Feller (University College Cork) in collaboration with Anthropic, and it's used widely as the standard way to describe what fluency with AI actually consists of.

Here's the short version:

- **Delegation.** Deciding what to do with AI versus what to do yourself.
- **Description.** Communicating clearly with AI so it understands what you actually want.
- **Discernment.** Evaluating what the AI gives back with a critical eye.
- **Diligence.** Taking responsibility for what you produce with AI.

Each of these maps to a different part of how a real interaction with AI unfolds, and each has its own skills you can develop. AI 101 introduces all four, with most of the depth landing on Description (how to prompt) and Discernment (how to evaluate). Delegation and Diligence get foundation here and go deeper in 201+.

The 4Ds are licensed under Creative Commons (CC BY-NC-SA 4.0), which is why we can build on them directly. Full attribution is at the end of every module that uses them.

## The seven modules

AI 101 is structured in two halves: literacy first (build the mental model), then craft (develop the actual skill). Each module is roughly 30 minutes of content plus a 10 to 15 minute knowledge check and an applied activity.

### Literacy: Build the mental model

**M01 · What is AI?**
Define what AI is and isn't. Demystify the vocabulary you'll keep hearing: model, LLM, prompt, agent, token, context. Understand why data is the foundation of everything.

**M02 · How did we get here?**
The arc from rule-based systems to machine learning to large language models. Why the moment we're in is genuinely different from previous "AI" hype cycles, and what changed to make it different.

**M03 · Where is this going?**
The trajectory over the next two to three years. What's worth preparing for, what's hype to ignore, and how to keep your bearings as the technology evolves underneath you.

### Fluency: Develop the craft

**M04 · Prompting best practices**
How to communicate with AI so it actually delivers what you want. Context, role, task, format, examples. The difference between a one-line prompt and one that gets you a usable first draft.

**M05 · Avoiding hallucinations**
Why models confidently make things up, when it's most likely to happen, and the practical habits that catch it before it reaches a customer or a teammate.

**M06 · Right tool for the job**
Claude, Gemini, ChatGPT, Gong AI. What each is good at, when to reach for which, and how to think about choosing without getting paralyzed.

**M07 · Owning AI outputs**
You are accountable for what you ship. AI is a draft, never a decision. The mindset, habits, and small rituals that keep you in control of your own work.

## How to take this course

A few things will make a real difference in how much you actually get out of this.

**Treat the embedded exercises as required, not optional.** Every module has small "try it" prompts woven into the lessons. They take a couple of minutes each, and they're the difference between reading about AI and actually getting better at using it. Skip them and you'll pass the knowledge check. Do them and you'll change how you work.

**Use a real AI tool while you go.** You'll get the most out of this if you have Claude.ai (or whichever AI tool you have access to) open in another tab. The exercises assume you'll actually try things, not just imagine trying them.

**Don't rush the activity.** Each module ends with an applied activity, which is a small piece of real work you do with AI and submit. These are graded against a rubric, and the rubric is the most direct signal of whether the concepts are sticking. If you're not sure about a piece of feedback, that's a signal to revisit the module section it relates to.

**Iterate.** This shows up later in the course, but it's worth saying up front: your first prompt is rarely your best prompt. Anthropic's [research on AI fluency](https://www.anthropic.com/research/AI-fluency-index) found that the single strongest predictor of every other fluency behavior is whether someone iterates and refines in conversation rather than accepting the first thing the model gives them. Bring that mindset to the exercises.

## What "done" looks like

By the end of AI 101, you should be able to:

1. Explain in plain language what an LLM is, what it does, and what it doesn't do.
2. Place the current AI moment in honest context, neither overhyped nor underestimated.
3. Write a prompt that gives the model enough to work with on the first try.
4. Recognize when a model output is likely wrong, and know what to do about it.
5. Choose between the major AI tools available to you with a real reason.
6. Describe what you, as the human, are responsible for when you ship work that AI helped you produce.

If those six things become second nature, you've made the L1 → L2 jump. From there, AI 201 starts applying these foundations to GTM work specifically, and 301 gets role-specific.

// =================================================================
// CoachMark — the AI Coach's identity mark.
//
// Three variants are defined so we can A/B them in Tweaks:
//   'sparkle'  : a 4-point sparkle inside a brand-gradient rounded square (default).
//                Echoes the Brainstorm logo but with a different glyph; reads as
//                "the AI inside the brand."
//   'bubble'   : a chat bubble whose tail terminates in a small spark; reads as
//                "AI that talks to you." Useful when context is conversational.
//   'pulse'    : minimal — a filled core with two concentric arcs radiating; reads
//                as "always-on signal." Good for tiny sizes (notifications, chips).
//
// Each variant accepts: size, variant, accent (defaults to var(--accent)), radius.
// It returns a self-contained mark (square block with a glyph). All glyphs are
// stroke-based so they scale crisply at any size.
// =================================================================
// =================================================================
// CoachGlyph — just the inner SVG glyph from a CoachMark variant, with no
// background. Used inside the FAB and other surfaces that already have their
// own gradient/fill (so we don't double up containers).
// =================================================================
// Inline glyph used inside chips, comments, the FAB face, etc. Single canonical
// 4-point sparkle — Coach's brand mark. Picks up `currentColor` so it inherits
// from whatever surface it lands on.
const CoachGlyph = ({ size = 22, color = 'currentColor' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden>
    <path d="M12 2.5 L13.6 9.2 L20.5 12 L13.6 14.8 L12 21.5 L10.4 14.8 L3.5 12 L10.4 9.2 Z"
          fill={color} stroke={color} strokeOpacity="0.6" strokeWidth="0.4" strokeLinejoin="round"/>
    <circle cx="19.5" cy="5.5" r="1.1" fill={color} opacity="0.95"/>
    <circle cx="4.5" cy="19.5" r="0.9" fill={color} opacity="0.7"/>
  </svg>
);

// Coach's "avatar" — gradient square with the sparkle glyph inside.
// Used wherever Coach appears as an actor (drawer header, chat messages,
// feed comments, reactions, notifications). The sparkle is the canonical
// brand mark for AI in the product.
const CoachMark = ({ size = 32, accent = 'var(--accent)', radius, title = 'Coach' }) => {
  const r = radius != null ? radius : Math.max(6, Math.round(size * 0.22));
  const ringShadow =
    `0 0 0 1px color-mix(in oklab, ${accent} 28%, transparent), ` +
    `0 6px 16px -8px color-mix(in oklab, ${accent} 55%, transparent)`;
  return (
    <div title={title} style={{
      position:'relative', width:size, height:size, borderRadius:r,
      background: `linear-gradient(135deg, ${accent} 0%, color-mix(in oklab, ${accent} 78%, #4B2BB8) 60%, color-mix(in oklab, ${accent} 55%, #1B1058) 100%)`,
      boxShadow: ringShadow,
      display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0
    }}>
      <svg width={Math.round(size * 0.62)} height={Math.round(size * 0.62)} viewBox="0 0 24 24" fill="none" aria-hidden>
        {/* Big 4-point spark */}
        <path d="M12 2.5 L13.6 9.2 L20.5 12 L13.6 14.8 L12 21.5 L10.4 14.8 L3.5 12 L10.4 9.2 Z"
              fill="#fff" stroke="rgba(255,255,255,0.6)" strokeWidth="0.4" strokeLinejoin="round"/>
        {/* Two small accent sparks */}
        <circle cx="19.5" cy="5.5" r="1.1" fill="#fff" opacity="0.9"/>
        <circle cx="4.5" cy="19.5" r="0.9" fill="#fff" opacity="0.7"/>
      </svg>
    </div>
  );
};

const Btn = ({ children, onClick, variant = 'primary', size = 'md', icon, disabled, style, type = 'button', ...rest }) => {
  const sizes = { sm: { p: '7px 12px', fs: 12 }, md: { p: '10px 18px', fs: 13 }, lg: { p: '13px 22px', fs: 14 } };
  const s = sizes[size];
  const variants = {
    primary: { bg: 'linear-gradient(135deg, var(--accent), var(--accent-mid))', color: '#fff', border: 'none' },
    secondary: { bg: 'var(--card)', color: 'var(--text)', border: '1px solid var(--border)' },
    ghost: { bg: 'transparent', color: 'var(--text-sub)', border: 'none' },
    soft: { bg: 'var(--accent-light)', color: 'var(--accent)', border: '1px solid var(--accent-border)' },
    danger: { bg: 'transparent', color: '#F87171', border: '1px solid var(--border)' }
  };
  const v = disabled ? { bg: 'var(--card-alt)', color: 'var(--text-dim)', border: '1px solid var(--border)' } : variants[variant];
  return (
    <button type={type} onClick={onClick} disabled={disabled}
    style={{
      display: 'inline-flex', alignItems: 'center', gap: 7, background: v.bg, color: v.color,
      border: v.border, borderRadius: 9, padding: s.p, fontSize: s.fs,
      fontWeight: 700, cursor: disabled ? 'default' : 'pointer', transition: 'transform .12s, filter .12s',
      // Extend the background under any 1px border so the page bg doesn't
      // show through anti-aliased edges on gradient buttons.
      backgroundOrigin: 'border-box',
      backgroundClip: 'border-box',
      ...style
    }}
    onMouseEnter={(e) => {if (!disabled && variant === 'primary') e.currentTarget.style.filter = 'brightness(1.08)';}}
    onMouseLeave={(e) => {e.currentTarget.style.filter = 'none';}}
    {...rest}>
      {icon}{children}
    </button>);

};

const Avatar = ({ initials, ac, size = 34, ring }) =>

  <script type="text/babel">
// AI Coach drawer — always reachable. Floating button bottom-right.
const { useState: useStateCoach, useRef: useRefCoach, useEffect: useEffectCoach } = React;

const FLUENCY_LABEL = ['', 'The Risk', 'The Novice', 'The Practitioner', 'The Strategist', 'The Architect'];

const SEGMENT_CONTEXT = {
  enterprise:  'complex enterprise deals with long cycles and multiple stakeholders',
  mm:          'mid-market deals that need speed without sacrificing thoroughness',
  commercial:  'commercial deals where efficiency and fast value demonstration win',
  ops:         'revenue operations, process design, and pipeline data quality',
};

function buildGreeting(user) {
  const first = (user?.name || '').split(' ')[0] || 'there';
  const role = user?.role || 'seller';
  const seg = SEGMENT_CONTEXT[user?.segment] || 'your deals';
  const fluency = user?.fluencyLevel || 0;
  const isLeader = user?.roleType === 'leadership';

  let fluencyNote = '';
  if (fluency === 1) fluencyNote = " Since you're building foundational AI habits, I'll keep examples concrete and jargon-free.";
  else if (fluency >= 4) fluencyNote = " Given your advanced fluency, I can go deep on workflow design and multi-agent patterns.";

  if (isLeader) {
    return `Hey ${first}. I'm your Brainstorm coach. As a ${role}, I can help you coach your team on AI adoption, design prompting frameworks for your reps, or go deep on anything in the curriculum.${fluencyNote}`;
  }
  return `Hey ${first}. I'm your Brainstorm coach. As a ${role} working ${seg}, I can quiz you, help you build prompts for real deals, or explain anything in the curriculum.${fluencyNote}`;
}

function buildSuggestions(user) {
  const isLeader = user?.roleType === 'leadership';
  const role = user?.role || 'AE';
  const seg = user?.segment;

  if (isLeader) return [
    `How do I coach my team on the four-part frame?`,
    `Quiz me on hallucinations`,
    `Build a rep-facing prompt template`,
    `What does good AI fluency look like at ${role} level?`,
  ];

  const callSugg = seg === 'ops'
    ? `Help me write a prompt for pipeline analysis`
    : `Help me write a ${role} call prep prompt`;

  return [
    `What's the four-part frame again?`,
    `Quiz me on hallucinations`,
    callSugg,
    `Show me an example of 'show, don't tell'`,
  ];
}

function buildReplies(user) {
  const first = (user?.name || '').split(' ')[0] || 'you';
  const role = user?.role || 'seller';
  const seg = SEGMENT_CONTEXT[user?.segment] || 'your deals';
  const isLeader = user?.roleType === 'leadership';
  const fluency = user?.fluencyLevel || 0;

  const frameContext = isLeader
    ? `As a ${role}, when you're coaching reps, Context usually means: rep's name, deal stage, last call outcome, and the objection pattern you're seeing. Most coaching prompts skip the last two and get generic advice.`
    : `As a ${role} working ${seg}, your Context usually includes deal stage, champion health, and the last objection you heard. That's your unfair advantage — the model has none of it unless you share it.`;

  const quizQ = isLeader
    ? `Here's one: A rep writes "Help me prep for my renewal call" and gets a generic email. Which part of the four-part frame is most likely missing? (a) Role (b) Context (c) Format (d) Task`
    : `Here's one: You write "Help me prep for my Acme call" and get a generic output. Which part of the four-part frame is most likely missing? (a) Role (b) Context (c) Format (d) Task`;

  const callReply = user?.segment === 'ops'
    ? `For pipeline analysis prompts, your Context is everything: which stage, which reps, what time window, and what decision you're trying to make. "Analyze my pipeline" gets garbage. "Analyze Q2 pipeline for AEs in Enterprise NAMER where stage hasn't moved in 14+ days — flag top 5 at-risk and suggest next actions" gets signal.`
    : `For ${role} call prep, lead with the friction from your last interaction — that's your Context. Format it as: "You are a ${role} following up after [specific moment]. The buyer's core concern is [X]. Write a [length] [format] that [specific ask]." Want me to draft one with your last deal details?`;

  const showReply = fluency >= 3
    ? `Paste two outputs you already love, then ask for a third. The model pattern-matches on structure and tone better than any adjective you could write. For ${role}s working ${seg}, your best emails are the most specific training data you have.`
    : `Instead of saying "make it more professional," paste an email you liked and say "match this tone." The model learns faster from examples than adjectives. Try it with a cold email you've sent that actually got a reply.`;

  return {
    default: buildGreeting(user),
    frame: `Role · Task · Context · Format. ${frameContext}`,
    quiz: quizQ,
    call: callReply,
    show: showReply,
  };
}

function pickReply(text, replies) {
  const t = text.toLowerCase();
  if (/four|frame|rtcf|role.*task|context|format/.test(t)) return replies.frame;
  if (/quiz|test|check|knowledge/.test(t)) return replies.quiz;
  if (/call|prep|email|prompt.*deal|deal.*prompt|pipeline|analysis/.test(t)) return replies.call;
  if (/show|example|sample|tone|style/.test(t)) return replies.show;
  return replies.default;
}

const TypingDots = () =>
<span style={{ display: 'inline-flex', gap: 3, alignItems: 'center', height: 14 }}>
    {[0, 1, 2].map((i) =>
  <span key={i} style={{
    width: 5, height: 5, borderRadius: '50%', background: 'var(--accent)',
    animation: 'bs-typing 1.2s infinite', animationDelay: `${i * 0.15}s`
  }} />
  )}
  </span>;


const Coach = ({ open, setOpen, contextChip, locked, lockedReason, user }) => {
  const { IconClose, IconSend, IconBolt, IconSpark, IconLock } = window.BrIcons;
  const { CoachMark, CoachGlyph } = window.BrPrim;
  const replies = buildReplies(user);
  const suggestions = buildSuggestions(user);
  const [messages, setMessages] = useStateCoach([
    { from: 'coach', text: replies.default }
  ]);
  const [input, setInput] = useStateCoach('');
  const [thinking, setThinking] = useStateCoach(false);
  const scrollRef = useRefCoach(null);

  useEffectCoach(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
