  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

const ModuleCompleteCelebration = ({ toast }) => {
  const { useState, useEffect, useMemo } = React;
  const { IconCheck } = window.BrIcons;
  const finalScore = toast.score == null ? null : toast.score;

  // Score count-up
  const [displayScore, setDisplayScore] = useState(0);
  useEffect(() => {
    if (finalScore == null) return;
    const start = performance.now();
    const dur = 800;
    let raf;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / dur);
      // ease-out cubic
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplayScore(Math.round(eased * finalScore));
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [finalScore]);

  // Confetti pieces — randomized but stable per mount
  const pieces = useMemo(() => {
    const colors = ['#4CFEC8', '#3CAFF2', '#FFE03F', '#FF7A45', '#997CED', '#FF2370'];
    const n = 28;
    return Array.from({ length: n }, (_, i) => {
      const angle = (Math.PI * 2 * i) / n + (Math.random() - 0.5) * 0.4;
      const dist = 80 + Math.random() * 90;
      const cx = Math.cos(angle) * dist + 'px';
      const cy = Math.sin(angle) * dist - 30 + 'px'; // slight upward bias
      const cr = (Math.random() * 720 - 360) + 'deg';
      const cd = (0.9 + Math.random() * 0.6).toFixed(2) + 's';
      const size = 6 + Math.random() * 6;
      const color = colors[i % colors.length];
      const shape = i % 3; // 0 sq, 1 circle, 2 ribbon
      return { i, cx, cy, cr, cd, size, color, shape, delay: (Math.random() * 0.08).toFixed(2) + 's' };
    });
  }, [toast.title]);

  return (
    <div style={{
      position:'fixed', inset:0, zIndex:9000, pointerEvents:'none',
      display:'flex', alignItems:'center', justifyContent:'center'
    }}>
      {/* Confetti origin — centered burst */}
      <div style={{ position:'absolute', left:'50%', top:'50%', width:0, height:0 }}>
        {pieces.map(p => (
          <span key={p.i} className="bs-mc-confetti" style={{
            position:'absolute', left:0, top:0,
            width: p.shape === 2 ? p.size * 0.4 : p.size,
            height: p.shape === 2 ? p.size * 1.6 : p.size,
            background: p.color,
            borderRadius: p.shape === 1 ? '50%' : 2,
            ['--cx']: p.cx, ['--cy']: p.cy, ['--cr']: p.cr, ['--cd']: p.cd,
            animationDelay: p.delay,
            boxShadow: `0 0 8px ${p.color}55`
          }}/>
        ))}
      </div>

      {/* Card */}
      <div className="bs-mc-card" style={{
        position:'absolute', left:'50%', top:'50%',
        transform:'translate(-50%, 0)',
        background:'var(--card)', border:'1px solid var(--green-border)',
        borderRadius:'calc(var(--radius) + 4px)',
        padding:'28px 36px 24px', minWidth:300,
        display:'flex', flexDirection:'column', alignItems:'center', gap:10,
        boxShadow:'0 24px 60px -16px rgba(0,0,0,0.55), 0 0 0 1px rgba(76,254,200,0.08)',
        whiteSpace:'nowrap'
      }}>
        {/* Animated badge with expanding ring */}
        <div style={{ position:'relative', width:64, height:64, marginBottom:4 }}>
          <span className="bs-mc-ring" style={{
            position:'absolute', inset:0, borderRadius:'50%',
            border:'2px solid var(--green)', boxSizing:'border-box'
          }}/>
          <span className="bs-mc-ring" style={{
            position:'absolute', inset:0, borderRadius:'50%',
            border:'2px solid var(--green)', boxSizing:'border-box',
            animationDelay:'.18s'
          }}/>
          <div className="bs-mc-badge" style={{
            position:'absolute', inset:0, borderRadius:'50%',
            background:'var(--green-light)', border:'1.5px solid var(--green-border)',
            display:'flex', alignItems:'center', justifyContent:'center',
            transformOrigin:'center'
          }}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path className="bs-mc-check" d="M5 12.5l4.5 4.5L19 7"
                stroke="var(--green)" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          {/* Sparkles */}
          <span className="bs-mc-sparkle" style={{
            position:'absolute', left:-10, top:6, width:8, height:8,
            background:'var(--green)', borderRadius:'50%', animationDelay:'.4s'
          }}/>
          <span className="bs-mc-sparkle" style={{
            position:'absolute', right:-8, top:18, width:5, height:5,
            background:'#FFE03F', borderRadius:'50%', animationDelay:'.55s'
          }}/>
          <span className="bs-mc-sparkle" style={{
            position:'absolute', right:0, bottom:-6, width:6, height:6,
            background:'#3CAFF2', borderRadius:'50%', animationDelay:'.7s'
          }}/>
        </div>

        <div style={{
          fontSize:11, fontWeight:700, letterSpacing:'0.12em',

        }}>

        <div style={{

            }}>
              {displayScore}

const PlatformTour = ({ onFinish }) => {
  const [step, setStep] = useStateTour(0);
  const [rect, setRect] = useStateTour(null);
  const overlayRef = useRefTour(null);

  const current = TOUR_STEPS[step];

  useEffectTour(() => {
    if (!current.target) {
      setRect(null);
      return;
    }
    const el = document.getElementById(current.target);
    if (!el) {
      setRect(null);
      return;
    }

    // Determine if the element is already comfortably in view. If yes,
    // skip scrolling entirely — the spotlight position transition (CSS) does
    // the visual work and feels much smoother than scroll + re-poll.
    const r0 = el.getBoundingClientRect();
    const vh = window.innerHeight;
    const inView = r0.top > 60 && r0.bottom < vh - 60;

    if (!inView) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // Poll the rect during any scroll. The CSS transition on the spotlight
    // smooths motion between rects so even sparse updates feel fluid.
    let raf;
    let lastTop = null;
    let stableFrames = 0;
    const maxMs = inView ? 60 : 1200;
    const start = performance.now();

    const tick = () => {
      const r = el.getBoundingClientRect();
      setRect({ top: r.top, left: r.left, width: r.width, height: r.height });

      const elapsed = performance.now() - start;
      if (lastTop !== null && Math.abs(r.top - lastTop) < 0.5) {
        stableFrames += 1;
      } else {
        stableFrames = 0;
      }
      lastTop = r.top;

      if (stableFrames >= 4 || elapsed > maxMs) return;
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);

    return () => { if (raf) cancelAnimationFrame(raf); };
  }, [step]);

  const next = () => {
    if (step < TOUR_STEPS.length - 1) setStep(s => s + 1);
    else onFinish();
  };
  const back = () => { if (step > 0) setStep(s => s - 1); };

  const PAD = 16;
  const CARD_W = 420;

  const spotlightStyle = rect ? {
    position: 'fixed',
    top: rect.top - PAD,
    left: rect.left - PAD,
    width: rect.width + PAD * 2,
    height: rect.height + PAD * 2,
    borderRadius: 18,
    boxShadow: '0 0 0 9999px rgba(10,8,18,.82)',
    zIndex: 9998,
    pointerEvents: 'none',
    transition: 'top 380ms cubic-bezier(.22,.61,.36,1), left 380ms cubic-bezier(.22,.61,.36,1), width 380ms cubic-bezier(.22,.61,.36,1), height 380ms cubic-bezier(.22,.61,.36,1)',
    willChange: 'top, left, width, height',
  } : null;

  // Sidebar spotlight for the 'sidebar' step — covers the left rail
  const sidebarSpotlightStyle = current.id === 'sidebar' ? {
    position: 'fixed',
    top: 0,
    left: 0,
    width: 232,
    height: '100vh',
    borderRadius: 0,
    boxShadow: '0 0 0 9999px rgba(10,8,18,.82)',
    zIndex: 9998,
    pointerEvents: 'none',
    transition: 'opacity 380ms cubic-bezier(.22,.61,.36,1)',
  } : null;

  const getCardPos = () => {
    if (current.position === 'center' || (!rect && current.id !== 'sidebar')) {
      return {
        position: 'fixed',
        top: '50%',
        left: '50%',
        transform: 'translate(-50%, -50%)',
        zIndex: 9999,
      };
    }
    if (current.id === 'sidebar') {
      return {
        position: 'fixed',
        top: '50%',
        left: 248,
        transform: 'translateY(-50%)',
        zIndex: 9999,
      };
    }
    if (!rect) return { position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', zIndex: 9999 };

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    if (current.position === 'right') {
      return {
        position: 'fixed',
        top: Math.min(rect.top, vh - 220),
        left: rect.left + rect.width + 20,
        zIndex: 9999,
      };
    }
    if (current.position === 'left') {
      // If element is in the lower portion of the screen, anchor card bottom above it
      if (rect.top > vh * 0.55) {
        return {
          position: 'fixed',
          bottom: vh - rect.top + 16,
          left: Math.max(rect.left - CARD_W - 20, 20),
          zIndex: 9999,
        };
      }
      return {
        position: 'fixed',
        top: Math.max(rect.top + rect.height / 2 - 100, 20),
        left: Math.max(rect.left - CARD_W - 20, 20),
        zIndex: 9999,
      };
    }
    if (current.position === 'below') {
      return {
        position: 'fixed',
        top: rect.top + rect.height + 20,
        left: Math.min(Math.max(rect.left, 20), vw - CARD_W - 20),
        zIndex: 9999,
      };
    }
    if (current.position === 'above') {
      return {
        position: 'fixed',
        top: rect.top - 20,
        left: Math.min(Math.max(rect.left, 20), vw - CARD_W - 20),
        transform: 'translateY(-100%)',
        zIndex: 9999,
      };
    }
    return { position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', zIndex: 9999 };
  };

  const arrowStyle = (() => {
    if (!rect || current.position === 'center') return null;
    if (current.id === 'sidebar') return null;
    const base = {
      position: 'absolute',
      width: 0, height: 0,
      borderStyle: 'solid',
    };
    if (current.position === 'right') {
      return { ...base, left: -12, top: 26, borderWidth: '10px 12px 10px 0', borderColor: 'transparent var(--card) transparent transparent' };
    }
    if (current.position === 'left') {
      return { ...base, right: -12, top: 26, borderWidth: '10px 0 10px 12px', borderColor: 'transparent transparent transparent var(--card)' };
    }
    if (current.position === 'below') {
      return { ...base, top: -12, left: 28, borderWidth: '0 10px 12px 10px', borderColor: 'transparent transparent var(--card) transparent' };
    }
    if (current.position === 'above') {
      return { ...base, bottom: -12, left: 28, borderWidth: '12px 10px 0 10px', borderColor: 'var(--card) transparent transparent transparent' };
    }
    return null;
  })();

  const isCenter = current.position === 'center' || (current.id !== 'sidebar' && !rect);

  return (
    <>
      {/* Full dim overlay for center steps */}
      {isCenter && (
        <div style={{
          position: 'fixed', inset: 0, background: 'rgba(10,8,18,.82)', zIndex: 9998, pointerEvents: 'none'
        }} />
      )}

      {/* Spotlight cutout */}
      {spotlightStyle && <div style={spotlightStyle} />}
      {sidebarSpotlightStyle && <div style={sidebarSpotlightStyle} />}

      {/* Tooltip card */}
      <div style={{
        ...getCardPos(),
        width: CARD_W,
        transition: 'top 380ms cubic-bezier(.22,.61,.36,1), left 380ms cubic-bezier(.22,.61,.36,1), bottom 380ms cubic-bezier(.22,.61,.36,1), transform 380ms cubic-bezier(.22,.61,.36,1)',
      }}>
        <div key={step} className="bs-tour-card" style={{
          background: 'var(--card)',
          border: '1px solid var(--border)',
          borderRadius: 18,
          padding: '28px 32px',
          boxShadow: '0 20px 60px -12px rgba(0,0,0,.7)',
          position: 'relative',
        }}>
          {arrowStyle && <div style={arrowStyle} />}

          {/* Step dots */}
          <div style={{ display: 'flex', gap: 6, marginBottom: 18 }}>
            {TOUR_STEPS.map((_, i) => (
              <div key={i} style={{
                width: i === step ? 22 : 7, height: 7, borderRadius: 4,
                background: i === step ? 'var(--accent)' : 'var(--border)',
                transition: 'width .25s, background .25s',
              }} />
            ))}
          </div>

          <div style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em', color: 'var(--text)', marginBottom: 12, lineHeight: 1.2, textTransform: current.title === 'Welcome to BRAINSTORM' ? 'none' : 'inherit' }}>
            {current.title === 'Welcome to BRAINSTORM' ? (
              <>Welcome to <span style={{ textTransform:'uppercase' }}>BR<span style={{ color:'var(--accent)', fontWeight:800 }}>AI</span>NSTORM</span></>
            ) : current.title}
          </div>
          <div style={{ fontSize: 15.5, color: 'var(--text-sub)', lineHeight: 1.6, marginBottom: 26, textWrap: 'pretty' }}>
            {current.body}
          </div>

          <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
            {step > 0 && (
              <button onClick={back} style={{
                background: 'transparent', border: '1px solid var(--border)', borderRadius: 10,
                padding: '11px 18px', fontSize: 14, color: 'var(--text-sub)', cursor: 'pointer',
                fontFamily: 'inherit', fontWeight: 500,
              }}>Back</button>
            )}
            <button onClick={next} style={{
              flex: 1, background: 'linear-gradient(135deg, var(--accent), var(--accent-mid))',
              border: 'none', borderRadius: 10, padding: '12px 20px',
              fontSize: 15, fontWeight: 700, color: '#fff', cursor: 'pointer',
              fontFamily: 'inherit',
            }}>
              {current.cta || (step === TOUR_STEPS.length - 1 ? 'Got it →' : 'Next')}
            </button>
            {step === 0 && (
              <button onClick={onFinish} style={{
                background: 'transparent', border: 'none', padding: '8px 12px',
                fontSize: 12, color: 'var(--text-dim)', cursor: 'pointer', fontFamily: 'inherit',
              }}>Skip</button>
            )}
          </div>
        </div>
      </div>

      {/* Block pointer events on everything except our card */}
      <div style={{ position: 'fixed', inset: 0, zIndex: 9997 }} />
    </>
  );
};

window.BrTour = { PlatformTour };

// Post-tour "Start here" nudge — an arrow + label that anchors to the
// AI 101 journey card on the home screen. Activated by the tour's finish
// handler dispatching the bs:start-here-nudge event.
const StartHereNudge = () => {
  const [active, setActive] = useStateTour(false);
  const [rect, setRect] = useStateTour(null);

  useEffectTour(() => {
    const onActivate = (e) => {
      if (e.detail?.active) setActive(true);
    };
    window.addEventListener('bs:start-here-nudge', onActivate);
    return () => window.removeEventListener('bs:start-here-nudge', onActivate);
  }, []);

  useEffectTour(() => {
    if (!active) return;
    let raf;
    const update = () => {
      const el = document.getElementById('tour-ai101-journey');
      if (el) {
        const r = el.getBoundingClientRect();
        setRect({ top: r.top, left: r.left, width: r.width, height: r.height });
      } else {
        setRect(null);
      }
    };
    update();
    const id = setInterval(update, 200);
    const onScroll = () => { if (raf) cancelAnimationFrame(raf); raf = requestAnimationFrame(update); };
    window.addEventListener('scroll', onScroll, true);
    window.addEventListener('resize', update);
    // Auto-dismiss when the user clicks the card or anywhere on the page.
    const onClick = (ev) => {
      const card = document.getElementById('tour-ai101-journey');
      if (!card) { setActive(false); return; }
      // Click on/inside the card — dismiss immediately (they're acting on it).
      if (card.contains(ev.target)) {
        setActive(false);
      }
    };
    document.addEventListener('click', onClick, true);
    return () => {
      clearInterval(id);
      if (raf) cancelAnimationFrame(raf);
      window.removeEventListener('scroll', onScroll, true);
      window.removeEventListener('resize', update);
      document.removeEventListener('click', onClick, true);
    };
  }, [active]);

  if (!active || !rect) return null;

  // Anchor: prefer placing the nudge ABOVE the card (most reliably visible);
  // fall back below if there's no headroom.
  const labelW = 168;
  const labelH = 44;
  const gap = 14;
  const fitsAbove = rect.top - labelH - gap > 12;
  const placement = fitsAbove ? 'above' : 'below';
  const labelTop = placement === 'above'
    ? rect.top - labelH - gap
    : rect.top + rect.height + gap;
  // Center the label horizontally over the card, clamped to viewport.
  const vw = window.innerWidth;
  const idealLeft = rect.left + rect.width / 2 - labelW / 2;
  const labelLeft = Math.max(12, Math.min(vw - labelW - 12, idealLeft));

  return (
    <>
      {/* Pulse ring around the card */}
      <div style={{
        position: 'fixed',
        top: rect.top - 8, left: rect.left - 8,
        width: rect.width + 16, height: rect.height + 16,
        borderRadius: 22,
        boxShadow: '0 0 0 2px var(--accent), 0 0 0 8px color-mix(in oklab, var(--accent) 25%, transparent)',
        zIndex: 9990,
        pointerEvents: 'none',
        animation: 'bs-start-here-pulse 1.6s cubic-bezier(.4,0,.6,1) infinite',
      }} />

      {/* Pill label with a solid downward/upward triangle pointing at the card.
          Single composed element — no curved SVG, no rotation math. */}
      <div className="bs-start-here-nudge" style={{
        position: 'fixed',
        top: labelTop,
        left: labelLeft,
        width: labelW,
        height: labelH,
        zIndex: 9991,
        pointerEvents: 'auto',
      }}>
        <div style={{
          width: '100%', height: '100%',
          background: 'var(--accent)',
          color: '#fff',
          fontFamily: 'var(--font-display)',
          fontSize: 16,
          fontWeight: 700,
          letterSpacing: '-0.01em',
          borderRadius: 12,
          boxShadow: '0 8px 24px -4px color-mix(in oklab, var(--accent) 60%, transparent)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          position: 'relative',
        }}>
          Start here
          {/* Triangle pointer — pure CSS, scales reliably */}
          <span style={{
            position: 'absolute',
            left: '50%',
            transform: 'translateX(-50%)',
            ...(placement === 'above'
              ? { top: '100%', borderTop: '10px solid var(--accent)', borderBottom: 'none' }
              : { bottom: '100%', borderBottom: '10px solid var(--accent)', borderTop: 'none' }
            ),
            width: 0, height: 0,
            borderLeft: '9px solid transparent',
            borderRight: '9px solid transparent',
          }}/>
        </div>
      </div>
    </>
  );
};

window.BrStartHereNudge = { StartHereNudge };
  </script>

  <!-- src/app.jsx -->
  <script type="text/babel">
// App root — wires shell, screens, coach, celebration, tweaks.
const { useState: useStateApp, useEffect: useEffectApp, Fragment } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "violet",
  "type": "grotesque",
  "density": "comfy",
  "gamification": "balanced",
  "welcomeVariant": "aurora",
  "celebrationVariant": "cinematic",
  "showCoachByDefault": false,
  "currentScreen": "home",
  "myLearningLayout": "multiCourse",
  "sideQuestsUnlockLevel": 3
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const { Sidebar, Topbar } = window.BrShell;
  const { Coach } = window.BrCoach;
  const { HomeScreen } = window.BrHome;
  const { LessonScreen } = window.BrLesson;
  const { CheckScreen } = window.BrCheck;
  const { LevelUpCelebration } = window.BrCelebration;
  const { DashboardScreen, PathsScreen, AchievementsScreen, LeaderboardScreen, ContentScreen } = window.BrOther;
  const { CourseScreen } = window.BrCourse;
  const { InsightsScreen } = window.BrInsightsScreen;
  const { SettingsScreen } = window.BrSettings;
  const { OnboardingWizard, ONBOARD_KEY } = window.BrOnboarding;
  const { PlatformTour } = window.BrTour;
  const { IconCheck } = window.BrIcons;

  // First-run onboarding check. ?reset in the URL wipes the flag — useful for UAT.
  const [onboarded, setOnboarded] = useStateApp(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      if (params.has('reset')) {
        localStorage.removeItem(ONBOARD_KEY);
        localStorage.removeItem('br_settings_personal');
        window.history.replaceState({}, '', window.location.pathname);
        return false;
      }
      return !!localStorage.getItem(ONBOARD_KEY);
    } catch(e) { return false; }
  });

  // User identity — settings store is authoritative once onboarding is done,
  // because the Profile page lets users edit name/title/etc afterward.
  // We hydrate from settings first, fall back to the onboarding snapshot.
  const [userInfo, setUserInfo] = useStateApp(() => {
    // One-time migration: an earlier version of this app fell back to the
    // literal string 'Enterprise · West' when team was unknown. That value
    // never came from onboarding — strip it so it stops showing up in
    // Settings → Profile.
    try {
      const STALE_TEAM = 'Enterprise · West';
      ['br_settings_personal', 'bs_onboarded_v1'].forEach(key => {
        const raw = JSON.parse(localStorage.getItem(key) || 'null');
        if (raw && raw.team === STALE_TEAM) {
          raw.team = '';
          localStorage.setItem(key, JSON.stringify(raw));
        }
      });
    } catch(e) {}
    try {
      const settings = JSON.parse(localStorage.getItem('br_settings_personal') || 'null');
      const onboard  = JSON.parse(localStorage.getItem(ONBOARD_KEY) || 'null');
      if (settings || onboard) {
        const src = { ...(onboard || {}), ...(settings || {}) };
        return {
          name: src.name || 'Alex Rivera',
          role: src.title || src.roleLabel || 'AE',
          team: src.team || '',
          geo: src.geo || '',
          segment: src.segment || '',
          roleType: src.roleType || '',
          fluencyLevel: src.fluencyLevel || 0,
        };
      }
    } catch(e) {}
    return { name: 'Alex Rivera', role: 'AE', team: '', geo: '', segment: '', roleType: '', fluencyLevel: 0 };
  });

  // Keep userInfo in sync with edits made in Settings → Profile (which writes
  // straight to localStorage via the settings hook). We poll cheaply on a
  // 1.5s interval — settings edits are rare and this avoids wiring a
  // cross-component event bus just for one read path.
  useEffectApp(() => {
    const tick = () => {
      try {
        const s = JSON.parse(localStorage.getItem('br_settings_personal') || 'null');
        if (!s) return;
        setUserInfo(prev => {
          const next = {
            name: s.name || prev.name,
            role: s.title || s.roleLabel || prev.role,
            team: s.team || prev.team,
            geo: s.geo ?? prev.geo,
            segment: s.segment ?? prev.segment,
            roleType: s.roleType ?? prev.roleType,
            fluencyLevel: s.fluencyLevel ?? prev.fluencyLevel,
          };
          // Only return a new object if something actually changed,
          // so React doesn't re-render the whole tree every tick.
          const same = ['name','role','team','geo','segment','roleType','fluencyLevel']
            .every(k => prev[k] === next[k]);
          return same ? prev : next;
        });
      } catch(e) {}
    };
    const id = setInterval(tick, 1500);
    return () => clearInterval(id);
  }, []);

  const completeOnboarding = ({ name, role, roleLabel, geo, segment, roleType, fluencyLevel, team }) => {
    const info = { name: name || 'You', role: roleLabel || role || 'AE', team: team || '', geo, segment, roleType, fluencyLevel: fluencyLevel || 0 };
    setUserInfo(info);
    // Push the full onboarding payload into the settings store so Profile,
    // greetings, leaderboard, feedback, and the Coach prompt all read from
    // one place. Onboarding is authoritative — overwrite whatever was there.
    try {
      const existing = JSON.parse(localStorage.getItem('br_settings_personal') || 'null') || {};
      const merged = {
        ...existing,
        name: info.name,
        title: roleLabel || role || existing.title || 'Account Executive',
        roleId: role || existing.roleId || '',
        roleLabel: roleLabel || existing.roleLabel || '',
        team: info.team,
        geo: geo || '',
        segment: segment || '',
        roleType: roleType || '',
        fluencyLevel: info.fluencyLevel,
      };
      localStorage.setItem('br_settings_personal', JSON.stringify(merged));
    } catch(e) {}
    setOnboarded(true);
    setShowTour(true);
  };

  const [showTour, setShowTour]   = useStateApp(false);
  // Expose tour state on window so other surfaces (e.g. the home greeting's
  // rotating sub-line) can pause animations / freeze layout while the
  // walkthrough spotlight is up. Fires a custom event on every change.
  React.useEffect(() => {
    window.__bsTourActive = showTour;
    window.dispatchEvent(new CustomEvent('bs:tour-change', { detail: { active: showTour } }));
  }, [showTour]);
  const [screen, setScreen]       = useStateApp(tweaks.currentScreen || 'home');
  const [coachOpen, setCoachOpen] = useStateApp(!!tweaks.showCoachByDefault);
  const [celebOpen, setCelebOpen] = useStateApp(false);
  const [moduleToast, setModuleToast] = useStateApp(null);
  const [kcModuleId, setKcModuleId]         = useStateApp('M01');
  const [lessonModuleId, setLessonModuleId] = useStateApp('M01');
  const [moduleProgress, setModuleProgress] = useStateApp({});
  const coachLocked = screen === 'check';
  // Force-close coach when entering an assessment so its content can't help
  useEffectApp(() => { if (coachLocked) setCoachOpen(false); }, [coachLocked]);

  // Apply theme/accent/type/density to <html>
  useEffectApp(() => {
    const root = document.documentElement;
    root.dataset.theme = tweaks.theme;
    root.dataset.accent = tweaks.accent;
    root.dataset.type = tweaks.type;
    root.dataset.density = tweaks.density;
  }, [tweaks.theme, tweaks.accent, tweaks.type, tweaks.density]);

  useEffectApp(() => { if (tweaks.currentScreen && tweaks.currentScreen !== screen) setScreen(tweaks.currentScreen); }, [tweaks.currentScreen]);

  const AI101_IDS = ['M01','M02','M03','M04','M05','M06','M07'];

  // XP = 100 base + up to 50 bonus per module based on score above 70.
  const totalXP = Object.values(moduleProgress)
    .filter(v => v?.done)
    .reduce((sum, v) => sum + 100 + Math.round(Math.max(0, (v.score || 70) - 70) / 30 * 50), 0);

  // Level gates are course-based, not XP-based.
  // L1 → L2: complete all 7 AI 101 modules.
  const ai101Complete = AI101_IDS.every(id => moduleProgress[id]?.done);
  const dynLevel = ai101Complete ? 2 : 1;
  const doneCount = Object.values(moduleProgress).filter(v => v?.done).length;
  const journeyPct = Math.round(doneCount / AI101_IDS.length * 100);

  const onScreenChange = (id) => { setScreen(id); setTweak('currentScreen', id); };
  // Mark a module as touched so the syllabus can distinguish "Up next /
  // not started" from "In progress" — the chip on My Learning was previously
  // showing "Reading now" the moment a module became active, even if the user
  // had never opened it.
  const markStarted = (mid) => {
    if (!mid) return;
    setModuleProgress(prev => {
      if (prev[mid]?.done || prev[mid]?.started) return prev;
      return { ...prev, [mid]: { ...(prev[mid] || {}), started: true } };
    });
  };
  const goCheck = () => { setKcModuleId(lessonModuleId || 'M01'); markStarted(lessonModuleId || 'M01'); onScreenChange('check'); };
  const startCheck = (mid) => { setKcModuleId(mid || 'M01'); markStarted(mid || 'M01'); onScreenChange('check'); };
  const startLesson = (mid) => { setLessonModuleId(mid || 'M01'); markStarted(mid || 'M01'); onScreenChange('lesson'); };
  const handleTourFinish = () => {
    setShowTour(false);
    onScreenChange('home');
    // Surface a "Start here" arrow nudge pointing at the AI 101 journey card.
    setTimeout(() => {
      window.dispatchEvent(new CustomEvent('bs:start-here-nudge', { detail: { active: true } }));
    }, 200);
  };

  // Overview-kind modules (e.g. M00 · Course Overview) skip the knowledge check.
  // Finishing the read marks the module done directly and routes back to the
  // course page so the next module unlocks visibly.
  const completeOverview = (mid) => {
    const id = mid || lessonModuleId;
    setModuleProgress(prev => ({ ...prev, [id]: { done: true, score: null, kind: 'overview' } }));
    onScreenChange('course');
  };

  const completeCheck = (rawScore) => {
    const mid = kcModuleId;
    // Score is computed from actual KC answers (0–100). Fall back to a
    // reasonable default if for some reason it wasn't passed through.
    const score = (typeof rawScore === 'number' && !isNaN(rawScore))
      ? Math.max(0, Math.min(100, Math.round(rawScore)))
      : 70;
    const newProgress = { ...moduleProgress, [mid]: { done: true, score } };
    setModuleProgress(newProgress);

    // Show module-complete toast (not a level-up — just congratulations).
    const modData = window.BrData.MODULES_AI101.find(m => m.id === mid);
    setModuleToast({ title: modData?.title || mid, score });
    setTimeout(() => setModuleToast(null), 2600);

    // Level-up celebration only when ALL AI 101 modules just became complete.
    const justFinished = AI101_IDS.every(id => newProgress[id]?.done);
    const wasFinished  = AI101_IDS.every(id => moduleProgress[id]?.done);
    if (justFinished && !wasFinished) setCelebOpen(true);

    onScreenChange('course');
  };


  const renderScreen = () => {
    const common = {
      user: userInfo, gamification:tweaks.gamification, density:tweaks.density,
      openCoach:() => setCoachOpen(true),
      goto: onScreenChange,
      startCheck,
      startLesson,
      totalXP,
    };
    switch (screen) {
      case 'home':         return <HomeScreen {...common} moduleProgress={moduleProgress} />;
      case 'dashboard':    return <DashboardScreen {...common} moduleProgress={moduleProgress} />;
      case 'course':       return <CourseScreen {...common} moduleProgress={moduleProgress} layout={tweaks.myLearningLayout} />;
      case 'lesson':       return <LessonScreen {...common} onComplete={goCheck} moduleId={lessonModuleId} moduleProgress={moduleProgress} completeOverview={completeOverview} />;
      case 'check':        return <CheckScreen {...common} onComplete={(s) => completeCheck(s)} moduleId={kcModuleId} />;
      case 'paths':        return <PathsScreen {...common} moduleProgress={moduleProgress} userLevel={dynLevel} sideQuestsUnlockLevel={tweaks.sideQuestsUnlockLevel} />;
      case 'achievements': return <AchievementsScreen {...common} />;
      case 'leaderboard':  return <LeaderboardScreen {...common} />;
      case 'insights':     return <InsightsScreen {...common} />;
      case 'settings':     return <SettingsScreen {...common} user={userInfo} />;
      default:             return <HomeScreen {...common} />;
    }
  };

  const screenLabels = {
    home:'01 Home', dashboard:'02 Dashboard', course:'03 Course (AI 101)', lesson:'04 Lesson', check:'05 Knowledge Check',
    paths:'06 Paths', achievements:'07 Achievements', leaderboard:'08 Leaderboard',
    insights:'09 Insights', settings:'10 Settings'
  };

  const { TweaksPanel, TweakSection, TweakRadio, TweakSelect, TweakToggle, TweakButton, TweakSlider } = window;

  if (!onboarded) return (
    <div style={{ display:'contents' }}>
      <OnboardingWizard onComplete={completeOnboarding} variant={tweaks.welcomeVariant} />
      <TweaksPanel title="Tweaks">
        <TweakSection label="Welcome screen" />
        <TweakRadio label="Style" value={tweaks.welcomeVariant} onChange={v => setTweak('welcomeVariant', v)}
          options={[
            { value:'classic',       label:'Classic' },
            { value:'aurora',        label:'Aurora' },
            { value:'constellation', label:'Map' },
            { value:'spotlight',     label:'Editorial' }
          ]} />
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={tweaks.theme} onChange={v => setTweak('theme', v)}
          options={[{value:'dark', label:'Dark'}, {value:'light', label:'Light'}]} />
        <TweakSelect label="Accent" value={tweaks.accent} onChange={v => setTweak('accent', v)}
          options={[
            { value:'violet', label:'Violet (brand)' },
            { value:'ember',  label:'Ember (warm)' },
            { value:'tide',   label:'Tide (cool)' }
          ]} />
      </TweaksPanel>
    </div>
  );

  return (
    <div data-screen-label={screenLabels[screen]} style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar screen={screen} setScreen={onScreenChange} user={userInfo}
        level={dynLevel} journeyPercent={journeyPct} gamification={tweaks.gamification}
        sideQuestsUnlockLevel={tweaks.sideQuestsUnlockLevel} />
      <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column', height:'100vh' }}>
        <Topbar user={userInfo} level={dynLevel} streak={7} gamification={tweaks.gamification} goto={onScreenChange}
          theme={tweaks.theme} setTheme={(v) => setTweak('theme', v)} />
        <div style={{ flex:1, minHeight:0 }}>{renderScreen()}</div>
      </div>

      <Coach open={coachOpen} setOpen={setCoachOpen}
        user={userInfo}
        locked={coachLocked}
        lockedReason={coachLocked ? 'Knowledge checks measure what you actually know. The Coach pauses for the duration of the assessment and resumes the moment you submit.' : undefined}
        contextChip={
        screen === 'lesson' ? `Module ${lessonModuleId.slice(1)} · Lesson` :
        screen === 'check'  ? `Knowledge check · ${kcModuleId}` :
        screen === 'course' ? 'AI 101 · Course' :
        screen === 'home'   ? 'Today · Home' :
        screen.charAt(0).toUpperCase() + screen.slice(1)
      } />

      <LevelUpCelebration open={celebOpen} onClose={() => setCelebOpen(false)} variant={tweaks.celebrationVariant} toLevel={dynLevel} />

      {showTour && <PlatformTour onFinish={handleTourFinish} />}
      {(() => {
        const { StartHereNudge } = window.BrStartHereNudge || {};
        return StartHereNudge ? <StartHereNudge /> : null;
      })()}

      {/* Module-complete celebration — confetti + ring + score count-up */}
      {moduleToast && <ModuleCompleteCelebration toast={moduleToast} />}

      {/* Tweaks */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={tweaks.theme} onChange={v => setTweak('theme', v)}
          options={[{value:'dark', label:'Dark'}, {value:'light', label:'Light'}]} />
        <TweakSelect label="Accent" value={tweaks.accent} onChange={v => setTweak('accent', v)}
          options={[
            { value:'violet', label:'Violet (default)' },
            { value:'ember',  label:'Ember (warm)' },
            { value:'tide',   label:'Tide (cool)' }
          ]} />
        <TweakRadio label="Type" value={tweaks.type} onChange={v => setTweak('type', v)}
          options={[{value:'grotesque', label:'Grotesque'}, {value:'serif', label:'Serif'}]} />
        <TweakRadio label="Density" value={tweaks.density} onChange={v => setTweak('density', v)}
          options={[{value:'comfy', label:'Comfy'}, {value:'compact', label:'Compact'}]} />

        <TweakSection label="Side Quests gating" />
        <TweakSlider label="Unlock at level" value={tweaks.sideQuestsUnlockLevel} min={1} max={5} step={1} unit=""
          onChange={v => setTweak('sideQuestsUnlockLevel', v)} />

        <TweakSection label="Gamification" />
        <TweakRadio label="Intensity" value={tweaks.gamification} onChange={v => setTweak('gamification', v)}
          options={[
            { value:'subtle',  label:'Subtle' },
            { value:'balanced',label:'Balanced' },
            { value:'bold',    label:'Bold' }
          ]} />

        <TweakSection label="Celebration" />
        <TweakRadio label="Style" value={tweaks.celebrationVariant} onChange={v => setTweak('celebrationVariant', v)}
          options={[
            { value:'cinematic', label:'Cinematic' },
            { value:'minimal',   label:'Minimal' }
          ]} />
        <TweakButton label="Preview level-up" onClick={() => setCelebOpen(true)} />

        <TweakSection label="Dev tools" />
        <TweakButton label="Test onboarding" onClick={() => setOnboarded(false)} />
        <TweakButton label="Test walk-through" onClick={() => setShowTour(true)} />
        <TweakButton label="Reset onboarding (wipes profile)" secondary onClick={() => { try { localStorage.removeItem(ONBOARD_KEY); } catch(e){} setOnboarded(false); }} />
        <TweakButton label="Reset module progress" secondary onClick={() => setModuleProgress({})} />

        <TweakSection label="Jump to screen" />
        <TweakSelect label="Screen" value={screen} onChange={v => onScreenChange(v)}
          options={[
            { value:'home',         label:'01 · Home (Activity)' },
            { value:'dashboard',    label:'02 · Dashboard' },
            { value:'course',       label:'03 · Course (AI 101)' },
            { value:'lesson',       label:'04 · Lesson reader' },
            { value:'check',        label:'05 · Knowledge check' },
            { value:'paths',        label:'06 · Paths' },
            { value:'achievements', label:'07 · Achievements' },
            { value:'leaderboard',  label:'08 · Leaderboard' },
            { value:'insights',     label:'09 · Insights (admin)' },
            { value:'settings',     label:'10 · Settings' },
          ]} />

        <TweakSection label="Lesson" />
        <TweakSelect label="Module" value={lessonModuleId} onChange={v => startLesson(v)}
          options={[
            { value:'M01', label:'M01 · What is AI?' },
            { value:'M02', label:'M02 · How did we get here?' },
            { value:'M03', label:'M03 · Where is this going?' },
            { value:'M04', label:'M04 · Prompting best practices' },
            { value:'M05', label:'M05 · Avoiding hallucinations' },
            { value:'M06', label:'M06 · Right tool for the job' },
            { value:'M07', label:'M07 · Owning AI outputs' },
          ]} />

        <TweakSection label="Knowledge check" />
        <TweakSelect label="Module" value={kcModuleId} onChange={v => startCheck(v)}
          options={[
            { value:'M01', label:'M01 · What is AI?' },
            { value:'M02', label:'M02 · How did we get here?' },
            { value:'M03', label:'M03 · Where is this going?' },
            { value:'M04', label:'M04 · Prompting best practices' },
            { value:'M05', label:'M05 · Avoiding hallucinations' },
            { value:'M06', label:'M06 · Right tool for the job' },
            { value:'M07', label:'M07 · Owning AI outputs' },
          ]} />
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
