<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brainstorm: AI Fluency, earned.</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@300;400;500;600;700;800&family=Archivo:wght@500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Brand: Dark Purple #3E0075 · Violet #8039DF · Lavender #997CED · Red #FF2370
         Green #4CFEC8 · Blue #3CAFF2 · Yellow #FFE03F · Dark Gray #36333A · Blue Gray #EEF4FE */
      --bg: #0A0612;
      --surface: #13091F;
      --card: #180D26;
      --card-alt: #1F1230;
      --border: #2A1840;
      --border-soft: #1F1230;
      --text: #F5F0FF;
      --text-sub: #D1C7EE;
      --text-dim: #9886BC;

      --accent: #997CED;          /* brand Lavender */
      --accent-deep: #3E0075;     /* brand Dark Purple */
      --accent-light: #1B0E36;
      --accent-mid: #8039DF;      /* brand Violet */
      --accent-border: #4A2A8C;
      --accent-2: #FF2370;        /* brand Red */
      --accent-2-light: #2C0A18;
      --accent-2-border: #6E1E3F;

      --green: #4CFEC8;           /* brand Green */
      --green-light: #0A2E24;
      --green-border: #1F7F62;

      --blue: #3CAFF2;            /* brand Blue */
      --blue-light: #0A2238;
      --blue-border: #1A4A78;
      --yellow: #FFE03F;          /* brand Yellow */
      --yellow-light: #2A2410;
      --yellow-border: #6E5F1E;
      --neutral-900: #36333A;     /* brand Dark Gray */
      --neutral-50: #EEF4FE;      /* brand Blue Gray */

      /* Brand: BN Axel Grotesk (display, paid — falls back to Archivo)
         Inter Tight (subheaders/eyebrows) · Inter (body) */
      --font-display: 'BN Axel Grotesk', 'Archivo', 'Inter Tight', system-ui, sans-serif;
      --font-heading: 'Inter Tight', system-ui, sans-serif;
      --font-body: 'Inter', 'Inter Tight', system-ui, sans-serif;
      --font-mono: 'Inter', 'Inter Tight', system-ui, sans-serif;

      --radius-sm: 8px;
      --radius: 12px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --pad: 1;

      --shadow-soft: 0 2px 8px rgba(0,0,0,0.22);
      --shadow-pop: 0 8px 28px rgba(0,0,0,0.36);
      --accent-on: #ffffff;

      /* Responsive containers — scale with viewport so 32" monitors aren't
         a fixed-width column with massive empty margins. Reading-first
         screens stay narrow for legibility; dashboards expand. */
      --container-narrow: min(760px, 100% - 48px);
      --container-default: min(100% - 32px, clamp(1100px, 78vw, 1500px));
      --container-wide: min(100% - 32px, clamp(1100px, 88vw, 1900px));
      --pad-x: clamp(20px, 3vw, 56px);
    }

    /* Light theme — uses brand Blue Gray #EEF4FE & Dark Gray #36333A */
    [data-theme="light"] {
      --bg: #EEF4FE;
      --surface: #FFFFFF;
      --card: #FFFFFF;
      --card-alt: #E2EBF7;
      --border: #D2DEEE;
      --border-soft: #E2EBF7;
      --text: #36333A;
      --text-sub: #45434B;
      --text-dim: #6B6872;
      --accent-light: #ECE3FE;
      --accent-border: #C9B6F2;
      --accent-2-light: #FFE0EC;
      --accent-2-border: #F5B0CC;
      --green-light: #DDFBEF;
      --green-border: #94EBC9;
      --blue-light: #DCEEFB;
      --blue-border: #A8D2EF;
      --yellow-light: #FFF6C4;
      --yellow-border: #ECD168;
    }

    /* Accent variants */
    [data-accent="ember"] {
      --accent: #FF8B5C;
      --accent-deep: #6B1F00;
      --accent-light: #2A1208;
      --accent-mid: #E36A3A;
      --accent-border: #5B2A14;
      --accent-2: #FFD166;
      --accent-2-light: #2A2110;
      --accent-2-border: #5B4A1A;
    }
    [data-theme="light"][data-accent="ember"] {
      --accent-light: #FFEAD9;
      --accent-border: #F5C9AC;
      --accent-2-light: #FFF5D6;
      --accent-2-border: #F0DC9A;
    }

    [data-accent="tide"] {
      --accent: #5DD4F0;
      --accent-deep: #003A4E;
      --accent-light: #061E2A;
      --accent-mid: #3CB1CC;
      --accent-border: #144858;
      --accent-2: #8B9FFF;
      --accent-2-light: #0E1330;
      --accent-2-border: #2B3270;
    }
    [data-theme="light"][data-accent="tide"] {
      --accent-light: #DBF4FB;
      --accent-border: #A6DEED;
      --accent-2-light: #E5E8FF;
      --accent-2-border: #B8BDF0;
    }

    /* Type pairing alt — keeps brand body, swaps display for editorial serif */
    [data-type="serif"] {
      --font-display: 'Instrument Serif', Georgia, serif;
    }

    /* Density */
    [data-density="compact"] { --pad: 0.78; }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.55;
      font-feature-settings: 'ss01', 'cv01', 'cv11';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }
    #root { height: 100vh; overflow: hidden; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-border); background-clip: content-box; }

    button { font-family: inherit; }
    input, textarea { font-family: inherit; color: var(--text); }

    /* Animations */
    @keyframes bs-fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* No fill-mode so element shows at default opacity:1 if animation hasn't ticked. */
    .bs-fade { animation: bs-fade 0.5s cubic-bezier(.2,.8,.2,1); }

    @keyframes bs-spin {
      to { transform: rotate(360deg); }
    }
    .bs-spin { animation: bs-spin 1s linear infinite; }

    @keyframes bs-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .bs-pulse { animation: bs-pulse 1.6s ease-in-out infinite; }

    @keyframes bs-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes bs-rise {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .bs-rise { animation: bs-rise 0.6s cubic-bezier(.16,1,.3,1) backwards; }

    /* Module-complete celebration */
    @keyframes bs-mc-card {
      0%   { opacity: 0; transform: translate(-50%, 24px) scale(0.92); }
      55%  { opacity: 1; transform: translate(-50%, -4px) scale(1.02); }
      100% { opacity: 1; transform: translate(-50%, 0)    scale(1);    }
    }
    @keyframes bs-mc-ring {
      0%   { transform: scale(0.4); opacity: 0; }
      40%  { transform: scale(1);   opacity: 1; }
      100% { transform: scale(2.4); opacity: 0; }
    }
    @keyframes bs-mc-check {
      0%   { stroke-dashoffset: 36; opacity: 0; }
      40%  { stroke-dashoffset: 36; opacity: 1; }
      100% { stroke-dashoffset: 0;  opacity: 1; }
    }
    @keyframes bs-mc-badge {
      0%   { transform: scale(0);    }
      55%  { transform: scale(1.18); }
      100% { transform: scale(1);    }
    }
    @keyframes bs-mc-confetti {
      0%   { transform: translate(0,0) rotate(0deg);  opacity: 1; }
      100% { transform: translate(var(--cx), var(--cy)) rotate(var(--cr)); opacity: 0; }
    }
    @keyframes bs-mc-sparkle {
      0%, 100% { transform: scale(0.6); opacity: 0; }
      50%      { transform: scale(1);   opacity: 1; }
    }
    .bs-mc-card { animation: bs-mc-card .55s cubic-bezier(.16,1,.3,1) both; }
    .bs-mc-ring { animation: bs-mc-ring .9s cubic-bezier(.16,1,.3,1) .05s both; }
    .bs-mc-check { stroke-dasharray: 36; animation: bs-mc-check .55s cubic-bezier(.65,0,.35,1) .25s both; }
    .bs-mc-badge { animation: bs-mc-badge .55s cubic-bezier(.16,1,.3,1) both; }
    .bs-mc-confetti { animation: bs-mc-confetti var(--cd, 1.1s) cubic-bezier(.2,.6,.3,1) both; }
    .bs-mc-sparkle { animation: bs-mc-sparkle 1.2s ease-in-out both; }

    /* Welcome variants — Aurora drift, Constellation node/line entry */
    /* Visible drift: large deltas + moderate durations so motion reads at a glance. */
    @keyframes bs-aurora-drift-a {
      0%   { transform: translate(0, 0)         scale(1);    opacity: 0.85; }
      25%  { transform: translate(18vw, 10vw)   scale(1.15); opacity: 1;    }
      50%  { transform: translate(24vw, -8vw)   scale(1.08); opacity: 0.9;  }
      75%  { transform: translate(8vw, -14vw)   scale(1.20); opacity: 1;    }
      100% { transform: translate(0, 0)         scale(1);    opacity: 0.85; }
    }
    @keyframes bs-aurora-drift-b {
      0%   { transform: translate(0, 0)         scale(1);    opacity: 0.8;  }
      30%  { transform: translate(-15vw, -10vw) scale(1.22); opacity: 1;    }
      60%  { transform: translate(-22vw, 8vw)   scale(1.10); opacity: 0.9;  }
      85%  { transform: translate(-6vw, 12vw)   scale(1.28); opacity: 1;    }
      100% { transform: translate(0, 0)         scale(1);    opacity: 0.8;  }
    }
    @keyframes bs-aurora-drift-c {
      0%   { transform: translate(0, 0)         scale(1);    opacity: 0.5;  }
      33%  { transform: translate(-10vw, 14vw)  scale(0.82); opacity: 0.9;  }
      66%  { transform: translate(12vw, 8vw)    scale(1.10); opacity: 1;    }
      100% { transform: translate(0, 0)         scale(1);    opacity: 0.5;  }
    }
    @keyframes bs-aurora-breathe {
      0%, 100% { filter: brightness(0.95) saturate(1);    }
      50%      { filter: brightness(1.15) saturate(1.25); }
    }
    .bs-aurora-a { animation: bs-aurora-drift-a 22s cubic-bezier(.45,.05,.55,.95) infinite; will-change: transform, opacity; }
    .bs-aurora-b { animation: bs-aurora-drift-b 26s cubic-bezier(.45,.05,.55,.95) infinite; will-change: transform, opacity; }
    .bs-aurora-c { animation: bs-aurora-drift-c 18s cubic-bezier(.45,.05,.55,.95) infinite; will-change: transform, opacity; }
    .bs-aurora-field { animation: bs-aurora-breathe 14s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .bs-aurora-a, .bs-aurora-b, .bs-aurora-c, .bs-aurora-field { animation: none; }
    }

    @keyframes bs-cnode-in {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    .bs-cnode { animation: bs-cnode-in 0.7s cubic-bezier(.2,1.3,.4,1) backwards; }

    @keyframes bs-cline-in {
      from { stroke-dashoffset: 4; opacity: 0; }
      to   { stroke-dashoffset: 0; opacity: 1; }
    }
    .bs-cline {
      stroke-dashoffset: 4;
      animation: bs-cline-in 1.2s ease-out backwards;
    }

    @keyframes bs-confetti-fall {
      0% { transform: translateY(-40vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @keyframes bs-glow {
      0%, 100% { box-shadow: 0 0 0 rgba(176, 132, 255, 0); }
      50% { box-shadow: 0 0 28px rgba(176, 132, 255, 0.45); }
    }

    @keyframes bs-orbit {
      from { transform: rotate(0deg) translateX(48px) rotate(0deg); }
      to   { transform: rotate(360deg) translateX(48px) rotate(-360deg); }
    }

    @keyframes bs-typing {
      0%   { opacity: 0.3; }
      30%  { opacity: 1; }
      60%  { opacity: 0.3; }
      100% { opacity: 0.3; }
    }

    @keyframes bs-streak-flicker {
      0%, 100% { transform: rotate(-3deg) scale(1); }
      50% { transform: rotate(3deg) scale(1.06); }
    }

    @keyframes bs-hero-rotate {
      0%   { opacity: 0; transform: translateY(8px); filter: blur(2px); }
      60%  { opacity: 1; filter: blur(0); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes bs-start-here-pulse {
      0%, 100% { box-shadow: 0 0 0 2px var(--accent), 0 0 0 8px color-mix(in oklab, var(--accent) 25%, transparent); }
      50%      { box-shadow: 0 0 0 2px var(--accent), 0 0 0 14px color-mix(in oklab, var(--accent) 8%, transparent); }
    }
    @keyframes bs-start-here-bob {
      0%, 100% { transform: translateY(-50%) translateX(0); }
      50%      { transform: translateY(-50%) translateX(6px); }
    }
    .bs-start-here-nudge { animation: bs-start-here-bob 1.4s ease-in-out infinite; }      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    .bs-engagement-chip:hover {
      background: var(--accent-light) !important;
      border-color: var(--accent-border) !important;
      color: var(--accent) !important;
    }
    .bs-engagement-chip:hover strong { color: var(--accent) !important; }
    /* Cheers chip is a hover-target for the popover, not clickable — keep it neutral on hover. */
    .bs-cheers-chip:hover {
      background: var(--card-alt) !important;
      border-color: var(--border) !important;
      color: var(--text-sub) !important;
    }
    .bs-cheers-chip:hover strong { color: var(--text) !important; }

    .bs-reaction-btn:hover {
      background: var(--accent-light) !important;
      transform: scale(1.18) translateY(-1px);
    }
    .bs-reaction-btn { transition: transform .15s cubic-bezier(.5,1.6,.4,1), background .15s ease !important; }

    /* Selection */
    ::selection { background: var(--accent); color: var(--bg); }

    /* Utility */
    .nowrap { white-space: nowrap; }
    .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    /* Anything that opted into the "mono" stack still gets tabular numerals
       even now that the stack is Inter — keeps numbers aligned in tables/leaderboards. */
    [style*="--font-mono"], [style*="font-mono"] { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    .display { font-family: var(--font-display); letter-spacing: -0.02em; }

    /* Focus ring */
    button:focus-visible, input:focus-visible, textarea:focus-visible, [role="button"]:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
  
  </style>
</head>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <!-- src/icons.jsx -->

const IconShare     = (p) => <Icon {...p}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></Icon>;

const IconMsg       = (p) => <Icon {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Icon>;

## Module brief

You almost certainly already use AI. You've probably typed something into ChatGPT, asked Claude to draft an email, or watched Gong's call summaries appear after a customer conversation. So in one sense, "what is AI?" is a strange question to start a course with. The answer is right there on your screen.

But there's a difference between *using* AI and *understanding what's happening when you use it*. Most people skip the second part, and that skip is what creates the L1 risks Brainstorm exists to address. People who don't have a working mental model for what an AI model is doing tend to do one of two things. They treat it like a search engine that always returns true facts (it isn't, and it doesn't), or they treat it like a sentient colleague who has thoughts and intentions (it doesn't, in the way you mean). Both of those framings get you in trouble.

This module gives you a third framing. One that's accurate enough to be useful and simple enough to actually carry around. By the end, you'll have a working answer to "what is this thing I'm using" that holds up under pressure, and you'll know enough vocabulary to have a real conversation about AI with anyone in the org without getting lost.

We're keeping this practical. There's no math, no architecture diagrams, and no philosophy about whether AI is "really" thinking. What we'll do is build a working model of how these systems behave, where they come from, and what that means for how you use them.

## Learning objectives

By the end of this module you should be able to:

1. Explain, in plain language, what people mean by "AI" today, and what they don't.
2. Describe what a large language model actually does when you send it a message.
3. Recognize and use the basic vocabulary: model, prompt, context, token, agent.
4. Articulate why data (both the data the model was trained on, and the data you give it) is the foundation of everything.

## Lesson 1: What we mean when we say "AI"

The word "AI" is doing a lot of work right now. People use it to mean self-driving cars, the recommendation engine on Netflix, ChatGPT, Gong's call analysis, and the imaginary robot from a science fiction movie, all in the same conversation. That's confusing, and it's part of why people end up with such different reactions to the technology. They're not actually talking about the same thing.

Here's a useful way to cut through it. "AI" (artificial intelligence) is a *category*. Inside that category there are many different technologies, and they're not all the same. The kind of AI that's reshaping work right now, and the kind this course is mostly about, is a specific type called a **large language model**, or LLM. When most people in your work life say "I used AI to do X," what they almost always mean is "I used an LLM."

Examples of LLMs you've probably heard of: Claude (made by Anthropic), GPT-5 (made by OpenAI, behind ChatGPT), and Gemini (made by Google). These are the consumer-facing names. Under the hood, they're all the same general kind of thing. Software trained on a huge amount of text that can read and produce human-like language.

Other things that get called "AI" but aren't LLMs: image generators (Midjourney, DALL·E), the algorithm that decides which posts you see on LinkedIn, fraud detection in your bank app, voice transcription, self-driving features in your car. Some of these use techniques that are related to LLMs. Others are completely different. For our purposes, and for what's about to change your day-to-day work, the LLM is the thing.

So when we say "AI" in this course, unless we specifically say otherwise, we mean a large language model. A piece of software that takes text in and produces text out, using patterns it learned from a very large amount of text it was trained on.

That's the working definition. We'll spend the next lesson unpacking what's actually happening inside it.

> **Try this (2 minutes).** Pause for a second and answer for yourself: in the past week, where did *you* use AI? Try to get specific. Not just "ChatGPT," but "I asked ChatGPT to rewrite a follow-up email." Now, for each one, was it an LLM, or something else? You probably won't be sure on a couple. That's fine. The goal of this exercise is to start noticing where AI shows up in your actual workflow, because that's where everything in this course is going to apply.

## Lesson 2: What an LLM actually does, in plain English

Here's the most important sentence in this entire course:

**A large language model is software that, when you give it some text, predicts what text should come next, one small piece at a time.**

That's it. That's the whole mechanism. Everything else is detail.

But that sentence is so simple that it sounds like it can't be the real answer. So let's slow down and actually look at what's happening, because this is the foundation that makes everything else in the course click.

### The training step

Before you ever type anything into Claude, the model has been *trained*. Training means the model was shown an enormous amount of text (books, articles, websites, code, conversations) and learned the statistical patterns of how language works. Not memorized, exactly. Learned. It picked up that "the cat sat on the" is very likely to be followed by "mat" or "couch" and not "refrigerator." It picked up that questions in customer support emails tend to be followed by certain kinds of responses. It picked up grammar, tone, style, factual associations, code structure, and a thousand other things, all from the patterns in the text.

The training is done before you ever interact with it. By the time you open Claude.ai, the model is already trained. You're not teaching it anything new in your conversation, and we'll come back to what that means in Lesson 4.

### The "predict the next piece" step

Now you type something. The model takes your message, plus everything else in the conversation, and it asks itself a very specific question: *given everything I've seen so far, what's the most likely next piece of text?*

It picks a piece, adds it to what's been written, and then asks the same question again. *Now, given everything so far including the piece I just added, what's the most likely next piece?* And again. And again. Until it's done.

It's worth slowing down on this for a second. The model isn't planning out a whole answer and then writing it. It's not looking up an answer in a database. It's generating the response one small piece at a time, where each piece is just the most probable continuation of everything that came before.

> **Try this (3 minutes).** Open Claude.ai (or whichever AI tool you have access to) and send this exact message: *"Tell me a short, surprising fact about octopuses, and then explain how you know it."* Read what comes back. Then ask a follow-up: *"How did you generate that answer? Walk me through what you actually did, step by step."* You'll get the model's own (somewhat humble) account of how it works. Notice how it talks about probability, training data, and patterns. It will not say "I looked it up" or "I checked a database," because those things didn't happen.

### Why this matters

Once you understand that the model is generating text one piece at a time based on patterns it learned, several things start to make sense.

**Why it can sound confident about wrong things.** The model isn't checking facts as it writes. It's producing text that's *statistically likely*. Sometimes the statistically likely text is also true. Sometimes it isn't. The confidence and the correctness aren't connected the way they would be if a human were writing. We'll go deep on this in M05.

**Why the same prompt can give different answers.** There's a small amount of randomness in how the model picks each next piece, which is actually useful. Without it, every answer would be identical and robotic. But it does mean Claude's answer to "what should I say in this email?" might be different the second time you ask. That's not a bug. It's how the system works.

**Why context matters so much.** Because the model is predicting based on everything it's been given, the more relevant context you provide, the better its predictions get. A vague prompt gives the model less to work with. A specific prompt, with role, task, format, examples, narrows the prediction toward what you actually want. This is what M04 is all about.

**Why it can't "remember" things between conversations by default.** Each conversation typically starts fresh. The model doesn't have a memory of you across sessions unless something has been built specifically to give it one. Brainstorm has a memory layer. Raw Claude.ai conversations historically didn't. If you tell Claude something about yourself today, by default it won't be in tomorrow's conversation. (Memory features are increasingly common, but you should always check what a given tool does.)

### The honest part: nobody fully understands the inside

Here's something that doesn't get said enough. Even the people who *built* these models don't fully understand how they work on the inside. The training process produces a model with billions of internal parameters, and those parameters encode the patterns the model uses, but they're not human-readable. Anthropic itself has published [research](https://www.anthropic.com/research/tracing-thoughts-language-model) using a technique they call "circuit tracing" specifically because, as they put it, even they don't have a clear picture of what's happening inside.

What they've found is genuinely interesting. The models do appear to do something more than blind word-prediction in some cases. There's evidence that when Claude writes a poem, it plans the rhyming word at the end of a line *before* it starts writing the line. There's evidence of something like a shared internal "concept space" that exists across languages. And when you ask the model to explain its reasoning, the explanation it gives doesn't always match what's actually happening inside it.

You don't need to memorize any of that. But it's worth knowing because it pushes back on two extreme views: "it's just predicting words" (true mechanically, but it underestimates what falls out of that) and "it really thinks like a human" (also wrong, in different ways).

The right working stance is somewhere in between. It's a powerful pattern-matcher trained on a huge amount of human text. It often produces output that's startlingly good. It also has failure modes that are worth knowing about and habits worth building around. The next few modules are about learning those habits.

## Lesson 3: The vocabulary, demystified

When people talk about AI, they throw around terms that can make it feel more complicated than it is. Here's a working glossary of the terms you'll keep hearing. Don't memorize these. Just read through and notice the shape of each one. They'll show up over and over in the rest of the course.

**Model.** The trained system itself. "Claude Opus 4.7" is a model. "GPT-5" is a model. When people say "the model said something weird," they mean the underlying AI, not the website you used to talk to it. Models come in different sizes and capabilities. Bigger models are usually more capable but slower and more expensive to run. Different model families (Claude vs. GPT vs. Gemini) have different strengths, which we'll cover in M06.

**Prompt.** What you send to the model. The text in the chat box, plus any instructions or context you provide. Your prompt is the single biggest lever you have over the quality of the output. M04 is entirely about getting good at writing prompts.

**Context (or context window).** Everything the model can "see" at once when generating a response. This includes your current message, the conversation history, any files you've attached, and any system instructions that have been set up. Context is finite. Every model has a limit on how much it can hold at once. When that limit fills up, older parts of the conversation effectively fall out of view. Think of context like the model's working memory: it only knows what's in there right now.

**Token.** The small pieces the model actually processes. A token is roughly a word, or part of a word. "Running" might be one token, but "antidisestablishmentarianism" might be six. You don't usually need to think about tokens directly, but it's why people sometimes talk about "the cost per token" or "how many tokens fit in the context window." It's the model's basic unit.

**Training data.** The text the model was trained on before you ever saw it. Training data shapes everything the model does: what it knows, what it doesn't know, what biases it has, what styles it can produce. Different models are trained on different data, which is part of why Claude, ChatGPT, and Gemini have slightly different personalities and strengths. We'll touch on this more in Lesson 4.

**Knowledge cutoff.** The date past which the model wasn't trained on new information. If a model has a January 2026 knowledge cutoff, it doesn't natively know about events from February 2026 onward. Modern AI tools often pair the model with web search to get around this, but the underlying model itself has a cutoff. This is why asking an LLM "what happened yesterday in the news" without web search enabled gives you nothing useful.

**Hallucination.** When the model produces something that sounds confident and plausible but is actually wrong or made up. This is the single most important failure mode to understand. M05 is all about it.

**Agent.** A model that's been set up to take actions in the world, not just respond to your messages. An agent can do things like browse the web, send an email, run code, or update a file, within whatever permissions it's been given. Agents are a more advanced topic that you don't need to worry about at the 101 level. For now, just know the word: when someone says "AI agent," they mean an AI system that can do things, not just talk.

**Multimodal.** Models that can work with more than just text. Also images, audio, video. Modern frontier models like Claude and GPT-5 are multimodal. You can paste in a screenshot of a deck and ask questions about it. You can attach a PDF. The basic mechanics are the same. The model just has the ability to "read" more than text alone.

> **Try this (2 minutes).** Without scrolling back up, write down your own one-sentence definitions of: *prompt*, *context*, *training data*, *hallucination*. Don't worry about getting them word-perfect. Just check that you can produce a definition that would actually help a colleague understand. If any of them feel fuzzy, scroll back and re-read the entry. The goal isn't memorization. It's that you can use the word in a sentence and know what it means.

## Lesson 4: Why data is the whole game

If you take only one thing from this lesson, it's this: **AI is a data problem before it is anything else.** The quality of what you get out is shaped, almost entirely, by two kinds of data. What the model was trained on, and what you give it in the moment.

### Training data shapes the model itself

The model only "knows" things it saw patterns for during training. If a topic was well-represented in the training data, the model is likely to handle it well. If it wasn't, the model is likely to struggle, hedge, or, worst case, confidently make something up.

This has practical consequences:

- A model trained mostly on English will be stronger in English than in other languages, even if it can produce other languages.
- A model trained on data through January 2026 will be unreliable about anything from February 2026 onward unless given fresh information in the prompt or via web search.
- A model trained on public internet data has *not* seen Gong's internal documents, Salesforce data, or your team's Slack history. It can't draw on what it never saw.
- A model trained on data with biases (and all training data has biases) can reproduce those biases in its outputs. This is a real and well-documented issue, not a hypothetical one.

The practical implication: when you're using AI, you should always have a rough sense of whether what you're asking is the kind of thing it would have seen a lot of in training. "Help me restructure this awkward sentence." Yes, tons of patterns in training data. "Tell me what our specific Gong customer XYZ is currently focused on this quarter." No, that data was never in training. The first request is well within the model's wheelhouse. The second one, asked of a raw model with no extra context, will produce something fluent, confident, and almost certainly wrong.

### The data you provide in the moment

The second kind of data is the data *you* give the model. Your prompt, the documents you attach, the context you set up. Because the model only knows what's in its training data plus what's in the current conversation, the data you provide is your only way to bring information from your specific world into the picture.

If you're asking Claude to help you draft a follow-up to a customer call, and you don't paste in or describe the call, Claude has to make up plausible context. It will produce something fluent. But it'll be generic, because that's all it has to work with. If you paste in the call summary and the customer's last email, suddenly the model has real context and the output gets sharply better. Same model. Same prompt template. Different data in.

This is why prompting is so much more about *information* than it is about *clever wording*. The "magic" is mostly in giving the model what it needs to do the job. The wording matters too (that's M04), but it's downstream of having the right data in the conversation in the first place.

### A note on your data and where it goes

This is a 101 course, so we'll be brief, but it's worth flagging: when you put information into an AI tool, you should know what happens to it.

For Brainstorm and other Gong-approved tools, this has been thought through. There are policies about what data can go where, and the tools you have access to inside Gong are configured for safe use. But if you're using a personal AI account on something like consumer ChatGPT, the data handling is different, and pasting in customer-identifying or confidential information can be a real problem. The L1 → L2 transition includes building the reflex of *checking what tool you're using and what its data policies are* before you paste anything sensitive in.

We'll cover this more directly in M07 when we talk about owning AI outputs and the responsibility that comes with them. For now, the foundation is: data is what makes the system work, and the data you provide is the part you control.

> **Try this (3 minutes).** Think of one specific thing you did at work last week that involved AI, or that *could* have. Now ask yourself: what data did the AI need that it couldn't have known on its own? (e.g., the customer's name, the deal's stage, last week's call notes.) If you didn't provide that data, what gaps would the AI have had to fill in by guessing? This question (*what does the model not know that I'd need to give it?*) is a habit worth building. It's the seed of good prompting.

---

## Key takeaways

- "AI" is a category. The kind reshaping your work is specifically a **large language model**: software trained on enormous amounts of text that produces text in response to text input.
- An LLM works by **predicting the most likely next piece of text**, one piece at a time, based on everything it's seen so far. It is not looking things up. It is not reasoning the way a human does, even when its output looks like reasoning.
- The model's confidence and the correctness of its output **are not connected the way they would be in a human**. This is the root cause of hallucinations, which we'll cover in M05.
- The basic vocabulary you need: **model**, **prompt**, **context**, **token**, **training data**, **knowledge cutoff**, **hallucination**, **agent**. You don't need to memorize definitions. You need to be able to use the words in conversation.
- Everything an LLM does is shaped by **two kinds of data**: what it was trained on (which you don't control) and what you give it in the moment (which you do). The latter is your most important lever.
- Your starting move with any AI task should be: *what does the model not know that I'd need to give it?* That single question separates L1 use from L2 use.

## Lesson 1: The mindset shift

Anthropic's own prompting guide opens with what it calls the **golden rule**: show your prompt to a colleague who has minimal context on the task. If they'd be confused, Claude will be too.

That's the whole game, in one sentence. Everything else in this module is just elaboration on it.

Here's why this matters. The most common mistake at the L1 stage isn't writing bad prompts. It's writing prompts that are perfectly clear *to the writer* but assume context the model doesn't have. You know what account you're working on. You know what the customer cares about. You know what your team's tone is. The model knows none of that.

Think of Claude as a brilliant but new employee who lacks context on your norms and workflows. The more precisely you explain what you want, the better the result. That framing, also from Anthropic's prompting documentation, captures the right mental model. The model is genuinely capable. It's not stupid. But it's working with whatever you give it, and only what you give it.

This means the move from L1 to L2 in prompting isn't about learning tricks. It's about learning to write down the context that's already in your head. The prompts that get good output aren't clever. They're complete.

> **Try this (3 minutes).** Open Claude.ai and try this experiment. Send this exact prompt: *"Write a follow-up email to the customer."* Read what you get. Now send this: *"Write a follow-up email to a procurement lead at a mid-market manufacturing company. We had a 30-minute discovery call yesterday where we walked through their current sales process and identified two pain points: their reps don't have visibility into deal stage changes, and their managers spend Monday mornings building forecast updates manually. Tone: professional, warm, not salesy. Format: 4-6 sentences, no bullet points."* Compare the two outputs. The second prompt didn't have a single clever trick. It just had the context the first one was missing. That's the entire shift.

---

## Lesson 2: The four levers

Most effective prompts have four ingredients, and naming them makes it easier to know what to add when output isn't landing. Anthropic's documentation lists similar techniques under different names, but the four below are a clean, practical framing you can use as a checklist.

### Lever 1: Context

Context is the background information the model needs to do the task well. Who is involved. What's the situation. What's already happened. What constraints apply. Most prompts that produce generic output are missing context. The fastest way to improve a prompt is usually to add more of it.

A few things to include in context:
- The audience you're writing for (who will read this, what do they care about)
- The situation or background (what led to this task)
- Anything specific about your organization, product, or work that the model wouldn't know
- Any constraints that matter (length, things to avoid, sensitivities)

Don't worry about being too verbose. Context isn't waste; it's fuel. The model uses it to make better predictions about what good output looks like.

### Lever 2: Role

Role is the perspective or expertise you want the model to bring. "You are a senior content strategist" produces different output than "you are a casual peer reviewer." This isn't about pretending. It's about narrowing the model's prediction toward a specific kind of output.

A few patterns that work:
- "You are a [specific expert role with relevant qualifications]"
- "Act as someone who has [specific experience that matters here]"
- "Approach this the way [a specific kind of professional] would"

Setting a role even in a single sentence makes a measurable difference. It's one of the cheapest, highest-leverage prompt moves you can make.

### Lever 3: Task

Task is the actual thing you want done, stated as specifically as you can. "Help me with this email" is not a task. "Rewrite this email to be more concise, keep the same tone, and add a single clear call to action at the end" is a task.

Some patterns:
- Use specific verbs: rewrite, summarize, analyze, draft, critique
- Specify what you want kept versus changed
- If there are multiple steps, list them as numbered steps so the order is unambiguous
- If completeness matters, say what "complete" looks like

The clearer your task, the less the model has to guess.

### Lever 4: Format

Format is the structure you want for the output. Length, layout, tone, what to include or exclude. Specifying format up front saves you from a back-and-forth where you have to keep asking for adjustments.

A few format moves:
- Length: "5-7 sentences" or "no longer than one paragraph"
- Structure: "use these headers" or "as a bulleted list" or "as continuous prose, no lists"
- Tone: "professional but warm," "concise and matter-of-fact," "match this example"
- What to exclude: "no preamble," "do not include caveats," "skip the introduction"

A useful tip from Anthropic's docs: tell the model what you *want* rather than what to avoid, where possible. "Use smoothly flowing prose paragraphs" works better than "don't use bullet points." Positive instructions tend to be more effective than negative ones.

> **Try this (5 minutes).** Pick a real task you might do this week. A meeting summary, an email, a piece of analysis, anything. Write a prompt that explicitly includes all four levers. Use these markers in your head: *Context: what does the model need to know? Role: what perspective should it bring? Task: what specifically am I asking for? Format: what should the output look like?* Run the prompt in Claude.ai. Save the prompt and the output. We'll come back to it in Lesson 4.

## Lesson 3: Examples (few-shot prompting)

Examples are one of the most reliable ways to steer a model's output. Instead of describing what you want in the abstract, you show one or two examples of what good output looks like, and the model uses those to calibrate.

This is called **few-shot prompting**, and it's underused at the L1 stage because it feels like extra work. It's actually the opposite. A good example is faster to produce than a perfect description, and it tends to land better.

### When examples help most

- When tone or voice matters and is hard to describe in words
- When the structure of the output needs to match a template
- When you've tried describing what you want and the output keeps drifting from what you have in mind
- When you have an existing piece of work that's similar to what you want now

### How to use them

The simplest format works: paste in the example, then ask for new output that follows the same pattern.

> *"Here's an example of the kind of follow-up email I want to write. The new email should follow the same structure, length, and tone, but adapted to the customer details below.*
>
> *Example: [paste example email]*
>
> *Customer details: [paste relevant context]"*

A few practical notes from Anthropic's documentation:
- Examples should be **relevant** (mirror your actual use case)
- Examples should be **diverse** (cover edge cases, vary enough that the model doesn't latch onto the wrong pattern)
- Three to five examples is usually the sweet spot, but even one good example is much better than none

You can also use examples in a *negative* way. "Here's an example of output I *didn't* want, and here's why." This is less common, but useful when the model keeps drifting in a specific bad direction.

> **Try this (3 minutes).** Take the prompt you wrote in Lesson 2. Add one example to it: a piece of similar work you've done before, or one you'd consider good. Run it again. Compare the new output to the original. The example almost always improves the result, especially around tone and structure.

---

## Lesson 4: Iteration is the actual core skill

Here's the part of prompting that's the hardest to teach in writing because it's mostly a habit, not a technique.

**Your first prompt is a hypothesis. Your second, third, and fourth prompts are where the real work happens.**

This is one of the most important findings from Anthropic's [AI Fluency Index research](https://www.anthropic.com/research/AI-fluency-index). The single strongest predictor of every other fluency behavior is whether someone iterates and refines in conversation, rather than accepting the first response and moving on. About 86% of the substantive conversations in their study showed iteration. Conversations with iteration showed roughly double the number of other fluency behaviors compared to single-shot use. The data is clean: people who iterate get better results. Period.

The L1 user pattern is: write a prompt, get output, take it or leave it, move on. The L2 user pattern is: write a prompt, get output, *engage with it*, refine, push back, ask follow-ups. The model is not a vending machine. It's a conversation partner. Treat it like one.

### What iteration looks like in practice

A few patterns that work:

**"That's close, but..."** When output is in the right direction but missing something, say so. "That's close, but the tone is too formal. Try again with the tone of a peer talking to a peer." The model uses your feedback to recalibrate.

**"Push back on my assumption"** Anthropic's research found that only about 30% of users tell the model how they want it to interact with them. That's a missed opportunity. Try adding instructions like "push back if my framing is wrong" or "tell me what you're uncertain about" or "walk me through your reasoning before giving the answer." Setting the terms of the collaboration up front changes the dynamic.

**"Show me your reasoning"** When you don't trust an output, ask the model to explain how it got there. This sometimes reveals faulty assumptions you can correct.

**"Try again, but..."** Sometimes the simplest move is to ask for a second attempt with a single specific change. "Try again, but make it half the length." "Try again, but for an executive audience instead." The model is good at targeted revisions when you're specific about what you want different.

### The "polished output" trap

There's an important warning from the AI Fluency Index research worth noting. When AI produces output that *looks* polished (a clean email, a well-structured document, working code), users tend to evaluate it less critically. Across the data, polished outputs were associated with *lower* rates of fact-checking, questioning the model's reasoning, and identifying missing context.

This is the L1 trap. The output looks done, so you treat it as done. The L2 move is the opposite: the more polished the output, the more you should slow down and verify. Polish is not the same as accuracy. We'll go deep on this in M05, which is entirely about hallucinations and the verification practice that catches them.

> **Try this (5 minutes).** Take the output you got from Lesson 3. Don't accept it. Pick one thing you'd change. Maybe the tone is slightly off, or one section is weaker than the rest, or you want it shorter. Send a single follow-up message asking for that specific change. Compare the second output to the first. Now ask for one more revision. By the third version, you should have something noticeably better than the first. That's the iteration loop. Build it into your reflexes.

---

## Key takeaways

- The golden rule of prompting: show your prompt to a colleague with minimal context on the task. If they'd be confused, the model will be too.
- The four levers of effective prompts: **Context** (background the model needs), **Role** (perspective to bring), **Task** (specifically what you want done), **Format** (what the output should look like).
- Tell the model what you *want* rather than what to avoid, where you can. Positive instructions land better than negative ones.
- **Examples** (few-shot prompting) are one of the most reliable ways to steer output, especially for tone, voice, and structure. One good example is much better than none.
- **Iteration is the actual core skill.** Your first prompt is a hypothesis. The L2 user engages with the output, pushes back, refines. The L1 user takes the first thing they get and moves on. This single behavior is the strongest predictor of every other fluency behavior in the data.
- Beware the **polished output trap**. The cleaner the output looks, the more careful you should be about verifying it. Polish is not the same as accuracy.

**AI 101 · Module 2 of 7**
**Estimated time: 30 minutes content + 10 to 15 minute knowledge check + applied activity**
**Level transition: Continuing the L1 → L2 progression, this module builds the historical context that grounds your judgment**

---

## Module brief

In M01 you got a working definition of what AI actually is and a basic picture of how a large language model produces output. That's the *what*. This module is the *how did we get here*.

It matters because AI has a long history of overpromising. People who don't know that history can swing between two bad takes. They either treat the current moment as completely unprecedented (in which case they overestimate what's possible right now), or they treat it as another hype cycle that will fade (in which case they underestimate the shift that's actually happening). Both reactions get in the way of using the technology well.

The honest read sits between those extremes. AI as a field has existed for over 70 years. It has gone through real breakthrough moments and real disappointments. What's happening now is built on that long arc, which is part of why it's not just hype, but it's also genuinely different from previous waves in specific, identifiable ways. By the end of this module, you'll be able to explain to a thoughtful skeptic why this moment matters and what changed to make it possible.

We'll keep this practical, not academic. You don't need the full history of computer science. You need just enough context to make sense of where we are and to recognize what's actually new versus what's been promised before.

## Learning objectives

By the end of this module you should be able to:

1. Sketch the broad arc of AI as a research field, including the previous "AI winters" that followed earlier hype cycles.
2. Explain the shift from rule-based AI to machine learning, and why that shift mattered.
3. Identify the transformer architecture (2017) as the technical breakthrough that made modern LLMs possible, and explain in plain language what changed.
4. Articulate, to a skeptical colleague, why this AI moment is different from previous hype cycles. Without overclaiming, and without dismissing.

---

## Lesson 1: The long arc

The term "artificial intelligence" was coined in 1956, at a now-famous summer workshop at Dartmouth College. The researchers there genuinely thought they could solve most of the problem within a generation. They were wrong, but their ambition set the agenda for the field for decades.

The first 30 or 40 years of AI were dominated by a particular approach: try to encode human knowledge as explicit rules, then write programs that could reason over those rules. This is called **symbolic AI** or **rule-based AI**, and it produced some impressive achievements (early chess programs, expert systems for medical diagnosis, etc.) but also hit a wall pretty quickly. The world is messy. Encoding enough rules to capture human-level judgment turned out to be much harder than expected. Programs that worked beautifully in narrow domains fell apart the moment they encountered something the rules didn't cover.

When the gap between what AI promised and what it could actually do became too obvious, funding dried up, researchers left the field, and the term "AI" became something you'd avoid putting on your resume. There were two of these "AI winters," roughly in the late 1970s and again in the late 1980s and early 1990s. Each one followed a wave of hype that didn't deliver, and each one set the field back significantly.

This is the part of AI history most people don't know, and it's the part you most need to know. The reason the field has a credibility problem is that it has burned a lot of credibility before. If you've ever heard a thoughtful person say "I'll believe AI is real when I see it," they're often reacting (consciously or not) to that history. Their skepticism isn't unreasonable. It's based on track record.

So when we say this moment is different, we have to actually defend that claim. Not just assert it. The rest of this module is that defense.

> **Try this (2 minutes).** Before reading further, write down what *you* believed about AI five years ago, in 2021. What did you think it could do? What did you think it couldn't? Then, what's changed for you since? You don't need to share this. The point is to notice your own starting point so you can see your own movement through the rest of this module.

---

## Lesson 2: The shift to machine learning

Sometime in the 1990s and 2000s, AI research started to move away from the "encode rules" approach and toward something fundamentally different: **machine learning**.

The core idea is straightforward, even if the math underneath isn't. Instead of writing rules that tell a computer how to recognize a cat in a photo (which is essentially impossible to do well), you give the computer a large number of photos that are labeled "cat" or "not cat," and you let it figure out for itself what patterns reliably distinguish the two. The computer isn't programmed with rules about whiskers or fur. It learns the relevant patterns directly from the data.

This shift, from explicit rules to learned patterns, was the foundational move that everything since has built on. It worked because two things changed at the same time. First, we started accumulating massive amounts of digital data (photos online, written text, transactions, sensor readings). Second, computers got fast enough and cheap enough that we could actually train models on that data at scale. Neither piece works without the other.

The first big wins came in narrow domains: image recognition, speech recognition, recommendation systems. By the early 2010s, machine learning was quietly powering things you used every day, like the autocomplete on your phone, the recommendations on Netflix, fraud detection on your bank account. None of this looked like "AI" in the science fiction sense. It looked like things working slightly better than they used to. But it was the foundation.

What machine learning still couldn't do well, even by 2015 or 2016, was language. Translating between languages was getting better but was still clunky. Generating coherent paragraphs of text was a research problem with disappointing results. Understanding the meaning of a long document, in any deep sense, was beyond reach. Computers could recognize patterns in pixels much better than they could recognize patterns in language. Language was holding the field back.

That changed in 2017.

---

## Lesson 3: The transformer breakthrough

In June 2017, eight researchers at Google published a paper titled "Attention Is All You Need." The title was a deliberate provocation, because it was naming a single technical idea (attention) and claiming that idea alone could solve a problem the field had been struggling with. Most people in AI didn't believe it at first.

They were wrong to be skeptical. The paper introduced an architecture called the **transformer**, and the transformer turned out to be the missing piece that unlocked modern AI.

The technical details are beyond a 101 course, but the core idea is worth understanding because it explains everything that followed. Earlier approaches to language processing read text the way a human does, one word at a time, in order. This was slow and made it hard for the model to keep track of how words far apart in a sentence related to each other. The transformer threw that out and instead let the model look at all the words at once and figure out which ones were most relevant to each other. This single change, processing all of the text in parallel rather than sequentially, made the models radically more efficient to train and much better at capturing the meaning of language across long stretches of text.

What followed was a chain of fast developments built on that foundation:

- 2018: The first GPT model from OpenAI, with 117 million parameters. Decent but not impressive to anyone outside the field.
- 2019: GPT-2, with 1.5 billion parameters. Better, and the first model OpenAI was nervous enough about to delay releasing publicly.
- 2020: GPT-3, with 175 billion parameters. The first model where scale produced something that felt qualitatively different. It could write coherent essays, generate working code, summarize complex documents. People in the field knew something had shifted.
- November 2022: ChatGPT, a conversational interface built on top of GPT-3.5. It went from zero to a hundred million users faster than any product in history. This was the moment the broader public realized something was happening.

The thing to notice in that timeline is the role of *scale*. The architecture didn't change much between GPT-1 and GPT-3. What changed was how big the models got and how much data they were trained on. As they got bigger, they got better. Not just incrementally. They started to do things they couldn't do at smaller scales at all.

This pattern, where scale produces qualitative jumps in capability, is now known as **scaling laws**. The three main ingredients leading to predictable improvements in AI performance are training data, computation, and improved algorithms. Anthropic's co-founders were among the first researchers to formally document this in the mid-2010s, and it's been the engine driving the field ever since. Bigger models trained on more data with better algorithms have produced reliably better results, and that pattern has held for several years and many orders of magnitude of scale.

> **Try this (3 minutes).** Open Claude.ai (or whichever AI tool you use) and ask it: *"Briefly explain the difference between rule-based AI and machine learning, with an example of each. Then explain why the transformer architecture mattered."* Read what comes back. Notice how the model handles a question about its own technical history. This is exactly the kind of question modern LLMs are good at: well-documented technical content with lots of training material to draw from. Compare its answer to what you read in this lesson. Are they consistent? Is the model adding anything that surprises you?

---

## Lesson 4: Why this moment is different

Now we can answer the question that motivates the whole module: is this just another hype cycle, or is something genuinely new happening?

The honest answer is: something genuinely new is happening, but for specific reasons that are worth being able to name. There are at least four of them.

**Capabilities have crossed real thresholds.** Earlier AI could do narrow things well. Modern LLMs can do a wide range of cognitive tasks at a level that's useful for actual work. They can summarize, translate, draft, code, reason through problems, and explain things in different registers. The work isn't always perfect (M05 is about why), but it's qualitatively in a different category from what AI could do five years ago. This isn't a marketing claim. It's directly observable. You can verify it in five minutes by trying any frontier model.

**The economic value is real and measurable.** Previous AI hype cycles had impressive demos but limited real-world deployment. This one is different. About 49% of jobs have seen at least a quarter of their tasks performed using Claude. That's not adoption among AI enthusiasts. That's broad penetration into actual work, fast. 49% of all job categories have now seen at least a quarter of their tasks performed using Claude. That's not a niche tool anymore. That's infrastructure. When previous "AI" technologies were tested in real workflows, most of them washed out. This one isn't washing out. It's accelerating.

**The scaling pattern is unusually robust.** Most technologies hit limits fast, where additional investment stops producing additional capability. The scaling laws of LLMs have continued to hold over many orders of magnitude. As of 2026, the pattern is starting to mature in some ways (the gains are becoming more nuanced and harder to extract), but the core observation that bigger models trained on more data continue to get better has been remarkably consistent. Anthropic CEO Dario Amodei has written that behind the volatility and public speculation, there has been a smooth, unyielding increase in AI's cognitive capabilities.

**The technology is general-purpose, not narrow.** Earlier AI breakthroughs were specific to one task. Better speech recognition. Better image classification. Better game playing. LLMs are different. They're general-purpose tools that can be applied to almost any cognitive work that involves text, which turns out to be most of knowledge work. This generality is what makes them economically transformative in a way narrower AI tools weren't. It's also what makes them harder to predict.

So is this hype? There's hype around it, definitely. There's a lot of money being thrown at AI startups, a lot of overpromising in marketing, a lot of "AI" being slapped on products that barely use it. That part is the same as every hype cycle, and you should treat it the same way: with healthy skepticism.

But the underlying technology is doing real work for real people in measurable amounts. That's the part that's not hype. The honest stance for a thoughtful skeptic in 2026 is something like: "Yes, the technology is real and meaningful, *and* the marketing around it is often overheated." Both can be true. Holding both is the L2 move.

### What to do with this

The practical implication of the historical context is mostly about your own bearings. When you read a breathless article claiming AI will replace all coders within a year, you can put it in context: this is the genre of overpromising that has historically marked AI's hype peaks. When you read a dismissive article claiming it's all just word-prediction parlor tricks, you can put that in context too: this is the genre of underestimation that has historically followed disappointment, but the data on actual use says otherwise.

Both extremes are noise. The signal is the underlying capability and adoption trajectory, which has been remarkably consistent for several years now. That's what you orient to.

---

## Key takeaways

- AI as a field has existed since the 1950s and has gone through at least two major "AI winters" where hype outran reality and the field collapsed. The skepticism many people feel is partly based on this real track record.
- The shift from **rule-based AI** (encoding human knowledge as explicit rules) to **machine learning** (letting computers learn patterns from data) was the foundational move that everything modern is built on. It worked because we got both massive amounts of digital data and cheap, fast computation around the same time.
- The **transformer architecture**, introduced in 2017, was the specific technical breakthrough that made modern LLMs possible. It changed how models process language and unlocked the scaling pattern that's defined the field since.
- **Scaling laws** describe a pattern that's held for several years: bigger models, trained on more data, with better algorithms, reliably produce better results. This is the engine driving the current AI moment.
- This moment is different from previous AI hype cycles in four specific ways: real capability thresholds have been crossed, economic value is being created at measurable scale, the scaling pattern has been unusually robust, and the technology is general-purpose rather than narrow.
- The right L2 stance is to hold both truths at once: the technology is real and meaningful, *and* the marketing around it is often overheated. Both extremes (over-belief and dismissal) are noise.
