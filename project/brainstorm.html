  <script type="text/babel">
// COURSE view — AI 101 syllabus showing all 7 modules with their states
// (done / active / next / locked). Reachable from the My Learning sidebar
// item and from clicking the AI 101 path in Paths.

const CourseScreen = ({ goto, startLesson, startCheck, gamification, density, moduleProgress = {}, layout = 'current' }) => {
  const { Card, Pill, Kicker, Btn, ProgressBar, SectionHeader } = window.BrPrim;
  const {
    IconArrowR, IconArrowL, IconLock, IconCheckCirc, IconClock, IconBolt,
    IconStar, IconBook, IconSpark, IconTrophy, IconCircle
  } = window.BrIcons;
  const { MODULES_AI101, PATHS, LESSON_BY_MODULE } = window.BrData;

  const path = PATHS.find(p => p.id === 'AI101') || PATHS[0];
  const compact = density === 'compact';
  const showGame = gamification !== 'subtle';

  // Compute effective module states from dynamic progress.
  // Hard gating: every module after the first undone module is `locked`.
  // The single in-flight module is `active`. Done modules are `done`.
  const ids = MODULES_AI101.map(m => m.id);
  const lastDoneIdx = ids.reduceRight((acc, id, i) => acc >= 0 ? acc : moduleProgress[id]?.done ? i : -1, -1);
  const effectiveModules = MODULES_AI101.map((m, i) => {
    if (moduleProgress[m.id]?.done) return { ...m, state:'done', score: moduleProgress[m.id].score };
    if (i === lastDoneIdx + 1) return { ...m, state:'active', started: !!moduleProgress[m.id]?.started };
    return { ...m, state:'locked' };
  });
  const allModules = effectiveModules;

  // Aggregate stats
  const completed = allModules.filter(m => m.state === 'done').length;
  const total = allModules.length;
  const pct = Math.round((completed / total) * 100);
  const totalMinutes = allModules.reduce((n, m) => n + (m.minutes || 0), 0);
  const nextUp = allModules.find(m => m.state === 'active') || allModules.find(m => m.state === 'next') || allModules[0];

  // Group modules by pillar so the syllabus reads as a real arc.
  const groupOrder = ['Foundation', 'Craft', 'Judgment'];
  const groupMeta = {
    Foundation: { kicker:'Pillar 1', tagline:'What AI is, how it works, where it fits.', accent:'var(--accent)' },
    Craft:      { kicker:'Pillar 2', tagline:'The moves that turn outputs into work product.', accent:'var(--accent-2)' },
    Judgment:   { kicker:'Pillar 3', tagline:"Owning what you ship. Knowing when not to trust it.", accent:'var(--green)' }
  };

  const startCTA = (m) => {
    if (m.state !== 'active') return;
    if (startLesson) startLesson(m.id);
    else if (goto) goto('lesson');
  };

  // Single module row in the syllabus
  const ModuleRow = ({ m, idx, lastInGroup }) => {
    const done    = m.state === 'done';
    const active  = m.state === 'active';
    const next    = m.state === 'next';
    const locked  = m.state === 'locked';
    const authored = !!LESSON_BY_MODULE[m.id];

    // Overview modules (Start Here, etc.) skip the KC — "done" means "read",
    // and "review" jumps back to the lesson rather than a check.
    const isOverview = m.kind === 'overview';

    // Status chip
    let chip = null;
    if (done)   chip = <Pill bg="rgba(76,254,200,0.10)" border="rgba(76,254,200,0.30)" color="var(--green)" icon={<IconCheckCirc size={10}/>}>{isOverview ? 'Read' : `Cleared${m.score ? ` · ${m.score}` : ''}`}</Pill>;
    if (active) chip = <Pill icon={<IconBolt size={10}/>}>{m.started ? (isOverview ? 'Reading now' : 'In progress') : (isOverview ? 'Up next' : 'Ready to start')}</Pill>;
    if (next)   chip = <Pill bg="var(--card-alt)" border="var(--border)" color="var(--text-sub)" icon={<IconArrowR size={10}/>}>Up next</Pill>;
    if (locked) chip = <Pill bg="var(--card-alt)" border="var(--border)" color="var(--text-dim)" icon={<IconLock size={10}/>}>Locked</Pill>;

    const reviewAction = isOverview
      ? () => startLesson && startLesson(m.id)
      : () => startCheck && startCheck(m.id);

    // Action button
    const action =
      done   ? <Btn onClick={reviewAction} variant="ghost" size="sm" icon={<IconArrowR size={11}/>}>{isOverview ? 'Re-read' : 'Review'}</Btn> :
      active ? <Btn onClick={() => startCTA(m)} size="sm" icon={<IconArrowR size={11}/>}>{authored ? (isOverview ? 'Start' : 'Continue') : 'Start lesson'}</Btn> :
      next   ? <Btn onClick={() => startCTA(m)} variant="secondary" size="sm" icon={<IconArrowR size={11}/>}>Start when ready</Btn> :
               <Btn variant="ghost" size="sm" disabled icon={<IconLock size={11}/>}>Locked</Btn>;

    return (
      <div style={{
        position:'relative', display:'grid',
        gridTemplateColumns:'56px minmax(0, 1fr) auto',
        gap:18, alignItems:'center',
        padding:'18px 20px',
        background: active ? 'linear-gradient(90deg, color-mix(in oklab, var(--accent) 10%, var(--card)), var(--card) 60%)' : 'var(--card)',
        border: active ? '1px solid var(--accent-border)' : '1px solid var(--border)',
        borderRadius:'var(--radius)',
        opacity: locked ? 0.62 : 1,
        boxShadow: active ? '0 14px 32px -22px color-mix(in oklab, var(--accent) 60%, transparent)' : 'none',
        cursor: locked ? 'not-allowed' : 'pointer',
        transition: 'transform .15s, border-color .15s'
      }}
      onClick={() => !locked && startCTA(m)}
      onMouseEnter={(e) => { if (!locked) e.currentTarget.style.transform = 'translateY(-1px)'; }}
      onMouseLeave={(e) => { e.currentTarget.style.transform = 'translateY(0)'; }}>
        {/* Number / status disc */}
        <div style={{
          width:42, height:42, borderRadius:'50%', flexShrink:0,
          display:'flex', alignItems:'center', justifyContent:'center',
          background: done   ? 'linear-gradient(135deg, var(--green), color-mix(in oklab, var(--green) 60%, var(--accent-2)))' :
                      active ? 'linear-gradient(135deg, var(--accent), var(--accent-mid))' :
                      next   ? 'var(--card-alt)' : 'var(--card-alt)',
          color: done || active ? '#fff' : 'var(--text-dim)',
          border: done || active ? 'none' : '1px solid var(--border)',
          fontFamily:'var(--font-mono)', fontSize:13, fontWeight:800, letterSpacing:'.02em'
        }}>
          {done   ? <IconCheckCirc size={18} stroke="#fff" /> :
           locked ? <IconLock size={14} stroke="var(--text-dim)" /> :
                    m.num}
        </div>

        {/* Title + meta */}
        <div style={{ minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4, flexWrap:'wrap' }}>
            <span style={{
              fontFamily:'var(--font-body)', fontSize:10, color:'var(--text-dim)',
              letterSpacing:'.10em', textTransform:'uppercase', fontWeight:700
            }}>{isOverview ? 'Start Here' : `Module ${m.num}`}</span>
            {chip}
            {!authored && !locked && !done && (
              <Pill bg="var(--card-alt)" border="var(--border)" color="var(--text-dim)" style={{ fontSize:9.5 }}>Preview</Pill>
            )}
          </div>
          <div style={{
            fontFamily:'var(--font-display)', fontSize: compact ? 16 : 17, fontWeight:700,
            color: locked ? 'var(--text-sub)' : 'var(--text)', letterSpacing:'-0.01em',
            marginBottom:3, lineHeight:1.25
          }}>{m.title}</div>
          <div style={{ fontSize:12.5, color:'var(--text-sub)', lineHeight:1.5 }}>{m.subtitle}</div>
          <div style={{
            display:'flex', alignItems:'center', gap:12, marginTop:8,
            fontSize:11, color:'var(--text-dim)'
          }}>
            <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
              <IconClock size={11} stroke="currentColor" /> {m.minutes} min
            </span>
            <span>·</span>
            <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
              <IconBook size={11} stroke="currentColor" /> {isOverview ? 'Read only · no check' : 'Lesson + 4-question check'}
            </span>
            {done && m.score != null && (
              <>
                <span>·</span>
                <span style={{ color:'var(--green)', fontWeight:700 }}>Score {m.score}</span>
              </>
            )}
          </div>
        </div>

        {/* CTA */}
        <div style={{ flexShrink:0 }} onClick={(e) => e.stopPropagation()}>
          {action}
        </div>
      </div>
    );
  };

  // ───────────────────────────────────────────────────────────────────────
  // MULTI-COURSE LAYOUT — Paths consolidated into My Learning.
  // Pillar tiles up top set the curriculum arc, the active course is fully
  // expanded, and future / tool courses sit below as compact preview cards.
  // ───────────────────────────────────────────────────────────────────────
  if (layout === 'multiCourse') {
    // Pillar arc — aggregate progress across all of AI 101's graded modules.
    const pillars = [
      { id:'Foundation', label:'Foundation', tagline:'What AI is. How it works. Where it fits.',
        accent:'var(--accent)',  filter: m => m.group === 'Foundation' },
      { id:'Craft',      label:'Craft',      tagline:'The moves that turn outputs into work product.',
        accent:'var(--accent-2)', filter: m => m.group === 'Craft' },
      { id:'Judgment',   label:'Judgment',   tagline:"Owning what you ship. Knowing when not to trust it.",
        accent:'var(--green)',    filter: m => m.group === 'Judgment' },
    ];

    // Future courses — only the main quest spine (AI 201, AI 301).
    // Tool tracks now live on Side Quests; events live there too.
    const futureCourses = PATHS.filter(p =>
      p.id !== 'AI101' && p.status !== 'event' && p.code !== 'TOOL'
    );

    // Aggregate stats for the active course banner
    const gradedMods = effectiveModules.filter(m => m.kind !== 'overview');
    const gradedDone = gradedMods.filter(m => m.state === 'done').length;
    const gradedTotal = gradedMods.length;
    const gradedPct = gradedTotal ? Math.round((gradedDone / gradedTotal) * 100) : 0;

    // Future-course card — compact, locked or unlocked.
    const FutureCard = ({ p }) => {
      const isLocked = p.status === 'locked';
      const isTool   = p.code === 'TOOL';
      const accent = isTool ? 'var(--accent-2)' : 'var(--accent)';
      return (
        <div style={{
          padding:'18px 20px',
          background:'var(--card)', border:'1px solid var(--border)',
          borderRadius:'var(--radius)',
          opacity: isLocked ? 0.78 : 1,
          display:'flex', flexDirection:'column', gap:10,
          cursor: isLocked ? 'not-allowed' : 'pointer',
          transition:'transform .15s, border-color .15s',
          position:'relative', overflow:'hidden'
        }}
        onMouseEnter={(e) => { if (!isLocked) { e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.borderColor = 'var(--accent-border)'; } }}
        onMouseLeave={(e) => { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.borderColor = 'var(--border)'; }}>
          {/* Status strip on the left edge */}
          <div aria-hidden="true" style={{
            position:'absolute', left:0, top:0, bottom:0, width:3,
            background: isLocked ? 'var(--border)' : accent
          }}/>
          <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
            <span style={{
              fontFamily:'var(--font-mono)', fontSize:10, color: isLocked ? 'var(--text-dim)' : accent,
              letterSpacing:'.10em', textTransform:'uppercase', fontWeight:800
            }}>{isTool ? 'Tool track' : `AI ${p.code}`}</span>
            <span style={{ color:'var(--text-dim)', fontSize:11 }}>·</span>
            <span style={{ fontSize:11, color:'var(--text-dim)', fontFamily:'var(--font-mono)' }}>{p.level}</span>
            <span style={{ flex:1 }}/>
            {isLocked ? (
              <Pill bg="var(--card-alt)" border="var(--border)" color="var(--text-dim)" icon={<IconLock size={9}/>}>Locked</Pill>
            ) : (
              <Pill bg="var(--accent-light)" border="var(--accent-border)" color="var(--accent)" icon={<IconBolt size={9}/>}>Unlocked</Pill>
            )}
          </div>
          <div>
            <div style={{
              fontFamily:'var(--font-display)', fontSize:17, fontWeight:700,
              color: isLocked ? 'var(--text-sub)' : 'var(--text)', letterSpacing:'-0.02em',
              lineHeight:1.25, marginBottom:4
            }}>{p.title}</div>
            <div style={{ fontSize:12.5, color:'var(--text-sub)', lineHeight:1.5 }}>{p.subtitle}</div>
          </div>
          <div style={{
            display:'flex', alignItems:'center', gap:10, marginTop:2,
            fontSize:11, color:'var(--text-dim)', fontFamily:'var(--font-mono)'
          }}>
            <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
              <IconBook size={11} stroke="currentColor"/> {p.modules} modules
            </span>
            <span>·</span>
            <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
              <IconClock size={11} stroke="currentColor"/> {p.hours}
            </span>
            {isLocked && p.unlocksAfter && (<>
              <span>·</span>
              <span>Unlocks after AI {p.unlocksAfter.replace('AI','')}</span>
            </>)}
          </div>
        </div>
      );
    };

    return (
      <div style={{ height:'100%', overflow:'auto' }}>
        <div style={{ width:'var(--container-default)', margin:'0 auto', padding: compact ? '24px var(--pad-x) 80px' : '32px var(--pad-x) 96px' }}>

          {/* ── PAGE HEADER ─────────────────────────────────── */}
          <div style={{ marginBottom:28 }}>
            <Kicker>My Learning</Kicker>
            <h1 style={{
              fontFamily:'var(--font-display)', fontSize:'clamp(2rem, 4vw, 3rem)',
              fontWeight:700, letterSpacing:'-0.03em', margin:'10px 0 8px', lineHeight:1.05
            }}>Your AI fluency journey</h1>
            <p style={{
              fontSize:14.5, color:'var(--text-sub)', margin:0, maxWidth:640,
              lineHeight:1.55, textWrap:'pretty'
            }}>Three pillars. Five courses. Take them in order — each one unlocks the next.</p>
          </div>

          {/* ── PILLAR ARC ──────────────────────────────────── */}
          <div style={{ marginBottom:32 }}>
            <div style={{ display:'flex', alignItems:'baseline', gap:10, marginBottom:12 }}>
              <Kicker>Curriculum arc</Kicker>
              <span style={{ fontSize:11, color:'var(--text-dim)', fontFamily:'var(--font-mono)' }}>3 pillars</span>
            </div>
            <div style={{
              display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:12
            }}>
              {pillars.map((pl, i) => {
                const mods = effectiveModules.filter(pl.filter);
                const done = mods.filter(m => m.state === 'done').length;
                const total = mods.length;
                const pct = total ? Math.round((done / total) * 100) : 0;
                const inProgress = mods.some(m => m.state === 'active');
                return (
                  <div key={pl.id} style={{
                    padding:'16px 18px',
                    background: pct === 100
                      ? `color-mix(in oklab, ${pl.accent} 8%, var(--card))`
                      : 'var(--card)',
                    border: `1px solid ${pct === 100 ? `color-mix(in oklab, ${pl.accent} 35%, var(--border))` : 'var(--border)'}`,
                    borderRadius:'var(--radius)',
                    display:'flex', flexDirection:'column', gap:10
                  }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <span style={{
                        fontFamily:'var(--font-mono)', fontSize:10, color: pl.accent,
                        letterSpacing:'.12em', textTransform:'uppercase', fontWeight:800
                      }}>Pillar {i + 1}</span>
                      {pct === 100 && (
                        <IconCheckCirc size={12} stroke={pl.accent}/>
                      )}
                      {inProgress && pct < 100 && (
                        <span style={{
                          width:6, height:6, borderRadius:'50%', background: pl.accent,
                          boxShadow: `0 0 0 3px color-mix(in oklab, ${pl.accent} 25%, transparent)`
                        }}/>
                      )}
                    </div>
                    <div style={{
                      fontFamily:'var(--font-display)', fontSize:18, fontWeight:700,
                      color:'var(--text)', letterSpacing:'-0.02em', lineHeight:1.2
                    }}>{pl.label}</div>
                    <div style={{ fontSize:12, color:'var(--text-sub)', lineHeight:1.45, minHeight:34 }}>
                      {pl.tagline}
                    </div>
                    <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between',
                      fontFamily:'var(--font-mono)', fontSize:11, marginTop:2 }}>
                      <span style={{ color:'var(--text)', fontWeight:700 }}>{done} / {total}</span>
                      <span style={{ color:'var(--text-dim)' }}>{pct}%</span>
                    </div>
                    <ProgressBar value={pct} height={8}/>
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── ACTIVE COURSE — REWARD BANNER + SYLLABUS ───── */}
          <div style={{ marginBottom:36 }}>
            {/* Section header w/ "now" indicator */}
            <div style={{ marginBottom:14, display:'flex', alignItems:'center', gap:10 }}>
              <span style={{
                width:6, height:6, borderRadius:'50%', background:'var(--accent)',
                boxShadow:'0 0 0 3px color-mix(in oklab, var(--accent) 25%, transparent)'
              }}/>
              <Kicker>Now · Active course</Kicker>
              <span style={{ fontSize:11, color:'var(--text-dim)', fontFamily:'var(--font-mono)' }}>
                AI 101 · {gradedDone} / {gradedTotal}
              </span>
            </div>

            {/* Active course card — title + reward + progress, all in one */}
            <div style={{
              padding:'22px 24px', marginBottom:18,
              background:'linear-gradient(135deg, color-mix(in oklab, var(--yellow) 8%, var(--card)), color-mix(in oklab, var(--accent) 6%, var(--card)))',
              border:'1px solid var(--border)',
              borderRadius:'var(--radius)',
              display:'flex', alignItems:'center', gap:20, position:'relative', overflow:'hidden'
            }}>
              <div aria-hidden="true" style={{
                position:'absolute', top:-90, left:-30, width:240, height:240, borderRadius:'50%',
                background:'radial-gradient(circle, color-mix(in oklab, var(--yellow) 20%, transparent) 0%, transparent 65%)',
                pointerEvents:'none'
              }}/>
              <div style={{
                width:56, height:56, borderRadius:14, flexShrink:0,
                background:'linear-gradient(135deg, var(--yellow), var(--accent-2))',
                display:'flex', alignItems:'center', justifyContent:'center',
                boxShadow:'0 6px 18px -6px color-mix(in oklab, var(--yellow) 60%, transparent)',
                position:'relative', zIndex:1
              }}><IconTrophy size={26} stroke="#0A0612"/></div>
              <div style={{ flex:1, minWidth:0, position:'relative', zIndex:1 }}>
                <div style={{
                  fontFamily:'var(--font-mono)', fontSize:10, color:'var(--text-dim)',
                  letterSpacing:'.12em', textTransform:'uppercase', fontWeight:700, marginBottom:4
                }}>AI 101 · {path.level}</div>
                <div style={{
                  fontFamily:'var(--font-display)', fontSize:20, fontWeight:700,
                  color:'var(--text)', letterSpacing:'-0.02em', lineHeight:1.25, marginBottom:4
                }}>{path.title}</div>
                <div style={{ fontSize:12.5, color:'var(--text-sub)', lineHeight:1.5 }}>
                  Clear all 7 modules → <strong style={{ color:'var(--accent)' }}>AI 101 Graduate</strong> badge + Level 2.
                </div>
              </div>
              <div style={{
                flexShrink:0, minWidth:160, position:'relative', zIndex:1,
                display:'flex', flexDirection:'column', gap:6
              }}>
                <div style={{
                  display:'flex', alignItems:'baseline', justifyContent:'space-between',
                  fontFamily:'var(--font-mono)', fontSize:11
                }}>
                  <span style={{ color:'var(--text)', fontWeight:700 }}>{gradedDone} / {gradedTotal}</span>
                  <span style={{ color:'var(--text-dim)' }}>{gradedPct}%</span>
                </div>
                <ProgressBar value={gradedPct} height={6} />
                <div style={{
                  fontFamily:'var(--font-mono)', fontSize:10.5, color:'var(--text-dim)',
                  letterSpacing:'.04em', display:'flex', alignItems:'center', gap:6, marginTop:2
                }}>
                  <IconClock size={11} stroke="currentColor"/>
                  <span>~{Math.round(totalMinutes/60*10)/10}h total</span>
                </div>
              </div>
            </div>

            {/* The actual modules. Reuse the existing pillar grouping below
                but render only the AI 101 syllabus — same ModuleRow, same
                pillar headers, just inside the active-course bucket. */}
            {(() => {
              const overviewMods = effectiveModules.filter(m => m.kind === 'overview');
              return (
                <>
                  {overviewMods.length > 0 && (
                    <div style={{ marginBottom:22 }}>
                      <div style={{
                        display:'flex', alignItems:'center', gap:10, marginBottom:10, padding:'0 4px'
                      }}>
                        <span style={{
                          fontFamily:'var(--font-mono)', fontSize:10, color:'var(--text-dim)',
                          letterSpacing:'.10em', textTransform:'uppercase', fontWeight:700
                        }}>Intro · Start here</span>
                        <span style={{ fontSize:12, color:'var(--text-sub)' }}>· Read the overview before module 01.</span>
                      </div>
                      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                        {overviewMods.map((m, i) => (
                          <ModuleRow key={m.id} m={m} idx={i} lastInGroup={i === overviewMods.length - 1} />
                        ))}
                      </div>
                    </div>
                  )}
                  {groupOrder.map(g => {
                    const groupMods = effectiveModules.filter(m => m.group === g);
                    if (groupMods.length === 0) return null;
                    const meta = groupMeta[g];
                    return (
                      <div key={g} style={{ marginBottom:22 }}>
                        <div style={{
                          display:'flex', alignItems:'baseline', gap:10, marginBottom:10, padding:'0 4px'
                        }}>
                          <span style={{
                            fontFamily:'var(--font-mono)', fontSize:10, color: meta.accent,
                            letterSpacing:'.10em', textTransform:'uppercase', fontWeight:800
                          }}>{meta.kicker} · {g}</span>
                          <span style={{ fontSize:12, color:'var(--text-sub)' }}>· {meta.tagline}</span>
                        </div>
                        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                          {groupMods.map((m, i) => (
                            <ModuleRow key={m.id} m={m} idx={i} lastInGroup={i === groupMods.length - 1} />
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </>
              );
            })()}
          </div>

          {/* ── FUTURE COURSES — COMPACT PREVIEWS ────────────── */}
          <div>
            <div style={{ marginBottom:14, display:'flex', alignItems:'center', gap:10 }}>
              <Kicker>Up next · After AI 101</Kicker>
              <span style={{ fontSize:11, color:'var(--text-dim)', fontFamily:'var(--font-mono)' }}>
                {futureCourses.length} courses
              </span>
            </div>
            <div style={{
              display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:12
            }}>
              {futureCourses.map(p => <FutureCard key={p.id} p={p}/>)}
            </div>
          </div>

        </div>
      </div>
    );
  }

  // Default: existing single-course layout
  return (
    <div style={{ height:'100%', overflow:'auto' }}>
      <div style={{ width:'var(--container-default)', margin:'0 auto', padding: compact ? '24px var(--pad-x) 80px' : '32px var(--pad-x) 96px' }}>

        {/* ── HEADER ───────────────────────────────────────────── */}
        <div style={{ marginBottom:24 }}>
          <button onClick={() => goto && goto('paths')} style={{
            background:'transparent', border:'none', cursor:'pointer',
            display:'inline-flex', alignItems:'center', gap:6,
            fontSize:11, color:'var(--text-sub)', padding:0, marginBottom:14,
            fontFamily:'var(--font-mono)', letterSpacing:'.06em', textTransform:'uppercase', fontWeight:700
          }}>
            <IconArrowL size={11}/> Paths
          </button>
          <div style={{ display:'flex', gap:24, alignItems:'flex-end', flexWrap:'wrap' }}>
            <div style={{ flex:1, minWidth:280 }}>
              <Kicker>{path.code} · {path.level} · Main quest</Kicker>
              <h1 style={{
                fontFamily:'var(--font-display)', fontSize:'clamp(2rem, 4vw, 3rem)',
                fontWeight:700, letterSpacing:'-0.03em', margin:'10px 0 8px', lineHeight:1.05
              }}>{path.title}</h1>
              <p style={{
                fontSize:14.5, color:'var(--text-sub)', margin:0, maxWidth:640,
                lineHeight:1.55, textWrap:'pretty'
              }}>{path.subtitle} An intro plus seven modules, taken in order. Each one unlocks the next.</p>
            </div>
          </div>
        </div>

        {/* ── REWARD BANNER ─────────────────────────────────────
            Mirrors the completion card at the bottom — surfaced up top so
            the user sees the prize while choosing a module. */}
        {(() => {
          const gradedMods = effectiveModules.filter(m => m.kind !== 'overview');
          const gradedDone = gradedMods.filter(m => m.state === 'done').length;
          const gradedTotal = gradedMods.length;
          const gradedPct = gradedTotal ? Math.round((gradedDone / gradedTotal) * 100) : 0;
          const allDone = gradedDone === gradedTotal && gradedTotal > 0;
          return (
            <div style={{
              marginBottom:28, padding:'18px 22px',
              background:'linear-gradient(135deg, color-mix(in oklab, var(--yellow) 9%, var(--card)), color-mix(in oklab, var(--accent) 7%, var(--card)))',
              border:'1px solid var(--border)',
              borderRadius:'var(--radius)',
              display:'flex', alignItems:'center', gap:18, position:'relative', overflow:'hidden'
            }}>
              {/* Subtle glow */}
              <div aria-hidden="true" style={{
                position:'absolute', top:-80, left:-30,
                width:220, height:220, borderRadius:'50%',
                background:'radial-gradient(circle, color-mix(in oklab, var(--yellow) 20%, transparent) 0%, transparent 65%)',
                pointerEvents:'none'
              }}/>

              <div style={{
                width:54, height:54, borderRadius:14, flexShrink:0,
                background:'linear-gradient(135deg, var(--yellow), var(--accent-2))',
                display:'flex', alignItems:'center', justifyContent:'center',

                    : <>Clear all 7 modules → <span style={{ color:'var(--accent)' }}>AI 101 Graduate</span> badge + Level 2</>}
                </div>
                <div style={{ fontSize:12, color:'var(--text-sub)', lineHeight:1.5 }}>

                }}>

              </div>
            </div>
          );
        })()}

        {/* ── SYLLABUS ─────────────────────────────────────────── */}
        <div>
          <div style={{ marginBottom:14, display:'flex', alignItems:'center', gap:10 }}>

              all {total} modules
            </span>
          </div>

          {/* Start Here (overview) — sits above the numbered pillars */}
          {(() => {
            const overviewMods = effectiveModules.filter(m => m.kind === 'overview');
            if (overviewMods.length === 0) return null;
            const overviewDone = overviewMods.every(m => m.state === 'done');

                        color:'var(--text)', margin:0, letterSpacing:'-0.02em'

                      <span style={{ fontSize:12, color:'var(--text-sub)' }}>· Read the overview before module 01.</span>
                    </div>
                  </div>
                  <span style={{
                    fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-dim)'
                  }}>
                    {overviewMods.filter(m => m.state === 'done').length} / {overviewMods.length}
                  </span>
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  {overviewMods.map((m, i) => (
                    <ModuleRow key={m.id} m={m} idx={i} lastInGroup={i === overviewMods.length - 1} />
                  ))}
                </div>
              </div>
            );
          })()}

          {/* Standard pillars */}
          {groupOrder.map((g, gi) => {
            const groupMods = effectiveModules.filter(m => m.group === g);
            if (groupMods.length === 0) return null;
            const meta = groupMeta[g];
            const groupDone = groupMods.every(m => m.state === 'done');
            const groupActive = groupMods.some(m => m.state === 'active');

            return (
              <div key={g} style={{ marginBottom:30 }}>
                {/* Pillar header */}
                <div style={{
                  display:'flex', alignItems:'center', gap:12, marginBottom:12,
                  padding:'0 4px'

                  <div style={{
                    width:28, height:28, borderRadius:8, flexShrink:0,
                    background: groupDone ? 'rgba(76,254,200,0.15)' : groupActive ? 'var(--accent-light)' : 'var(--card-alt)',
                    border: `1px solid ${groupDone ? 'rgba(76,254,200,0.40)' : groupActive ? 'var(--accent-border)' : 'var(--border)'}`,
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontFamily:'var(--font-mono)', fontSize:11, fontWeight:800,
                    color: groupDone ? 'var(--green)' : groupActive ? 'var(--accent)' : 'var(--text-dim)'
                  }}>{gi + 1}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{
                      display:'flex', alignItems:'baseline', gap:8, flexWrap:'wrap'
                    }}>

                        fontFamily:'var(--font-display)', fontSize:18, fontWeight:700,
                        color:'var(--text)', margin:0, letterSpacing:'-0.02em'
                      }}>{g}</h2>
                      <span style={{ fontSize:12, color:'var(--text-sub)' }}>· {meta.tagline}</span>
                    </div>
                  </div>
                  <span style={{
                    fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-dim)'
                  }}>
                    {groupMods.filter(m => m.state === 'done').length} / {groupMods.length}
                  </span>
                </div>

                {/* Module rows */}
                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  {groupMods.map((m, i) => (
                    <ModuleRow key={m.id} m={m} idx={i} lastInGroup={i === groupMods.length - 1} />
                  ))}
                </div>
              </div>
            );
          })}

        </div>

        {/* (Bottom completion reward removed — now surfaced as the banner at the top.) */}

      </div>
    </div>
  );
};

window.BrCourse = { CourseScreen };

  <script type="text/babel">
// Reusable controls for Settings — toggle, segmented, select, input, slider, etc.
// All controls auto-save via the onChange handler — no explicit save button.

const { useState: useStateSC, useEffect: useEffectSC, useRef: useRefSC } = React;

// Row that wraps a label/desc on the left and a control on the right
const SettingRow = ({ label, desc, children, danger, locked, lockedText }) => (
  <div style={{
    display:'grid', gridTemplateColumns:'1fr auto', alignItems:'center', gap:24,
    padding:'14px 0', borderTop:'1px solid var(--border-soft)'
  }}>
    <div style={{ minWidth:0 }}>
      <div style={{
        fontSize:13.5, fontWeight:600, color: danger ? 'var(--accent-2)' : 'var(--text)',
        display:'flex', alignItems:'center', gap:8
      }}>
        {label}
        {locked && (
          <span style={{
            fontSize:9.5, fontFamily:'var(--font-mono)', letterSpacing:'.08em',
            color:'var(--text-dim)', textTransform:'uppercase',
            background:'var(--card-alt)', border:'1px solid var(--border)',
            borderRadius:4, padding:'1px 6px'
          }}>{lockedText || 'Admin only'}</span>
        )}
      </div>
      {desc && <div style={{ fontSize:12, color:'var(--text-sub)', marginTop:3, lineHeight:1.5, maxWidth:520 }}>{desc}</div>}
    </div>
    <div style={{ flexShrink:0, display:'flex', alignItems:'center', gap:8, opacity: locked ? 0.5 : 1, pointerEvents: locked ? 'none' : 'auto' }}>
      {children}
    </div>
  </div>
);

// Section card with title + optional kicker
const SettingSection = ({ kicker, title, desc, children, headerRight, accent }) => (
  <section style={{
    background:'var(--card)', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)',
    padding:'24px 26px', marginBottom:18, position:'relative', overflow:'hidden'
  }}>
    {accent && (
      <div aria-hidden="true" style={{
        position:'absolute', top:0, left:0, right:0, height:3,
        background:`linear-gradient(90deg, ${accent}, transparent 80%)`
      }}/>
    )}
    <div style={{ display:'flex', alignItems:'flex-start', gap:16, marginBottom:18 }}>
      <div style={{ flex:1, minWidth:0 }}>
        {kicker && (
          <div style={{
            fontFamily:'var(--font-mono)', fontSize:10.5, letterSpacing:'.10em',
            color:'var(--text-dim)', textTransform:'uppercase', fontWeight:700, marginBottom:4
          }}>{kicker}</div>
        )}
        <h2 style={{
          fontFamily:'var(--font-display)', fontSize:18, fontWeight:700,
          letterSpacing:'-0.01em', margin:0, color:'var(--text)'
        }}>{title}</h2>
        {desc && <p style={{ fontSize:12.5, color:'var(--text-sub)', margin:'4px 0 0', lineHeight:1.55 }}>{desc}</p>}
      </div>
      {headerRight}
    </div>
    {children}
  </section>
);

// Toggle (auto-save: change fires immediately)
const Toggle = ({ value, onChange, disabled }) => (
  <button type="button" onClick={() => !disabled && onChange(!value)} disabled={disabled}
    style={{
      width:36, height:20, borderRadius:999, border:'none', cursor: disabled ? 'not-allowed' : 'pointer',
      background: value ? 'var(--accent)' : 'var(--card-alt)',
      boxShadow: value ? `inset 0 0 0 1px var(--accent-mid)` : 'inset 0 0 0 1px var(--border)',
      position:'relative', transition:'background .15s', flexShrink:0,
      opacity: disabled ? 0.5 : 1
    }}>
    <span aria-hidden="true" style={{
      position:'absolute', top:2, left: value ? 18 : 2, width:16, height:16,
      borderRadius:'50%', background:'#fff',
      boxShadow:'0 1px 2px rgba(0,0,0,0.35)', transition:'left .15s'
    }}/>
  </button>
);

// Segmented (radio of buttons)
const Segmented = ({ value, onChange, options }) => (
  <div style={{
    display:'inline-flex', background:'var(--card-alt)', borderRadius:8,
    border:'1px solid var(--border)', padding:2
  }}>
    {options.map(o => {
      const v = typeof o === 'string' ? o : o.value;
      const lbl = typeof o === 'string' ? o : o.label;
      const active = v === value;
      return (
        <button key={v} type="button" onClick={() => onChange(v)}
          style={{
            padding:'5px 11px', fontSize:12, fontWeight: active ? 700 : 600,
            background: active ? 'var(--card)' : 'transparent',
            color: active ? 'var(--text)' : 'var(--text-sub)',
            border:'none', borderRadius:6, cursor:'pointer',
            boxShadow: active ? '0 1px 3px rgba(0,0,0,0.3), inset 0 0 0 1px var(--border)' : 'none'
          }}>{lbl}</button>
      );
    })}
  </div>
);

// Select dropdown
const Select = ({ value, onChange, options, width = 200 }) => (
  <select value={value} onChange={e => onChange(e.target.value)}
    style={{
      background:'var(--card-alt)', border:'1px solid var(--border)', borderRadius:8,
      padding:'7px 10px', fontSize:13, color:'var(--text)', outline:'none',
      width, fontFamily:'inherit', cursor:'pointer'
    }}>
    {options.map(o => {
      const v = typeof o === 'string' ? o : o.value;
      const lbl = typeof o === 'string' ? o : o.label;
      return <option key={v} value={v}>{lbl}</option>;
    })}
  </select>
);

// Text input
const TextInput = ({ value, onChange, placeholder, width = 240, mono, type = 'text' }) => (
  <input type={type} value={value || ''} onChange={e => onChange(e.target.value)}
    placeholder={placeholder}
    style={{
      background:'var(--card-alt)', border:'1px solid var(--border)', borderRadius:8,
      padding:'7px 10px', fontSize:13, color:'var(--text)', outline:'none',
      width, fontFamily: mono ? 'var(--font-mono)' : 'inherit'
    }}
    onFocus={(e) => e.currentTarget.style.borderColor = 'var(--accent-border)'}
    onBlur={(e) => e.currentTarget.style.borderColor = 'var(--border)'}
  />
);

// Slider
const Slider = ({ value, onChange, min = 0, max = 100, step = 1, width = 160, format }) => (
  <div style={{ display:'inline-flex', alignItems:'center', gap:10 }}>
    <input type="range" min={min} max={max} step={step} value={value}
      onChange={e => onChange(Number(e.target.value))}
      style={{ width, accentColor:'var(--accent)' }}/>
    <span style={{ fontFamily:'var(--font-mono)', fontSize:11.5, color:'var(--text-sub)', minWidth:36, textAlign:'right' }}>
      {format ? format(value) : value}
    </span>
  </div>
);

// Status pill (for connection state, etc.)
const StatusPill = ({ kind = 'ok', text }) => {
  const colors = {
    ok:    { bg:'rgba(76,254,200,0.10)', border:'rgba(76,254,200,0.30)', dot:'var(--green)',     fg:'var(--green)' },
    warn:  { bg:'rgba(255,224,63,0.10)', border:'rgba(255,224,63,0.30)', dot:'#FFE03F',          fg:'#FFE03F' },
    err:   { bg:'rgba(255,35,112,0.10)', border:'rgba(255,35,112,0.30)', dot:'var(--accent-2)',  fg:'var(--accent-2)' },
    off:   { bg:'var(--card-alt)',       border:'var(--border)',         dot:'var(--text-dim)',  fg:'var(--text-sub)' },
  };
  const c = colors[kind];
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:6,
      padding:'2px 9px', borderRadius:999, fontSize:11, fontWeight:600,
      background:c.bg, border:`1px solid ${c.border}`, color:c.fg
    }}>
      <span style={{ width:6, height:6, borderRadius:'50%', background:c.dot }}/>{text}
    </span>
  );
};

// Auto-save toast — call window.__bsToast(text) to fire
const SettingsToast = () => {
  const [msg, setMsg] = useStateSC(null);
  const tRef = useRefSC(null);
  useEffectSC(() => {
    window.__bsToast = (m) => {
      setMsg(m);
      clearTimeout(tRef.current);
      tRef.current = setTimeout(() => setMsg(null), 1800);
    };
    return () => { window.__bsToast = null; };
  }, []);
  return (
    <div style={{
      position:'fixed', bottom:90, right:24, zIndex:50,
      background:'var(--card)', border:'1px solid var(--accent-border)',
      borderRadius:10, padding:'9px 14px', fontSize:12.5, color:'var(--text)',
      boxShadow:'0 18px 40px -20px rgba(0,0,0,0.6)',
      transform: msg ? 'translateY(0)' : 'translateY(8px)',
      opacity: msg ? 1 : 0,
      pointerEvents:'none',
      transition:'opacity .2s, transform .2s',
      display:'flex', alignItems:'center', gap:8
    }}>
      <span style={{ width:6, height:6, borderRadius:'50%', background:'var(--green)' }}/>
      {msg || ''}
    </div>
  );
};

window.BrSC = {
  SettingRow, SettingSection, Toggle, Segmented, Select,
  TextInput, Slider, StatusPill, SettingsToast
};

  </script>

  <script type="text/babel">
// Settings shell — left rail nav, scope switcher (Personal | Workspace),
// search, auto-save state, route to section content.
//
// Auto-save: every setS / setW call writes to localStorage and pulses a toast.

const { useState: useStateSet, useEffect: useEffectSet, useMemo: useMemoSet } = React;

const PERSONAL_DEFAULTS = (() => {
  let name = 'Alex Rivera', title = 'Account Executive';
  let team = '', geo = '', segment = '', roleType = '', fluencyLevel = 0, roleId = '', roleLabel = '';
  try {
    const saved = JSON.parse(localStorage.getItem('bs_onboarded_v1') || 'null');
    if (saved?.name)        name         = saved.name;
    if (saved?.roleLabel)   title        = saved.roleLabel;
    if (saved?.roleLabel)   roleLabel    = saved.roleLabel;
    if (saved?.role)        roleId       = saved.role;
    if (saved?.team)        team         = saved.team;
    if (saved?.geo)         geo          = saved.geo;
    if (saved?.segment)     segment      = saved.segment;
    if (saved?.roleType)    roleType     = saved.roleType;
    if (saved?.fluencyLevel)fluencyLevel = saved.fluencyLevel;
  } catch(e) {}
  return {
  // Profile (read-only fields like team/geo/segment come from onboarding;
  // name/title are editable on the Profile page).
  name, pronouns:'they/them', title, tz:'America/Los_Angeles',
  roleId, roleLabel, team, geo, segment, roleType, fluencyLevel,
  // Slack
  slackDaily:true, slackStreak:true, slackTeam:'digest', slackCoach:true,
  slackQuietStart:'19:00', slackQuietEnd:'08:00',
  // Calendar
  calAuto:true, calFreq:'3', calWhen:'am', calSource:'google',
  // Email
  emailRecap:true, emailProduct:false,
  // Coach
  coachTone:'warm', coachVerbosity:3, coachContext:true, coachMemory:true, coachModel:'balanced',
  // Accessibility
  reduceMotion:false, highContrast:false, textScale:100, captions:'auto',
  keyboardHints:true, srMode:false,
  // Language & region
  lang:'en-US', region:'United States', dateFmt:'mdy', weekStart:'sun',
  // Privacy
  lbVis:'public', feedVis:true, profileVis:'org', exemplars:true,
  // Security
  twoFA:true,
  };
})();

const WORKSPACE_DEFAULTS = {
  // Org
  orgName:'Gong GTM Academy', orgSlug:'gong', orgDomains:'gong.io, gong.com',
  orgTz:'America/Los_Angeles', orgRegion:'us',
  // Roles

};

const PERSONAL_SECTIONS = [
  { id:'profile',     label:'Profile',           kicker:'Account' },
  { id:'notif',       label:'Notifications',     kicker:'Reach' },
  { id:'coach',       label:'AI Coach',          kicker:'Assistant' },
  { id:'access',      label:'Accessibility',     kicker:'Comfort' },
  { id:'lang',        label:'Language & region', kicker:'Locale' },
  { id:'privacy',     label:'Privacy',           kicker:'Visibility' },
  { id:'security',    label:'Sign-in & sessions',kicker:'Security' },
  { id:'data',        label:'Data',              kicker:'Export & delete', danger:true },
];

const WORKSPACE_SECTIONS = [
  { id:'org',         label:'Organization',      kicker:'Identity' },
  { id:'members',     label:'Members',           kicker:'People' },
  { id:'roles',       label:'Roles & permissions', kicker:'Access' },
  { id:'sso',         label:'SSO & provisioning',kicker:'Identity' },

  { id:'audit',       label:'Audit log',         kicker:'Activity' },
  { id:'compliance',  label:'Compliance',        kicker:'Trust' },
  { id:'branding',    label:'Branding',          kicker:'Workspace' },
  { id:'danger',      label:'Danger zone',       kicker:'Destructive', danger:true },
];

function useStored(key, defaults) {
  const [state, setState] = useStateSet(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw ? { ...defaults, ...JSON.parse(raw) } : defaults;
    } catch { return defaults; }
  });
  const set = (k, v) => {
    setState(prev => {
      const next = { ...prev, [k]: v };
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
    if (window.__bsToast) window.__bsToast('Saved');
  };
  return [state, set];
}

const SettingsScreen = ({ user }) => {
  const { SettingsToast } = window.BrSC;
  const P = window.BrSettingsPersonal;
  const W = window.BrSettingsWorkspace;

  const [scope, setScope] = useStateSet('personal');     // personal | workspace
  const [section, setSection] = useStateSet('profile');
  const [query, setQuery] = useStateSet('');

  const [personal, setS] = useStored('br_settings_personal', PERSONAL_DEFAULTS);
  const [workspace, setW] = useStored('br_settings_workspace', WORKSPACE_DEFAULTS);

  // When switching scope, default to first section in that scope
  useEffectSet(() => {
    if (scope === 'personal' && !PERSONAL_SECTIONS.find(s => s.id === section)) {
      setSection(PERSONAL_SECTIONS[0].id);
    }
    if (scope === 'workspace' && !WORKSPACE_SECTIONS.find(s => s.id === section)) {
      setSection(WORKSPACE_SECTIONS[0].id);
    }
  }, [scope]);

  const sections = scope === 'personal' ? PERSONAL_SECTIONS : WORKSPACE_SECTIONS;

  const filtered = useMemoSet(() => {
    if (!query.trim()) return sections;
    const q = query.toLowerCase();
    return sections.filter(s =>
      s.label.toLowerCase().includes(q) || s.kicker.toLowerCase().includes(q)
    );
  }, [query, sections]);

  const renderSection = () => {
    if (scope === 'personal') {
      switch (section) {
        case 'profile':  return <P.PersonalProfile       s={personal} setS={setS} user={user}/>;
        case 'notif':    return <P.PersonalNotifications s={personal} setS={setS}/>;
        case 'coach':    return <P.PersonalCoach         s={personal} setS={setS}/>;
        case 'access':   return <P.PersonalAccessibility s={personal} setS={setS}/>;
        case 'lang':     return <P.PersonalLanguage      s={personal} setS={setS}/>;
        case 'privacy':  return <P.PersonalPrivacy       s={personal} setS={setS}/>;
        case 'security': return <P.PersonalSecurity      s={personal} setS={setS}/>;
        case 'data':     return <P.PersonalData          s={personal} setS={setS}/>;
      }
    } else {
      switch (section) {
        case 'org':          return <W.WorkspaceOrg          w={workspace} setW={setW}/>;
        case 'members':      return <W.WorkspaceMembers      w={workspace} setW={setW}/>;
        case 'roles':        return <W.WorkspaceRoles        w={workspace} setW={setW}/>;
        case 'sso':          return <W.WorkspaceSSO          w={workspace} setW={setW}/>;
        case 'integrations': return <W.WorkspaceIntegrations w={workspace} setW={setW}/>;
        case 'ai':           return <W.WorkspaceAI           w={workspace} setW={setW}/>;
        case 'audit':        return <W.WorkspaceAudit        w={workspace} setW={setW}/>;
        case 'compliance':   return <W.WorkspaceCompliance   w={workspace} setW={setW}/>;
        case 'branding':     return <W.WorkspaceBranding     w={workspace} setW={setW}/>;
        case 'danger':       return <W.WorkspaceDanger       w={workspace} setW={setW}/>;
      }
    }
    return null;
  };

  const activeSection = sections.find(s => s.id === section);

  return (
    <div style={{ height:'100%', display:'flex', overflow:'hidden' }}>
      {/* Left rail */}
      <aside style={{
        width:248, flexShrink:0, borderRight:'1px solid var(--border)',
        background:'var(--card-soft, var(--card))', padding:'18px 14px',
        overflowY:'auto', display:'flex', flexDirection:'column'
      }}>
        <div style={{ padding:'0 6px 12px' }}>
          <div style={{
            fontFamily:'var(--font-mono)', fontSize:10.5, letterSpacing:'.10em',
            color:'var(--text-dim)', textTransform:'uppercase', fontWeight:700
          }}>Settings</div>
          <div style={{ fontSize:11.5, color:'var(--text-sub)', marginTop:3 }}>
            Auto-saves. Sync across your devices.
          </div>
        </div>

        {/* Scope switcher */}
        <div style={{
          display:'grid', gridTemplateColumns:'1fr 1fr', gap:0, padding:2,
          background:'var(--card-alt)', border:'1px solid var(--border)',
          borderRadius:8, marginBottom:14
        }}>
          {[{id:'personal',l:'Personal'},{id:'workspace',l:'Workspace'}].map(s => {

            return (
              <button key={s.id} type="button" onClick={() => setScope(s.id)}
                style={{

                  background: active ? 'var(--card)' : 'transparent',
                  color: active ? 'var(--text)' : 'var(--text-sub)',

                }}>{s.l}</button>
            );
          })}
        </div>

        {/* Search */}
        <input value={query} onChange={e => setQuery(e.target.value)}
          placeholder="Search settings…"
          style={{
            background:'var(--card-alt)', border:'1px solid var(--border)', borderRadius:8,
            padding:'7px 10px', fontSize:12.5, color:'var(--text)', outline:'none',
            marginBottom:10, fontFamily:'inherit'

        {/* Section nav */}

          {filtered.map(sec => {

                  textAlign:'left', padding:'8px 10px', borderRadius:7,

        <div style={{ flex:1 }}/>
        <div style={{
          padding:'12px 10px 4px', fontSize:11, color:'var(--text-dim)',
          borderTop:'1px solid var(--border-soft)', marginTop:14, lineHeight:1.5
        }}>
          {scope === 'workspace' ? <>You're editing org-wide settings as <strong style={{ color:'var(--text-sub)' }}>Admin</strong>. Changes affect 142 teammates.</>

      {/* Main pane */}
      <div style={{ flex:1, overflow:'auto', position:'relative' }}>
        <div style={{ maxWidth:820, margin:'0 auto', padding:'32px 40px 100px' }}>
          {/* Page header */}
          <div style={{ marginBottom:22 }}>
            <div style={{
              fontFamily:'var(--font-mono)', fontSize:10.5, letterSpacing:'.10em',
              color:'var(--text-dim)', textTransform:'uppercase', fontWeight:700, marginBottom:6
            }}>
              {scope === 'personal' ? 'Personal' : 'Workspace'} · {activeSection?.kicker}
            </div>
            <h1 style={{
              fontFamily:'var(--font-display)', fontSize:30, fontWeight:800,
              letterSpacing:'-0.025em', margin:0, color:'var(--text)',
              color: activeSection?.danger ? 'var(--accent-2)' : 'var(--text)'
            }}>{activeSection?.label}</h1>
          </div>

          {renderSection()}
        </div>

        <SettingsToast/>
      </div>
    </div>
  );
};

window.BrSettings = { SettingsScreen };

  <script type="text/babel">
// Level-up celebration moment — multiple variants
const { useState: useStateCel, useEffect: useEffectCel } = React;

const LevelUpCelebration = ({ open, onClose, variant = 'cinematic', toLevel = 3 }) => {
  const { Btn, BrainstormMark } = window.BrPrim;
  const { IconClose, IconBolt, IconSpark, IconStar } = window.BrIcons;
  const { LEVELS } = window.BrData;

  const [phase, setPhase] = useStateCel(0);
  useEffectCel(() => {
    if (!open) { setPhase(0); return; }
    const t1 = setTimeout(() => setPhase(1), 600);
    const t2 = setTimeout(() => setPhase(2), 1400);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [open]);

  if (!open) return null;
  const lvl = LEVELS.find(l => l.num === toLevel) || LEVELS[2];

  // Confetti / particles
  const particles = Array.from({ length:50 }).map((_, i) => ({
    left: Math.random() * 100,
    delay: Math.random() * 0.5,
    duration: 2.5 + Math.random() * 2,
    color: ['var(--accent)', 'var(--accent-2)', 'var(--green)', '#FFD166'][i % 4],
    size: 6 + Math.random() * 8,
    rotate: Math.random() * 360
  }));

  return (
    <div style={{
      position:'fixed', inset:0, zIndex:200,
      background: variant === 'minimal' ? 'rgba(10, 6, 18, 0.85)' : 'radial-gradient(ellipse at center, color-mix(in oklab, var(--accent) 25%, transparent), rgba(10, 6, 18, 0.96) 60%)',
      backdropFilter:'blur(8px)',
      display:'flex', alignItems:'center', justifyContent:'center',
      animation:'bs-fade 0.4s ease-out'
    }}>
      {/* Close */}
      <button onClick={onClose} style={{
        position:'absolute', top:24, right:24, width:36, height:36, borderRadius:9,
        background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)',
        color:'#fff', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center'
      }}>
        <IconClose size={14} stroke="currentColor"/>
      </button>

      {/* Confetti */}
      {variant !== 'minimal' && particles.map((p, i) => (
        <div key={i} style={{
          position:'absolute', top:0, left:`${p.left}%`,
          width:p.size, height:p.size * (variant === 'cinematic' ? 1 : 0.4),
          background:p.color, borderRadius: variant === 'cinematic' ? '2px' : '999px',
          animation:`bs-confetti-fall ${p.duration}s ${p.delay}s linear forwards`,
          transform:`rotate(${p.rotate}deg)`
        }}/>
      ))}

      {/* Orbiting glyphs (cinematic only) */}
      {variant === 'cinematic' && phase >= 1 && (
        <div style={{ position:'absolute', top:'50%', left:'50%' }}>
          {['✦', '⚡', '◆', '✶', '●', '◇'].map((g, i) => (
            <div key={i} style={{
              position:'absolute', top:0, left:0,
              fontSize:18, color:'var(--accent)',
              animation:`bs-orbit ${4 + i * 0.4}s linear infinite`,
              animationDelay:`${i * -0.7}s`,
              opacity:0.7
            }}>{g}</div>
          ))}
        </div>
      )}

      {/* Center content */}
      <div className="bs-rise" style={{
        position:'relative', textAlign:'center', maxWidth:520, padding:'0 32px'
      }}>
        {/* Mark */}
        <div style={{
          width:128, height:128, margin:'0 auto 30px', position:'relative',
          animation: phase >= 1 ? 'bs-glow 2s ease-in-out infinite' : 'none'
        }}>
          <div style={{
            position:'absolute', inset:0, borderRadius:32,
            background:'linear-gradient(135deg, var(--accent), var(--accent-mid), var(--accent-deep))',
            display:'flex', alignItems:'center', justifyContent:'center',
            transform: phase >= 1 ? 'scale(1)' : 'scale(0.6)',
            transition:'transform 0.8s cubic-bezier(.16,1,.3,1)',
            boxShadow:'0 30px 80px -20px color-mix(in oklab, var(--accent) 60%, transparent)'
          }}>
            <span style={{
              fontFamily:'var(--font-display)', fontSize:80, fontWeight:800,
              color:'#fff', lineHeight:1, letterSpacing:'-0.04em'
            }}>{toLevel}</span>
          </div>
          {/* Ring */}
          <div style={{
            position:'absolute', inset:-12, borderRadius:'50%',
            border:'2px solid var(--accent)', opacity: phase >= 1 ? 0.4 : 0,
            transition:'opacity 0.6s'
          }}/>
        </div>

        <div style={{
          fontSize:11, fontWeight:800, color:'var(--accent)',
          letterSpacing:'0.18em', textTransform:'uppercase', marginBottom:12,
          opacity: phase >= 1 ? 1 : 0, transition:'opacity .5s .4s'
        }}>Level up</div>

        <h1 style={{
          fontFamily:'var(--font-display)', fontSize:'clamp(2.5rem, 6vw, 4rem)',
          fontWeight:700, letterSpacing:'-0.035em', lineHeight:1, margin:'0 0 14px',
          color:'#fff',
          opacity: phase >= 1 ? 1 : 0, transform: phase >= 1 ? 'translateY(0)' : 'translateY(12px)',
          transition:'all .6s .5s cubic-bezier(.16,1,.3,1)'
        }}>You're a {lvl.name}.</h1>

        <p style={{
          fontFamily:'var(--font-display)', fontSize:18, color:'rgba(255,255,255,0.75)',
          margin:'0 0 32px', lineHeight:1.5, fontWeight:500,
          opacity: phase >= 2 ? 1 : 0, transform: phase >= 2 ? 'translateY(0)' : 'translateY(8px)',
          transition:'all .5s .2s'
        }}>{lvl.selfDesc}</p>

        {/* Unlocked items */}
        {variant !== 'minimal' && (
          <div style={{
            display:'flex', gap:8, justifyContent:'center', marginBottom:32, flexWrap:'wrap',
            opacity: phase >= 2 ? 1 : 0, transition:'opacity .5s .4s'
          }}>
            {[
              { icon:'🏆', label:'Practitioner badge' },
              { icon:'🔓', label:'AI 201 unlocked' },
              { icon:'🎁', label:'+500 XP bonus' }
            ].map((u, i) => (
              <div key={i} style={{
                background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.14)',
                borderRadius:999, padding:'7px 14px', fontSize:12,
                display:'inline-flex', alignItems:'center', gap:8, color:'#fff', fontWeight:600
              }}>
                <span>{u.icon}</span><span>{u.label}</span>
              </div>
            ))}
          </div>
        )}

        <div style={{
          display:'flex', gap:10, justifyContent:'center',
          opacity: phase >= 2 ? 1 : 0, transition:'opacity .5s .6s'
        }}>
          <Btn onClick={onClose} icon={<IconBolt size={13}/>}>Continue learning</Btn>
          <Btn variant="secondary" onClick={onClose} style={{ background:'rgba(255,255,255,0.08)', borderColor:'rgba(255,255,255,0.16)', color:'#fff' }}>Share with team</Btn>
        </div>
      </div>
    </div>
  );
};

window.BrCelebration = { LevelUpCelebration };

  </script>

  <script type="text/babel">
// Reusable chart primitives for Insights — KPI tiles, sparklines, bars,
// heatmap, funnel, radar, distribution. SVG, no chart libraries.

const InsightTile = ({ label, value, sub, delta, tone = 'neutral', spark, onClick }) => {
  const toneColors = {
    neutral: 'var(--text)',
    pos:     'var(--green)',
    neg:     'var(--accent-2)',
    warn:    '#FFE03F',
  };
  return (
    <div onClick={onClick} style={{
      padding:'18px 20px', background:'var(--card)',
      border:'1px solid var(--border)', borderRadius:'var(--radius-lg)',
      cursor: onClick ? 'pointer' : 'default', position:'relative',
      transition:'border-color .15s, transform .15s',
      display:'flex', flexDirection:'column', gap:8, minHeight:108,
    }}
      onMouseEnter={(e) => onClick && (e.currentTarget.style.borderColor = 'var(--accent-border)')}
      onMouseLeave={(e) => onClick && (e.currentTarget.style.borderColor = 'var(--border)')}>
      <div style={{
        fontFamily:'var(--font-mono)', fontSize:10.5, letterSpacing:'.10em',
        color:'var(--text-dim)', textTransform:'uppercase', fontWeight:700
      }}>{label}</div>
      <div style={{ display:'flex', alignItems:'baseline', gap:10, flexWrap:'wrap' }}>
        <span style={{
          fontFamily:'var(--font-display)', fontSize:28, fontWeight:800,
          letterSpacing:'-0.025em', color: toneColors[tone], lineHeight:1
        }}>{value}</span>
        {delta && (
          <span style={{
            fontSize:12, fontWeight:700,
            color: delta.startsWith('-') ? 'var(--accent-2)' : delta.startsWith('+') ? 'var(--green)' : 'var(--text-dim)'
          }}>{delta}</span>
        )}
      </div>
      {sub && <div style={{ fontSize:11.5, color:'var(--text-sub)', lineHeight:1.4 }}>{sub}</div>}
      {spark && (
        <div style={{ marginTop:'auto', paddingTop:8 }}>
          <Sparkline points={spark} height={28}/>
        </div>
      )}
    </div>
  );
};

// Sparkline — array of numbers
const Sparkline = ({ points, height = 36, color = 'var(--accent)' }) => {
  if (!points || points.length === 0) return null;
  const w = 100, h = height;
  const min = Math.min(...points), max = Math.max(...points);
  const range = (max - min) || 1;
  const xs = points.map((_, i) => (i / (points.length - 1)) * w);
  const ys = points.map(v => h - ((v - min) / range) * (h - 4) - 2);
  const d = points.map((v, i) => `${i === 0 ? 'M' : 'L'}${xs[i].toFixed(2)},${ys[i].toFixed(2)}`).join(' ');
  const fill = `${d} L${w},${h} L0,${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width:'100%', height, display:'block' }}>
      <defs>
        <linearGradient id={`sg-${points.length}-${(points[0]||0).toFixed(0)}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={fill} fill={`url(#sg-${points.length}-${(points[0]||0).toFixed(0)})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r="2" fill={color}/>
    </svg>
  );
};

// Bar chart — horizontal, ranked
const RankedBars = ({ rows, max, formatVal }) => {
  const m = max ?? Math.max(...rows.map(r => r.value));
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:9 }}>
      {rows.map((r, i) => (
        <div key={i} style={{ display:'grid', gridTemplateColumns:'150px 1fr 60px', gap:10, alignItems:'center' }}>
          <span style={{ fontSize:12.5, color:'var(--text)', fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{r.label}</span>
          <div style={{ height:10, background:'var(--card-alt)', borderRadius:999, overflow:'hidden', position:'relative' }}>
            <div style={{
              width:`${Math.max(2,(r.value/m)*100)}%`, height:'100%',
              background: r.color || 'var(--accent)', borderRadius:999,
              transition:'width .8s cubic-bezier(.2,.8,.2,1)'
            }}/>
            {r.target != null && (
              <div title="Target" style={{
                position:'absolute', top:-2, left:`${(r.target/m)*100}%`,
                width:2, height:14, background:'var(--text-dim)', borderRadius:1
              }}/>
            )}
          </div>
          <span style={{ fontFamily:'var(--font-mono)', fontSize:11.5, color:'var(--text-sub)', textAlign:'right' }}>
            {formatVal ? formatVal(r.value) : r.value}
          </span>
        </div>
      ))}
    </div>
  );
};

// Activity heatmap — 7 rows (days) x N cols (hours or weeks)
const Heatmap = ({ data, rowLabels, colLabels, max, color = 'var(--accent)' }) => {
  const m = max ?? Math.max(...data.flat());
  return (
    <div style={{ display:'inline-grid', gap:3, gridTemplateColumns:`auto repeat(${data[0].length}, 1fr)` }}>
      <div/>
      {colLabels.map((c, i) => (
        <div key={i} style={{
          fontFamily:'var(--font-mono)', fontSize:9.5, color:'var(--text-dim)',
          textAlign:'center', letterSpacing:'.04em'
        }}>{c}</div>
      ))}
      {data.map((row, r) => (
        <div key={r} style={{ display:'contents' }}>
          <div style={{
            fontFamily:'var(--font-mono)', fontSize:9.5, color:'var(--text-dim)',
            paddingRight:8, alignSelf:'center', letterSpacing:'.04em'
          }}>{rowLabels[r]}</div>
          {row.map((v, c) => {
            const o = m === 0 ? 0 : 0.10 + (v / m) * 0.85;
            return (
              <div key={c} title={`${rowLabels[r]} ${colLabels[c]}: ${v}`} style={{
                width:'100%', aspectRatio:'1/1', minWidth:14,
                borderRadius:3,
                background: v === 0
                  ? 'var(--card-alt)'
                  : `color-mix(in oklab, ${color} ${o*100}%, transparent)`,
                border:'1px solid var(--border-soft)',
                cursor:'default'
              }}/>
            );
          })}
        </div>
      ))}
    </div>
  );
};

// Funnel — vertical, with drop-off labels
const Funnel = ({ steps }) => {
  const top = steps[0]?.value || 1;
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
      {steps.map((s, i) => {
        const pct = (s.value / top) * 100;
        const dropoff = i > 0 ? Math.round((1 - s.value / steps[i-1].value) * 100) : null;
        return (
          <div key={i} style={{ display:'contents' }}>
            <div style={{ display:'grid', gridTemplateColumns:'170px 1fr 90px', gap:12, alignItems:'center' }}>
              <span style={{ fontSize:12.5, color:'var(--text)', fontWeight:600 }}>{s.label}</span>
              <div style={{ position:'relative', height:30, background:'var(--card-alt)', borderRadius:6, overflow:'hidden' }}>
                <div style={{
                  width:`${pct}%`, height:'100%',
                  background: `linear-gradient(90deg, var(--accent) 0%, var(--accent-mid) 100%)`,
                  borderRadius:6,
                  transition:'width .9s cubic-bezier(.2,.8,.2,1)'
                }}/>
                <div style={{
                  position:'absolute', inset:0, display:'flex', alignItems:'center', padding:'0 10px',
                  fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text)', fontWeight:700
                }}>{s.value.toLocaleString()}</div>
              </div>
              <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-sub)', textAlign:'right' }}>
                {Math.round(pct)}% of top
              </span>
            </div>
            {dropoff != null && dropoff > 0 && (
              <div style={{
                marginLeft:170, paddingLeft:12, fontSize:10.5, color:'var(--text-dim)',
                fontFamily:'var(--font-mono)', letterSpacing:'.04em'
              }}>↓ {dropoff}% drop-off</div>
            )}
          </div>
        );
      })}
    </div>
  );
};

// Skill radar — 5–8 axes
const SkillRadar = ({ skills, size = 200, color = 'var(--accent)' }) => {
  const cx = size/2, cy = size/2, r = size/2 - 28;
  const n = skills.length;
  const angle = (i) => -Math.PI/2 + (i / n) * Math.PI * 2;
  const point = (i, v) => {
    const a = angle(i);
    const rr = r * (v/100);
    return [cx + Math.cos(a) * rr, cy + Math.sin(a) * rr];
  };
  const polygon = skills.map((s, i) => point(i, s.value).join(',')).join(' ');
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display:'block' }}>
      {/* Concentric rings */}
      {[0.25, 0.5, 0.75, 1].map(t => (
        <polygon key={t}
          points={skills.map((_, i) => {
            const a = angle(i);
            return `${cx + Math.cos(a)*r*t},${cy + Math.sin(a)*r*t}`;
          }).join(' ')}
          fill="none" stroke="var(--border)" strokeWidth="0.7"/>
      ))}
      {/* Axes */}
      {skills.map((_, i) => {
        const a = angle(i);
        return <line key={i} x1={cx} y1={cy} x2={cx + Math.cos(a)*r} y2={cy + Math.sin(a)*r}
          stroke="var(--border)" strokeWidth="0.7"/>;
      })}
      {/* Data polygon */}
      <polygon points={polygon} fill={color} fillOpacity="0.20" stroke={color} strokeWidth="1.5"/>
      {/* Vertices */}
      {skills.map((s, i) => {
        const [x, y] = point(i, s.value);
        return <circle key={i} cx={x} cy={y} r="2.6" fill={color}/>;
      })}
      {/* Labels */}
      {skills.map((s, i) => {
        const a = angle(i);
        const x = cx + Math.cos(a) * (r + 16);
        const y = cy + Math.sin(a) * (r + 16);
        const anchor = Math.cos(a) > 0.3 ? 'start' : Math.cos(a) < -0.3 ? 'end' : 'middle';
        return (
          <text key={i} x={x} y={y} textAnchor={anchor} dominantBaseline="middle"
            style={{ fontSize:'9.5px', fontFamily:'var(--font-mono)', letterSpacing:'.04em', fill:'var(--text-sub)' }}>
            {s.label}
          </text>
        );
      })}
    </svg>
  );
};

// Distribution / histogram — horizontal
const Distribution = ({ buckets, color = 'var(--accent)' }) => {
  const m = Math.max(...buckets.map(b => b.value));
  return (
    <div style={{ display:'flex', alignItems:'flex-end', gap:3, height:90 }}>
      {buckets.map((b, i) => (
        <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6, minWidth:0 }}>
          <div style={{
            width:'100%',
            height: `${Math.max(4, (b.value/m) * 70)}px`,
            background: b.highlight ? color : `color-mix(in oklab, ${color} 35%, transparent)`,
            borderRadius:'3px 3px 0 0',
            transition:'height .8s'
          }}/>
          <div style={{ fontSize:9.5, fontFamily:'var(--font-mono)', color:'var(--text-dim)' }}>{b.label}</div>
        </div>
      ))}
    </div>
  );
};

// Insight callout — AI-narrative card
const NarrativeCard = ({ headline, body, signals, action }) => {
  const { Btn } = window.BrPrim;
  return (
    <div style={{
      background:`linear-gradient(135deg, color-mix(in oklab, var(--accent) 12%, var(--card)) 0%, var(--card) 60%)`,
      border:'1px solid var(--accent-border)', borderRadius:'var(--radius-lg)',
      padding:'22px 26px', display:'grid', gridTemplateColumns:'1fr auto', gap:24, alignItems:'flex-start'
    }}>
      <div style={{ minWidth:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
          <span style={{
            display:'inline-flex', alignItems:'center', gap:6,
            padding:'2px 8px', borderRadius:999, fontSize:10, fontWeight:700,
            fontFamily:'var(--font-mono)', letterSpacing:'.08em', textTransform:'uppercase',
            background:'var(--accent-light)', color:'var(--accent)', border:'1px solid var(--accent-border)'
          }}>
            <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--accent)' }}/>
            Coach insight
          </span>
          <span style={{ fontSize:10.5, color:'var(--text-dim)', fontFamily:'var(--font-mono)' }}>Generated 8 min ago</span>
        </div>
        <h3 style={{
          fontFamily:'var(--font-display)', fontSize:21, fontWeight:700, letterSpacing:'-0.02em',

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
