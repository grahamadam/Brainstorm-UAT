  // Click-outside + Escape to dismiss
  useEffectShell(() => {
    const onDoc = (e) => {
      if (panelRef.current?.contains(e.target)) return;
      if (anchorRef?.current?.contains(e.target)) return;
      onClose();
    };
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('mousedown', onDoc);
      document.removeEventListener('keydown', onKey);
    };
  }, []);

  const iconFor = (kind) => {
    const props = { size:14, stroke:'currentColor' };
    switch (kind) {
      case 'coach':       return <CoachGlyph size={14} color="currentColor" />;

          <span style={{

        <span style={{ flex:1 }}/>
        {unread > 0 && (

            borderRadius:6, fontFamily:'inherit'

            onMouseEnter={e => e.currentTarget.style.color = 'var(--text)'}
            onMouseLeave={e => e.currentTarget.style.color = 'var(--text-sub)'}
          >Mark all read</button>
        )}
      </div>

      {/* Items */}
      <div style={{ flex:1, overflowY:'auto', padding:'4px 0' }}>

          <div style={{ padding:'40px 20px', textAlign:'center', color:'var(--text-dim)', fontSize:13 }}>
            You're all caught up.

              display:'flex', gap:12, width:'100%', textAlign:'left',
              padding:'12px 16px', background: it.read ? 'transparent' : 'var(--accent-light)',
              border:'none', borderLeft: it.read ? '3px solid transparent' : '3px solid var(--accent)',
              cursor:'pointer', borderTop:'1px solid var(--border-soft)',
              transition:'background .14s', fontFamily:'inherit', color:'inherit'
            }}
              onMouseEnter={e => { if (it.read) e.currentTarget.style.background = 'var(--card)'; }}
              onMouseLeave={e => { if (it.read) e.currentTarget.style.background = 'transparent'; }}
            >
              <div style={{
                width:32, height:32, borderRadius:8, flexShrink:0,

        // daily-challenge state (bs_dc_<date>), tour flags, etc. Iterate a

        const keys = Object.keys(localStorage);

        padding:'7px 12px', opacity:0.7

          </button>
        </>
      )}
      <div style={{ position:'relative', display:'flex', alignItems:'center' }}>
        <button
          onClick={handleReset}
          title="Wipe local progress and restart from onboarding"
          style={{
            display:'flex', alignItems:'center', gap:7,
            background:'var(--accent-2)',
            border:'1px solid var(--accent-2)',
            padding:'0 11px', height:34, cursor:'pointer',
            fontSize:11, color:'#fff',
            fontFamily:'var(--font-mono)', borderRadius:7, letterSpacing:'.06em',
            textTransform:'uppercase', fontWeight:700, boxSizing:'border-box',
            boxShadow:'0 2px 8px rgba(255,35,112,0.32)',
            transition:'box-shadow .18s, transform .12s, filter .15s'
          }}
          onMouseEnter={e => { e.currentTarget.style.filter = 'brightness(1.08)'; e.currentTarget.style.transform = 'translateY(-1px)'; }}
          onMouseLeave={e => { e.currentTarget.style.filter = 'none'; e.currentTarget.style.transform = 'none'; }}
        >
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>
          </svg>
          Reset Experience
        </button>
      </div>
      {setTheme && (
        <button
          onClick={() => setTheme(isLight ? 'dark' : 'light')}
          title={isLight ? 'Switch to dark mode' : 'Switch to light mode'}
          aria-label={isLight ? 'Switch to dark mode' : 'Switch to light mode'}
          role="switch"
          aria-checked={isLight}
          style={{
            position:'relative',
            width:62, height:34, borderRadius:999,
            border:'1px solid var(--border)',
            background:'var(--card)',
            cursor:'pointer', padding:0, flexShrink:0, boxSizing:'border-box',
            display:'flex', alignItems:'center',
            transition:'background .18s, border-color .18s'
          }}
        >
          {/* L / D track labels */}
          <span style={{
            position:'absolute', left:9, top:'50%', transform:'translateY(-50%)',
            fontFamily:'var(--font-mono)', fontSize:10, fontWeight:700, letterSpacing:'.04em',
            color: isLight ? 'var(--text)' : 'var(--text-dim)',
            transition:'color .18s', pointerEvents:'none'
          }}>L</span>
          <span style={{
            position:'absolute', right:9, top:'50%', transform:'translateY(-50%)',
            fontFamily:'var(--font-mono)', fontSize:10, fontWeight:700, letterSpacing:'.04em',
            color: isLight ? 'var(--text-dim)' : 'var(--text)',
            transition:'color .18s', pointerEvents:'none'
          }}>D</span>
          {/* Thumb */}
          <span style={{
            position:'absolute', top:2,
            left: isLight ? 2 : 'calc(100% - 28px)',
            width:26, height:26, borderRadius:'50%',
            background:'var(--accent)',
            boxShadow:'0 1px 3px rgba(0,0,0,0.35)',
            transition:'left .22s cubic-bezier(.5,.05,.2,1), background .18s',
            pointerEvents:'none'
          }} />
        </button>
      )}
      <div ref={bellRef} style={{ position:'relative', display:'flex', alignItems:'center' }}>
        <button
          onClick={() => setNotifOpen(o => !o)}
          aria-label="Notifications"
          aria-expanded={notifOpen}
          style={{
            width:34, height:34, borderRadius:8, boxSizing:'border-box',
            border:`1px solid ${notifOpen ? 'var(--accent-border)' : 'var(--border)'}`,
            background: notifOpen ? 'var(--accent-light)' : 'var(--card)',
            color: notifOpen ? 'var(--accent)' : 'var(--text-sub)', cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center', position:'relative',
            transition:'color .14s, background .14s, border-color .14s'
          }}
        >
          <IconBell size={14} stroke="currentColor" />
          {unreadCount > 0 && (
            <span style={{
              position:'absolute', top:-3, right:-3, minWidth:16, height:16, padding:'0 4px',
              borderRadius:9, background:'var(--accent-2)', color:'#fff',
              fontSize:9.5, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center',
              border:'2px solid var(--surface)', letterSpacing:'.02em'
            }}>{unreadCount}</span>
          )}
        </button>
        {notifOpen && (
          <NotificationsPanel
            items={notifs}
            anchorRef={bellRef}
            onClose={() => setNotifOpen(false)}
            onMarkAllRead={() => setNotifs(ns => ns.map(n => ({ ...n, read:true })))}
            onItemClick={(it) => setNotifs(ns => ns.map(n => n.id === it.id ? { ...n, read:true } : n))}
          />
        )}
      </div>
    </div>
  );
};

window.BrShell = { Sidebar, Topbar };

  </script>
  <!-- src/daily-challenge.jsx -->
  <script type="text/babel">
// DAILY CHALLENGE — "Wordle meets AI". One puzzle a day, generated overnight by Claude
// from yesterday's lesson + your level. 3 attempts. Score grows with specificity.
// Persistent state: localStorage `bs_dc_<date>` so refresh keeps progress.
const { useState: useDCState, useEffect: useDCEffect, useRef: useDCRef } = React;

// today's seeded challenge — pulled from the active AI curriculum
// (Module 04 · Craft · "Prompting best practices" — the four-part frame)
const _dcLaunch = new Date('2025-02-03');
const _dcToday = new Date(); _dcToday.setHours(0,0,0,0);
const _dcNumber = Math.max(1, Math.floor((_dcToday - _dcLaunch) / 86400000) + 1);
const DC_CHALLENGE = {
  date: new Date().toISOString().slice(0,10),
  number: _dcNumber,
  source: { kind:'lesson', label:"AI 101 · M04 · The four-part frame", duration:'15 min lesson' },
  framework: {
    label: 'The four-part frame',
    parts: ['Role', 'Task', 'Context', 'Format'],
  },
  // The actual prompt the user is being asked to fix.
  startingPrompt: 'Summarize this article.',
  setup:  "Yesterday's lesson taught the four-part frame for prompting. A vague prompt like the one below gets you a vague answer.",
  task:   "Rewrite the prompt below using the four-part frame.",
  // Reframed display copy: a clear instruction with bracketed fill-ins, the
  // framework named, and the prompt to be rewritten broken out so the ask is
  // unambiguous.
  taskDisplay: {
    instruction: 'Rewrite this prompt using the four-part framework.',
    framework: 'Role · Task · Context · Format',
    prompt: 'Summarize this article.',
    note: '≤60 words. The closer the model can tell what you actually want, the higher your score.',
  },
  hints: [
    'Open with a Role: who is the model being? (\"You are a…\")',
    'Be specific about Task and Format: bullets? word count? audience?',
    'Add one line of Context: why are you asking, who reads it.'
  ],
  // grading rubric Claude will apply (shown to the user after submit)
  rubric: [
    { id:'role',    label:'Names a Role for the model',          pts:25 },
    { id:'task',    label:'Task is specific (not "summarize")',  pts:25 },
    { id:'context', label:'Adds Context: why / for whom',         pts:25 },
    { id:'format',  label:'Specifies Format: shape, length',      pts:25 },
  ],
  par: 78,    // team par
  best: 92,   // top score on team today
  attempts_max: 3,
};

// canned grade for the demo (would be a Claude call)
const DC_GRADE = (text) => {
  const t = text.toLowerCase();
  const hasRole    = /(you are|act as|you're a|you are a|role:)/i.test(text);
  const hasTask    = /\d/.test(text) || /(rewrite|extract|compare|critique|draft|outline|translate|classif)/i.test(t);
  const hasContext = /(audience|for (a|an|the)|because|so that|context:|reader|customer|exec|engineer|new hire)/i.test(t);
  const hasFormat  = /(bullet|table|markdown|json|paragraph|word|words|sentence|tone|format:|≤|<=|max)/i.test(t);
  const hits = [hasRole, hasTask, hasContext, hasFormat].filter(Boolean).length;
  const len = Math.min(text.length, 280);
  const score = Math.min(98, 30 + hits*14 + Math.round(len/12));
  return {
    score,
    hits: [
      { id:'role',    got: hasRole,    detail: hasRole    ? 'Clear Role set up front.'                    : 'No Role: the model has to guess who it is.' },
      { id:'task',    got: hasTask,    detail: hasTask    ? 'Task is concrete and verifiable.'            : 'Task is vague; "summarize" alone won\'t cut it.' },
      { id:'context', got: hasContext, detail: hasContext ? 'Good Context: model knows the audience.'     : 'No Context: outputs will be generic.' },
      { id:'format',  got: hasFormat,  detail: hasFormat  ? 'Format spelled out (length, shape, tone).'   : 'No Format: the model picks for you.' }
    ]
  };
};

const DailyChallenge = ({ onComplete }) => {
  const { Pill, Btn, Kicker, Card } = window.BrPrim;
  const { IconBolt, IconSpark, IconClock, IconArrowR, IconCheck, IconClose, IconShare, IconRefresh, IconTrophy, IconCpu, IconLightbulb } = window.BrIcons;

  const storeKey = 'bs_dc_' + DC_CHALLENGE.date;
  const [state, setState] = useDCState(() => {
    try {
      const raw = localStorage.getItem(storeKey);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { attempts: [], hintsUsed: 0, complete: false };
  });
  useDCEffect(() => {
    try { localStorage.setItem(storeKey, JSON.stringify(state)); } catch (e) {}
  }, [state]);

  const [draft, setDraft] = useDCState('');
  const [grading, setGrading] = useDCState(false);
  const [showRecap, setShowRecap] = useDCState(false);
  const [hintsCollapsed, setHintsCollapsed] = useDCState(false);
  const taRef = useDCRef(null);

  const submit = () => {
    if (!draft.trim() || state.attempts.length >= DC_CHALLENGE.attempts_max) return;
    setGrading(true);
    setTimeout(() => {
      const grade = DC_GRADE(draft);
      const next = {
        ...state,
        attempts: [...state.attempts, { text: draft, grade, at: Date.now() }],
      };
      const last = next.attempts.length >= DC_CHALLENGE.attempts_max;
      const passed = grade.score >= DC_CHALLENGE.par;
      if (last || passed) next.complete = true;
      setState(next);
      setDraft('');
      setGrading(false);
      if (next.complete && onComplete) onComplete(grade.score);
    }, 1400);
  };

  const useHint = () => {
    if (state.hintsUsed >= DC_CHALLENGE.hints.length) return;
    setState({ ...state, hintsUsed: state.hintsUsed + 1 });
  };

  const reset = () => {
    setState({ attempts: [], hintsUsed: 0, complete: false });
    setDraft('');
    setShowRecap(false);
  };

  const lastAttempt = state.attempts[state.attempts.length - 1];
  const bestScore = state.attempts.reduce((m, a) => Math.max(m, a.grade.score), 0);
  const remainingAttempts = DC_CHALLENGE.attempts_max - state.attempts.length;

  // Score visualization — 4 squares like Wordle rows
  const ScoreRow = ({ grade }) => (
    <div style={{ display:'flex', gap:5 }}>
      {DC_CHALLENGE.rubric.map(r => {
        const hit = grade.hits.find(h => h.id === r.id);
        const got = hit?.got;
        return (
          <div key={r.id} title={r.label} style={{
            width:18, height:18, borderRadius:4,
            background: got ? 'var(--green)' : 'var(--card-alt)',
            border: `1px solid ${got ? 'var(--green-border)' : 'var(--border)'}`,
            display:'flex', alignItems:'center', justifyContent:'center'
          }}>
            {got && <IconCheck size={10} stroke="#0A2E24"/>}
          </div>
        );
      })}
    </div>
  );

  // Gradient hero panel
  return (
    <Card padding={0} style={{
      overflow:'hidden', position:'relative',
      background:'linear-gradient(160deg, color-mix(in oklab, var(--accent) 14%, var(--card)) 0%, var(--card) 60%)',
      border:'1px solid var(--accent-border)'
    }}>
      {/* Header strip */}
      <div id="tour-daily-challenge" style={{
        padding:'14px 22px', borderBottom:'1px solid var(--border)',
        display:'flex', alignItems:'center', gap:12, flexWrap:'wrap',
        background:'color-mix(in oklab, var(--accent) 8%, var(--card))'
      }}>
        <Pill icon={<IconBolt size={11}/>} bg="var(--accent)" border="var(--accent)" color="#fff" style={{ fontWeight:800 }}>
          Daily Challenge
        </Pill>
        <span style={{ fontSize:11, color:'var(--text-sub)', fontFamily:'var(--font-mono)' }}>
          #{DC_CHALLENGE.number} · {new Date(DC_CHALLENGE.date).toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' })}
        </span>
        <span style={{ flex:1 }}/>
        <span style={{ fontSize:11, color:'var(--text-dim)', display:'inline-flex', alignItems:'center', gap:5 }}>
          <IconCpu size={11} stroke="currentColor"/> generated 06:00 · sonnet-4.5
        </span>
      </div>

      {/* Body */}
      <div style={{ padding:'14px 20px' }}>
        {/* Source chip */}
        <div style={{
          display:'inline-flex', alignItems:'center', gap:8,
          padding:'4px 10px', borderRadius:7,
          background:'var(--card)', border:'1px solid var(--border)',
          fontSize:11, color:'var(--text-sub)', fontFamily:'var(--font-mono)', marginBottom:10
        }}>
          <span style={{ width:6, height:6, borderRadius:'50%', background:'var(--accent-2)' }} />
          source · {DC_CHALLENGE.source.label}
        </div>

        {/* Task — the actual challenge — large.
            Reframed for clarity: the instruction names the framework explicitly,
            the framework parts and the prompt-to-rewrite are broken out so the
            user can see exactly what they're working with. */}
        <h3 style={{
          fontFamily:'var(--font-display)', fontSize:'clamp(1.1rem, 1.8vw, 1.35rem)',
          fontWeight:700, letterSpacing:'-0.02em', lineHeight:1.28, margin:'0 0 10px',
          color:'var(--text)', textWrap:'pretty'
        }}>
          {DC_CHALLENGE.taskDisplay.instruction}
        </h3>

        {/* Inline cards: framework + prompt — make the two inputs unmistakable */}
        <div style={{
          display:'grid', gridTemplateColumns:'auto 1fr', gap:'8px 10px',
          alignItems:'start', margin:'0 0 12px',
          padding:'10px 12px',
          background:'var(--card-alt)', border:'1px dashed var(--border)',
          borderRadius:10
        }}>
          <span style={{
            fontFamily:'var(--font-mono)', fontSize:10, color:'var(--text-dim)',
            letterSpacing:'.10em', textTransform:'uppercase', fontWeight:700,
            paddingTop:2
          }}>Framework</span>
          <span style={{
            fontFamily:'var(--font-display)', fontSize:13.5, fontWeight:700,
            color:'var(--text)', lineHeight:1.4
          }}>
            {DC_CHALLENGE.taskDisplay.framework}
          </span>

          <span style={{
            fontFamily:'var(--font-mono)', fontSize:10, color:'var(--text-dim)',
            letterSpacing:'.10em', textTransform:'uppercase', fontWeight:700,
            paddingTop:3
          }}>Prompt</span>
          <span style={{
            fontFamily:'var(--font-mono)', fontSize:12.5, color:'var(--text)',
            lineHeight:1.45, fontStyle:'italic'
          }}>
            "{DC_CHALLENGE.taskDisplay.prompt}"
          </span>
        </div>

        {/* Setup — context — small */}
        <p style={{
          margin:'0 0 12px', fontSize:13, color:'var(--text-sub)', lineHeight:1.5,
          fontFamily:'var(--font-heading)', fontWeight:500
        }}>
          {DC_CHALLENGE.taskDisplay.note}
        </p>

        {/* Stats row */}
        <div style={{ display:'flex', gap:10, marginBottom:12, flexWrap:'wrap' }}>
          <DCStat label="Team par"     value={DC_CHALLENGE.par} suffix="pts" />
          <DCStat label="Today's best" value={DC_CHALLENGE.best} suffix="pts" accent="var(--green)" />
          <DCStat label="Played today" value="287" suffix="reps" />
          <DCStat label="Your streak"  value="6" suffix="days" accent="var(--accent-2)" />
        </div>

        {/* Attempt rows (Wordle vibe) — only render filled rows + the "next" row to keep card compact */}
        {state.attempts.length > 0 && (
        <div style={{ marginBottom:10 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:6 }}>
            <Kicker>Your attempts</Kicker>
            <span style={{ fontSize:11, color:'var(--text-dim)', fontFamily:'var(--font-mono)' }}>
              {state.attempts.length}/{DC_CHALLENGE.attempts_max}
            </span>
            <span style={{ flex:1 }}/>
            {bestScore > 0 && (
              <span style={{ fontSize:11, color:'var(--text-sub)' }}>
                best · <strong style={{ color: bestScore >= DC_CHALLENGE.par ? 'var(--green)' : 'var(--text)' }}>{bestScore}</strong>
              </span>
            )}
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {(() => {
              // Show only the rows that have been used. While in progress, also show the
              // immediate next row as an empty "next attempt…" placeholder. Don't render
              // remaining locked rows — they were padding the card.
              const rowsToShow = state.complete
                ? state.attempts.length
                : Math.min(state.attempts.length + 1, DC_CHALLENGE.attempts_max);
              return Array.from({ length: rowsToShow });
            })().map((_, i) => {
              const a = state.attempts[i];
              const empty = !a;
              return (
                <div key={i} style={{
                  display:'flex', alignItems:'center', gap:10,
                  padding:'7px 10px', borderRadius:8,
                  background: empty ? 'transparent' : 'var(--card)',
                  border:`1px ${empty ? 'dashed' : 'solid'} ${empty ? 'var(--border)' : a.grade.score >= DC_CHALLENGE.par ? 'var(--green-border)' : 'var(--border)'}`
                }}>
                  <span style={{
                    width:24, height:24, borderRadius:6, flexShrink:0,
                    background: empty ? 'var(--card-alt)' : a.grade.score >= DC_CHALLENGE.par ? 'var(--green)' : 'var(--accent-light)',
                    color: empty ? 'var(--text-dim)' : a.grade.score >= DC_CHALLENGE.par ? '#0A2E24' : 'var(--accent)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontFamily:'var(--font-mono)', fontWeight:800, fontSize:11,
                    border:`1px solid ${empty ? 'var(--border)' : a.grade.score >= DC_CHALLENGE.par ? 'var(--green-border)' : 'var(--accent-border)'}`
                  }}>{i+1}</span>
                  {empty ? (
                    <span style={{ flex:1, fontSize:12, color:'var(--text-dim)', fontStyle:'italic' }}>
                      next attempt…
                    </span>
                  ) : (
                    <>
                      <span style={{ flex:1, fontSize:12, color:'var(--text-sub)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                        {a.text.length > 90 ? a.text.slice(0,90) + '…' : a.text}
                      </span>
                      <ScoreRow grade={a.grade} />
                      <span style={{
                        minWidth:42, textAlign:'right', fontFamily:'var(--font-mono)', fontWeight:800, fontSize:13,
                        color: a.grade.score >= DC_CHALLENGE.par ? 'var(--green)' : 'var(--text)'
                      }}>{a.grade.score}</span>
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>
        )}

        {/* Compose / Complete */}
        {!state.complete ? (
          <div>
            <textarea
              ref={taRef}
              value={draft} onChange={e => setDraft(e.target.value.slice(0, 500))}
              placeholder="Type your answer here…"
              rows={3}
              disabled={grading}
              style={{
                width:'100%', resize:'vertical',
                background:'var(--card)', border:'1px solid var(--border)', borderRadius:10,
                padding:'12px 14px', fontSize:14, color:'var(--text)', outline:'none',
                fontFamily:'var(--font-body)', lineHeight:1.55,
                boxShadow:'inset 0 1px 0 0 rgba(255,255,255,0.02)'
              }}
              onFocus={e => e.target.style.borderColor = 'var(--accent-border)'}
              onBlur={e => e.target.style.borderColor = 'var(--border)'}
            />
            <div style={{ display:'flex', alignItems:'center', gap:10, marginTop:10, flexWrap:'wrap' }}>
              <button onClick={useHint} disabled={state.hintsUsed >= DC_CHALLENGE.hints.length}
                style={{
                  background:'var(--card-alt)', border:'1px solid var(--border)',
                  color: state.hintsUsed >= DC_CHALLENGE.hints.length ? 'var(--text-dim)' : 'var(--accent)',
                  padding:'6px 11px', borderRadius:8, cursor: state.hintsUsed >= DC_CHALLENGE.hints.length ? 'default' : 'pointer',
                  fontSize:11, fontWeight:700, fontFamily:'inherit',
                  display:'inline-flex', alignItems:'center', gap:6
                }}>
                <IconLightbulb size={11} stroke="currentColor"/>
                Hint {state.hintsUsed}/{DC_CHALLENGE.hints.length}
                <span style={{ color:'var(--text-dim)', fontWeight:500 }}>· −5 pts</span>
              </button>
              <span style={{ fontSize:11, color:'var(--text-dim)', fontFamily:'var(--font-mono)' }}>
                {draft.length}/500
              </span>
              <span style={{ flex:1 }}/>
              <Btn icon={grading ? <IconCpu size={12}/> : <IconArrowR size={12}/>}
                onClick={submit} disabled={!draft.trim() || grading || remainingAttempts === 0}>
                {grading ? 'Coach grading…' : `Submit (${remainingAttempts} left)`}
              </Btn>
            </div>

            {/* Hint reveal stack — collapsible header + list */}
            {state.hintsUsed > 0 && (
              <div style={{ marginTop:12 }}>
                <button onClick={() => setHintsCollapsed(c => !c)}
                  style={{
                    display:'flex', alignItems:'center', gap:8, width:'100%',
                    padding:'6px 10px', borderRadius:8,
                    background:'transparent', border:'1px solid var(--border)',
                    cursor:'pointer', fontFamily:'inherit',
                    color:'var(--text-sub)', fontSize:11, fontWeight:700,
                    letterSpacing:'.06em', textTransform:'uppercase'
                  }}>
                  <IconLightbulb size={11} stroke="var(--yellow)"/>
                  <span>Hints used · {state.hintsUsed}/{DC_CHALLENGE.hints.length}</span>
                  <span style={{ flex:1 }}/>
                  <span style={{
                    display:'inline-block', transition:'transform .2s',
                    transform: hintsCollapsed ? 'rotate(-90deg)' : 'rotate(0deg)',
                    color:'var(--text-dim)', fontSize:10
                  }}>▾</span>
                </button>
                {!hintsCollapsed && (
                  <div style={{ marginTop:6, display:'flex', flexDirection:'column', gap:6 }}>
                    {DC_CHALLENGE.hints.slice(0, state.hintsUsed).map((h, i) => (
                      <div key={i} style={{
                        padding:'8px 12px', borderRadius:8,
                        background:'color-mix(in oklab, var(--yellow) 10%, var(--card))',
                        border:'1px solid var(--yellow-border)',

                  {bestScore >= DC_CHALLENGE.par

                    : 'Three attempts up.'}
                </div>
                <div style={{ fontSize:12, color:'var(--text-sub)', marginBottom:10 }}>
                  {bestScore >= DC_CHALLENGE.par
                    ? `Above team par by ${bestScore - DC_CHALLENGE.par}. ${bestScore >= DC_CHALLENGE.best ? "You're today's best." : `Top score is ${DC_CHALLENGE.best}.`}`

                <div style={{ display:'flex', gap:6, marginBottom:10 }}>

                <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                  <Btn size="sm" variant="soft" icon={<IconShare size={11}/>} onClick={() => setShowRecap(true)}>
                    Share recap
                  </Btn>
                  <Btn size="sm" variant="ghost" icon={<IconClock size={11}/>}>
                    Next drops in {nextDropIn()}

                  <Btn size="sm" variant="ghost" icon={<IconRefresh size={11}/>} onClick={reset}>
                    Replay

                </div>

            {showRecap && (

                marginTop:14, padding:'12px 14px', borderRadius:10,

                fontFamily:'var(--font-mono)', fontSize:12, color:'var(--text)', whiteSpace:'pre', lineHeight:1.6
              }}>
{`Brainstorm Daily #${DC_CHALLENGE.number}
${state.attempts.map(a => a.grade.hits.map(h => h.got ? '🟩' : '⬜').join('')).join('\n')}
${bestScore}/100 · ${state.attempts.length}/${DC_CHALLENGE.attempts_max} · 🔥 7-day streak`}
              </div>
            )}
          </div>
        )}
      </div>
    </Card>
  );
};

const DCStat = ({ label, value, suffix, accent }) => (
  <div style={{
    flex:'1 1 90px', minWidth:90,
    padding:'7px 12px', borderRadius:8,
    background:'var(--card)', border:'1px solid var(--border)'
  }}>
    <div style={{ fontSize:10, color:'var(--text-dim)', textTransform:'uppercase', letterSpacing:'0.07em', fontWeight:700, marginBottom:2 }}>
      {label}
    </div>
    <div style={{ display:'flex', alignItems:'baseline', gap:4 }}>
      <span style={{
        fontFamily:'var(--font-display)', fontSize:18, fontWeight:800, letterSpacing:'-0.02em',
        color: accent || 'var(--text)'
      }}>{value}</span>
      <span style={{ fontSize:11, color:'var(--text-dim)', fontFamily:'var(--font-mono)' }}>{suffix}</span>
    </div>
  </div>
);

const nextDropIn = () => {
  const now = new Date();
  const next = new Date(now);
  next.setHours(6, 0, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  const ms = next - now;
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return `${h}h ${m}m`;
};

window.BrDailyChallenge = { DailyChallenge, DC_CHALLENGE };

  <script type="text/babel">
// HOME — Activity Feed (the focus screen)

  // ── Daily AI Challenge streaks ─────────────────────────────────────────────
  // Only business days count. Weekends and US federal holidays are skipped
  // entirely (they don't break a streak — they just don't exist).
  const US_HOLIDAYS_2026 = new Set([
    '2026-01-01','2026-01-19','2026-02-16','2026-05-25','2026-06-19',
    '2026-07-03','2026-09-07','2026-10-12','2026-11-11','2026-11-26','2026-12-25'

  const isBizDay = (d) => {
    const day = d.getDay();
    if (day === 0 || day === 6) return false;
    const iso = d.toISOString().slice(0,10);
    return !US_HOLIDAYS_2026.has(iso);
  };
  const lastBizDays = (n) => {
    const out = []; const d = new Date(); d.setHours(0,0,0,0);
    while (out.length < n) {
      if (isBizDay(d)) out.push(new Date(d));
      d.setDate(d.getDate() - 1);
    }
    return out; // newest first
  };
  const bizWindow = lastBizDays(8); // newest → oldest
  // Each rep gets a 1/0 bitmap aligned with bizWindow (newest first).
  // Streak = leading run of 1s.
  const streakers = [
    { initials:'PR', name:'Priya R.',   role:'AE · Mid-Market', ac:'#FFE03F', hits:[1,1,1,1,1,1,1,1], streak:14, par:91 },
    { initials:'MK', name:'Marcus K.',  role:'SDR Lead',         ac:'#3CAFF2', hits:[1,1,1,1,1,1,1,0], streak:11, par:88 },
    { initials:'JP', name:'Jordan P.',  role:'AE · Enterprise',  ac:'#4CFEC8', hits:[1,1,1,1,1,1,0,1], streak:9,  par:84 },
    { initials:'You',name:'You',        role:'AE · Enterprise',  ac:'#997CED', hits:[1,1,1,1,1,1,1,0], streak:7,  par:82, you:true },
    { initials:'AT', name:'Aisha T.',   role:'AE · Commercial',         ac:'#FF7A45', hits:[1,1,1,1,0,1,1,1], streak:4,  par:79 },
  ];
  const todayLabel = bizWindow[0].toLocaleDateString('en-US', { month:'short', day:'numeric' });

  const KIND_ICON = {

    streak:  <IconFlame size={11} />,
    graduate:<IconTrophy size={11} />,

    first:   <IconSpark size={11} />,
    badge:   <IconBolt size={11} />,
  };

  // ── PANELS — each layout composes these in different arrangements ─────────

  // ── Hero messages — a single rotating set with mixed tone (calm, encouraging,
  // gamified, terse, playful). Cycles every ~5s under the greeting. Keep each
  // line under ~70 chars so it fits on a single line at most widths.
  const HERO_MESSAGES = [
    // calm + practical
    "Here's what's queued for you today.",
    "One Daily Challenge, two modules, ten minutes.",
    "Your streak's still warm. Keep it that way.",
    "Pick one play. The rest can wait.",
    "Small reps, daily — that's the whole game.",
    // coach voice
    "Ready when you are.",
    "Five minutes is all today asks of you.",
    "You're closer to AI 101 than you think.",
    "Show up, even briefly. That's the win.",
    "One prompt better than yesterday.",
    // mission framing
    "Today's mission: keep the streak alive.",
    "Course 1 of your fluency journey is open.",
    "New challenge generated overnight. Ready to break it?",
    "Three plays on the board. Pick your move.",
    "Coach is on standby. The map is yours.",
    // stoic
    "Begin.",
    "The streak is a habit, not a trophy.",
    "Skill is built one rep at a time.",
    "You don't need motivation. You need five minutes.",
    "Less scrolling, more practicing.",

    "Coffee in hand? Let's get into it. ☕",
    "Today's challenge is a spicy one.",

    "Five minutes, then you're free. Promise.",

  ];

  const Greeting = ({ size = 'lg', sub, messages }) => {
    // Resolve which copy to show: explicit `messages` array wins, then `sub`,

    const resolved = Array.isArray(messages) && messages.length
      ? messages

    const [idx, setIdx] = useStateHome(0);
    // Listen for tour active/inactive so we can freeze the rotation while the

    React.useEffect(() => { setIdx(0); }, [resolved.length]);

      if (resolved.length < 2 || tourActive) return;
      const id = setInterval(() => setIdx(i => (i + 1) % resolved.length), 5200);

    }, [resolved.length, tourActive]);

    const current = resolved[idx % resolved.length];

    // Rotating sub-line lives OUTSIDE the <h1> in a fixed-height slot so it

        {current && (
          <div style={{
            // Fixed height — never grows, never shrinks, regardless of message.

            margin:'0 0 12px',
            display:'flex', alignItems:'center',
            overflow:'hidden',

            <span

                lineHeight:1,
                color:'var(--text-sub)',
                display:'inline-block',
                whiteSpace:'nowrap',
                maxWidth:'100%',
                overflow:'hidden',
                textOverflow:'ellipsis',
                animation: tourActive ? 'none' : 'bs-hero-rotate 600ms cubic-bezier(.2,.7,.2,1) both'
              }}
            >{current}</span>
          </div>
        )}
      </div>
    );
  };

  const StartPlay = ({ compact: c = false }) => (
    <div id="tour-ai101-journey" onClick={() => goto && goto('course')} style={{
      background:'linear-gradient(180deg, var(--card), color-mix(in oklab, var(--accent) 8%, var(--card)))',
      border:'1px solid var(--accent-border)', borderRadius:'var(--radius-lg)',
      padding: c ? '18px 20px' : '20px 22px', position:'relative', overflow:'hidden', cursor:'pointer'
    }}>

        position:'absolute', top:-30, right:-30, width:140, height:140, borderRadius:'50%',

      }}/>

      <h3 style={{
        fontFamily:'var(--font-display)', fontSize: c ? 18 : 22, fontWeight:700, margin:'12px 0 4px',
        letterSpacing:'-0.02em', color:'var(--text)'
      }}>Module 01 · What is AI?</h3>
      <div style={{ fontSize:12, color:'var(--text-sub)', marginBottom:14 }}>12 min · 0 of 7 modules complete</div>

      }}>Draft a follow-up for your 3pm Acme call</h3>

        background:'var(--card-alt)', border:'1px dashed var(--border)',
        borderRadius:8, padding:'8px 10px', marginBottom:14
      }}>"You are a senior AE. Following up Acme call…"</div>

  // Build the "You" identity for cheers/comments — derives initials from

  const youName = user?.name || 'You';

  const CHEER_KINDS = [
    { id:'clap',   emoji:'👏', label:'Clap' },
    { id:'fire',   emoji:'🔥', label:'Fire' },
    { id:'rocket', emoji:'🚀', label:'Rocket' },
    { id:'mind',   emoji:'🤯', label:'Mind blown' },

  const FeedPanel = ({ count = FEED.length, header = true }) => {

    //   cheerListMap : { [i]: [{initials, name, ac, kind, time, mine?}, ...] }

          return (
          <div key={i} className="bs-fade" style={{
            background:'var(--card)', border:'1px solid var(--border)',
            borderRadius:'var(--radius)', padding:'14px 16px',

              </div>
              <div style={{ fontSize:12, color:'var(--text-sub)', marginBottom:8 }}>{f.detail}</div>

              {(cheerN > 0 || cmts.length > 0) && (
                <div style={{
                  display:'flex', alignItems:'center', gap:8, marginBottom:10, flexWrap:'wrap'

  const CurriculumPanel = () => {
    const ai101Ids = ['M01','M02','M03','M04','M05','M06','M07'];
    const moduleStates = ai101Ids.map((id, i) => {
      if (moduleProgress[id]?.done) return 'done';
      const lastDone = ai101Ids.reduceRight((acc, mid, j) => acc >= 0 ? acc : moduleProgress[mid]?.done ? j : -1, -1);
      if (i === lastDone + 1) return 'active';
      return 'locked';
    });
    const doneCount = moduleStates.filter(s => s === 'done').length;
    const ai101Done = doneCount === ai101Ids.length;

    const courses = [
      { code:'AI 101', label:'Foundations', state: ai101Done ? 'done' : 'active', frac:`${doneCount}/7`, pct: doneCount/7 },
      { code:'AI 201', label:'Craft',       state: ai101Done ? 'active' : 'locked', frac:'0/8', pct: 0 },
      { code:'AI 301', label:'Workflows',   state:'locked', frac:'0/10', pct: 0 },
    ];

    return (
      <Card padding={16} style={{ display:'flex', flexDirection:'column', gap:14 }}>
        {/* Course progression */}
        <div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <Kicker>Curriculum</Kicker>
            <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-sub)' }}>1 / 3 courses</span>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {courses.map(c => {
              const isLocked = c.state === 'locked';
              const isDone = c.state === 'done';
              const accent = isDone ? 'var(--green)' : c.state === 'active' ? 'var(--accent)' : 'var(--text-dim)';
              return (
                <div key={c.code} style={{ opacity: isLocked ? 0.55 : 1 }}>
                  <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', gap:8, marginBottom:4 }}>
                    <span style={{ fontFamily:'var(--font-mono)', fontSize:10.5, fontWeight:700, color: accent }}>
                      {c.code} · {c.label}
                    </span>
                    <span style={{ fontFamily:'var(--font-mono)', fontSize:10.5, color:'var(--text-sub)', flexShrink:0 }}>{c.frac}</span>
                  </div>
                  <div style={{
                    height:4, borderRadius:999, background:'var(--card-alt)',
                    border:'1px solid var(--border)', overflow:'hidden'
                  }}>
                    <div style={{
                      width:`${Math.max(0, Math.min(100, c.pct*100))}%`, height:'100%', background: accent
                    }}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Module progression for the active course */}
        <div style={{ borderTop:'1px solid var(--border)', paddingTop:12 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <Kicker>AI 101 · Modules</Kicker>
            <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-sub)' }}>{doneCount} / 7</span>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            {moduleStates.map((s, i) => {
              const bg = s === 'done' ? 'var(--green)' : s === 'active' ? 'var(--accent)' : 'var(--card-alt)';
              const border = s === 'done' ? 'var(--green)' : s === 'active' ? 'var(--accent)' : 'var(--border)';
              return (
                <div key={i} title={`M0${i+1}`} style={{
                  flex:1, height:22, borderRadius:5, background:bg,
                  border:`1px solid ${border}`,
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontFamily:'var(--font-mono)', fontSize:9.5, fontWeight:700,
                  color: s === 'locked' ? 'var(--text-dim)' : '#fff'

          <div style={{ fontSize:11.5, color:'var(--text-sub)', marginTop:10, lineHeight:1.4 }}>
            {ai101Done ? 'AI 101 cleared. AI 201 unlocked.' : `${7 - doneCount} modules to AI 101 graduate.`}

        </div>
      </Card>
    );

  <script type="text/babel">
// LESSON reader — novel pattern: AI margin commentary
const { useState: useStateLesson, useEffect: useEffectLesson, Fragment: FragmentL } = React;

// ── Tiny, dependency-free Markdown renderer ──────────────────────────────────
// Supports the subset our overview lessons need: H1/H2/H3, paragraphs, **bold**,
// *italic*, `inline code`, [links](url), - / 1. lists, GFM tables, > blockquotes,
// and --- horizontal rules. Output is structured React, not dangerouslySetInner.
const renderInline = (text, keyBase = 'i') => {
  // Tokenize inline patterns. Order matters: code → bold → italic → link.
  const out = [];
  let i = 0; let buf = '';
  const flush = () => { if (buf) { out.push(buf); buf = ''; } };
  while (i < text.length) {
    const rest = text.slice(i);
    // inline code
    let m = /^`([^`]+)`/.exec(rest);
    if (m) {
      flush();
      out.push(<code key={`${keyBase}-${out.length}`} style={{ fontFamily:'var(--font-mono)', fontSize:'0.92em', background:'var(--card-alt)', border:'1px solid var(--border)', padding:'1px 6px', borderRadius:5 }}>{m[1]}</code>);
      i += m[0].length; continue;
    }
    // bold **
    m = /^\*\*([^*]+)\*\*/.exec(rest);
    if (m) {
      flush();
      out.push(<strong key={`${keyBase}-${out.length}`} style={{ color:'var(--text)', fontWeight:700 }}>{renderInline(m[1], `${keyBase}-${out.length}b`)}</strong>);
      i += m[0].length; continue;
    }
    // italic *
    m = /^\*([^*]+)\*/.exec(rest);
    if (m) {
      flush();
      out.push(<em key={`${keyBase}-${out.length}`} style={{ fontStyle:'italic' }}>{m[1]}</em>);
      i += m[0].length; continue;
    }
    // link [text](url)
    m = /^\[([^\]]+)\]\(([^)]+)\)/.exec(rest);
    if (m) {
      flush();
      out.push(<a key={`${keyBase}-${out.length}`} href={m[2]} target="_blank" rel="noopener noreferrer" style={{ color:'var(--accent)', textDecoration:'underline', textDecorationThickness:1, textUnderlineOffset:3 }}>{m[1]}</a>);
      i += m[0].length; continue;
    }
    buf += text[i]; i++;
  }
  flush();
  return out;
};

const Markdown = ({ source }) => {
  const lines = source.replace(/\r\n/g, '\n').split('\n');
  const blocks = [];
  let i = 0;

  // Helpers
  const isTableSep = (s) => /^\s*\|?\s*:?-+:?\s*(\|\s*:?-+:?\s*)+\|?\s*$/.test(s);
  const splitTableRow = (s) => s.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map(c => c.trim());

  while (i < lines.length) {
    const line = lines[i];

    // Blank line — skip
    if (!line.trim()) { i++; continue; }

    // Horizontal rule
    if (/^\s*---+\s*$/.test(line)) {
      blocks.push({ kind:'hr' });
      i++; continue;
    }

    // Headings
    let m = /^(#{1,6})\s+(.*)$/.exec(line);
    if (m) {
      blocks.push({ kind:'heading', level: m[1].length, text: m[2].trim() });
      i++; continue;
    }

    // Tables: header row + separator + N body rows
    if (line.includes('|') && i + 1 < lines.length && isTableSep(lines[i+1])) {
      const header = splitTableRow(line);
      i += 2;
      const rows = [];
      while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
        rows.push(splitTableRow(lines[i]));
        i++;
      }
      blocks.push({ kind:'table', header, rows });
      continue;
    }

    // Blockquote — collect consecutive `>` lines
    if (/^>\s?/.test(line)) {
      const buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) {
        buf.push(lines[i].replace(/^>\s?/, ''));
        i++;
      }
      blocks.push({ kind:'quote', text: buf.join('\n').trim() });
      continue;
    }

    // Unordered list
    if (/^\s*[-*]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*[-*]\s+/, ''));
        i++;
      }
      blocks.push({ kind:'ul', items });
      continue;
    }

    // Ordered list
    if (/^\s*\d+\.\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*\d+\.\s+/, ''));
        i++;
      }
      blocks.push({ kind:'ol', items });
      continue;
    }

    // Paragraph — collect until blank line / structural
    const buf = [line];
    i++;
    while (i < lines.length && lines[i].trim() && !/^(#{1,6}\s|>\s?|\s*[-*]\s+|\s*\d+\.\s+|---+\s*$)/.test(lines[i]) && !(lines[i].includes('|') && i+1 < lines.length && isTableSep(lines[i+1]))) {
      buf.push(lines[i]);
      i++;
    }
    blocks.push({ kind:'p', text: buf.join(' ').trim() });
  }

  // Render
  const headingStyle = (lvl) => ({
    fontFamily:'var(--font-display)', fontWeight:700, letterSpacing:'-0.02em',
    color:'var(--text)',
    fontSize: lvl === 1 ? 36 : lvl === 2 ? 26 : lvl === 3 ? 19 : 16,
    margin: lvl === 1 ? '0 0 18px' : lvl === 2 ? '40px 0 14px' : '28px 0 10px',
    lineHeight: lvl === 1 ? 1.1 : 1.25
  });

  return (
    <div style={{ color:'var(--text-sub)', fontSize:15.5, lineHeight:1.7 }}>
      {blocks.map((b, k) => {
        switch (b.kind) {
          case 'heading':
            return <h1 key={k} style={headingStyle(b.level)}>{renderInline(b.text, `h-${k}`)}</h1>;
          case 'p':
            return <p key={k} style={{ margin:'0 0 16px', maxWidth:'68ch' }}>{renderInline(b.text, `p-${k}`)}</p>;
          case 'hr':
            return <hr key={k} style={{ border:'none', borderTop:'1px solid var(--border)', margin:'32px 0' }} />;
          case 'ul':
            return (
              <ul key={k} style={{ margin:'4px 0 18px', paddingLeft:22, maxWidth:'68ch' }}>
                {b.items.map((t, j) => <li key={j} style={{ margin:'6px 0' }}>{renderInline(t, `li-${k}-${j}`)}</li>)}
              </ul>
            );
          case 'ol':
            return (
              <ol key={k} style={{ margin:'4px 0 18px', paddingLeft:22, maxWidth:'68ch' }}>
                {b.items.map((t, j) => <li key={j} style={{ margin:'6px 0' }}>{renderInline(t, `oli-${k}-${j}`)}</li>)}
              </ol>
            );
          case 'quote':
            return (
              <blockquote key={k} style={{
                borderLeft:'3px solid var(--accent)', paddingLeft:14, margin:'18px 0',
                color:'var(--text)', fontStyle:'italic', maxWidth:'68ch'
              }}>{renderInline(b.text, `q-${k}`)}</blockquote>
            );
          case 'table':
            return (
              <div key={k} style={{ margin:'18px 0 24px', overflow:'auto', borderRadius:'var(--radius-md)', border:'1px solid var(--border)' }}>
                <table style={{ width:'100%', borderCollapse:'collapse', fontSize:14 }}>
                  <thead>
                    <tr style={{ background:'var(--card-alt)' }}>
                      {b.header.map((h, j) => (
                        <th key={j} style={{ textAlign:'left', padding:'10px 14px', fontWeight:700, color:'var(--text)', borderBottom:'1px solid var(--border)' }}>
                          {renderInline(h, `th-${k}-${j}`)}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {b.rows.map((row, rj) => (
                      <tr key={rj} style={{ borderTop: rj === 0 ? 'none' : '1px solid var(--border)' }}>
                        {row.map((c, cj) => (
                          <td key={cj} style={{ padding:'10px 14px', color: cj === 0 ? 'var(--text)' : 'var(--text-sub)', verticalAlign:'top' }}>
                            {renderInline(c, `td-${k}-${rj}-${cj}`)}
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            );
          default: return null;
        }
      })}
    </div>
  );
};

// ── OverviewLesson — long-form readable view used for both "Start Here"
// (kind 'overview', no KC) and full reading-style lessons (kind 'reading',
// transitions to a knowledge check at the end). The `mode` prop swaps the
// eyebrow chip and the footer CTA copy; the body is identical.
const OverviewLesson = ({ lesson, moduleMeta, onComplete, openCoach, goto, completed, mode = 'overview' }) => {
  const { Btn, Pill, Kicker, ProgressBar } = window.BrPrim;
  const { IconArrowL, IconArrowR, IconSpark, IconClock, IconCheckCirc, IconBook, IconBolt } = window.BrIcons;
  const [scrollPct, setScrollPct] = useStateLesson(0);
  const scrollerRef = useRefLesson(null);

  // Track scroll progress through the document so the top progress bar shows
  // reading position rather than "section 1 of 1" — matches feel of stepped
  // lessons without the artifice of fake sections.
  React.useEffect(() => {
    const el = scrollerRef.current;
    if (!el) return;
    const onScroll = () => {
      const max = el.scrollHeight - el.clientHeight;
      const pct = max > 0 ? Math.min(100, Math.max(0, (el.scrollTop / max) * 100)) : 100;
      setScrollPct(pct);
    };
    onScroll();
    el.addEventListener('scroll', onScroll, { passive:true });
    return () => el.removeEventListener('scroll', onScroll);
  }, [lesson.id]);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      {/* Top bar — mirrors the stepped LessonScreen */}
      <div style={{
        padding:'14px 32px', borderBottom:'1px solid var(--border)', background:'var(--surface)',
        display:'flex', alignItems:'center', gap:14, flexShrink:0
      }}>
        <Btn onClick={() => goto && goto('course')} variant="ghost" icon={<IconArrowL size={13}/>} size="sm">Back to course</Btn>
        <div style={{ flex:1, display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontSize:11, fontFamily:'var(--font-mono)', color:'var(--text-sub)' }}>
            {Math.round(scrollPct)}% read
          </span>
          <div style={{ flex:1 }}><ProgressBar value={scrollPct} height={6} /></div>
          <span style={{ fontSize:11, color:'var(--text-sub)', display:'flex', alignItems:'center', gap:5 }}>
            <IconClock size={12} stroke="currentColor"/> ~{lesson.estimate} min read
          </span>
        </div>
        <Btn variant="ghost" size="sm" icon={<IconSpark size={12}/>} onClick={openCoach}>Ask coach</Btn>
      </div>

      {/* Body */}
      <div ref={scrollerRef} style={{ flex:1, overflow:'auto' }}>
        <div style={{ maxWidth: 760, margin:'0 auto', padding:'40px 40px 120px' }}>
          {/* Eyebrow */}
          <div style={{
            display:'flex', alignItems:'center', gap:10, marginBottom:18,
            color:'var(--text-sub)', fontSize:12, fontFamily:'var(--font-mono)',
            textTransform:'uppercase', letterSpacing:'0.12em'
          }}>
            {mode === 'overview' ? (
              <>
                <Pill bg="rgba(140,127,242,0.10)" border="rgba(140,127,242,0.30)" color="var(--accent)" icon={<IconBook size={10}/>}>Start Here</Pill>
                <span>{moduleMeta?.num || '00'} · Course Overview</span>
              </>
            ) : (
              <>
                <Pill bg="rgba(140,127,242,0.10)" border="rgba(140,127,242,0.30)" color="var(--accent)" icon={<IconBook size={10}/>}>Reading</Pill>
                <span>Module {moduleMeta?.num || lesson.id?.replace('M','')} · {moduleMeta?.group || ''}</span>
              </>
            )}
          </div>

          {/* Markdown body */}
          <Markdown source={lesson.markdown || ''} />

          {/* Footer CTA — large, centered call-to-action at the end of the read */}
          <div style={{
            marginTop:48, paddingTop:36, borderTop:'1px solid var(--border)',
            display:'flex', flexDirection:'column', alignItems:'center', gap:18, textAlign:'center'
          }}>
            <div style={{
              width:56, height:56, borderRadius:14, flexShrink:0,
              background: completed
                ? 'color-mix(in oklab, var(--green) 14%, var(--card-alt))'
                : 'linear-gradient(135deg, var(--accent-light), color-mix(in oklab, var(--accent) 18%, var(--card)))',
              border: `1px solid ${completed ? 'rgba(76,254,200,0.35)' : 'var(--accent-border)'}`,
              display:'flex', alignItems:'center', justifyContent:'center'
            }}>
              {completed
                ? <IconCheckCirc size={24} stroke="var(--green)"/>
                : (mode === 'overview'
                    ? <IconBolt size={22} stroke="var(--accent)"/>
                    : <IconSpark size={22} stroke="var(--accent)"/>)}
            </div>

            <div style={{ maxWidth:520 }}>
              <div style={{
                fontFamily:'var(--font-display)', fontSize:22, fontWeight:700,
                color:'var(--text)', letterSpacing:'-0.02em', lineHeight:1.2, marginBottom:8
              }}>
                {mode === 'overview'
                  ? (completed ? "You've finished this overview." : "Ready to begin?")
                  : (completed ? "You've already cleared this module." : "Finished reading?")}
              </div>
              <div style={{ fontSize:13.5, color:'var(--text-sub)', lineHeight:1.55 }}>
                {mode === 'overview'
                  ? (completed
                      ? "Module 01 is unlocked. You can revisit this overview any time."
                      : "Marking this complete will unlock Module 01 · What is AI?")
                  : (completed
                      ? "You can revisit this lesson or retake the knowledge check any time."
                      : "Next up: a 10-question knowledge check. ~10\u201315 minutes.")}
              </div>
            </div>

            <div style={{ display:'flex', gap:10, flexWrap:'wrap', justifyContent:'center', marginTop:4 }}>
              <Btn variant="ghost" size="md" onClick={() => goto && goto('course')}>Back to course</Btn>
              <Btn
                size="lg"
                icon={mode === 'reading'
                  ? <IconBolt size={14}/>

                onClick={() => onComplete && onComplete()}
              >
                {mode === 'overview'
                  ? (completed ? 'Continue to Module 01' : "I've read this · Continue")
                  : (completed ? 'Retake knowledge check' : 'Take knowledge check')}
              </Btn>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

const { useRef: useRefLesson } = React;

const LessonScreen = ({ onComplete, openCoach, gamification, density, goto, moduleId = 'M01', user, moduleProgress = {}, completeOverview }) => {
  const { Card, Pill, Kicker, Btn, ProgressBar } = window.BrPrim;
  const { IconArrowR, IconArrowL, IconSpark, IconLightbulb, IconQuote, IconClock, IconBolt, IconMsg } = window.BrIcons;
  const { LESSON_BY_MODULE, MODULES_AI101 } = window.BrData;
  const lesson = LESSON_BY_MODULE[moduleId] || LESSON_BY_MODULE.M01;
  const moduleMeta = MODULES_AI101.find(m => m.id === moduleId);
  const compact = density === 'compact';

  // Overview-kind lessons (e.g. M00 · Course Overview) are long-form readable
  // documents, not stepped slide lessons. They have no knowledge check —
  // finishing the read marks the module complete directly via completeOverview.
  // Reading-kind lessons share the same renderer but route to a knowledge check
  // on completion, just like stepped lessons do.
  if (lesson?.kind === 'overview' || lesson?.kind === 'reading') {
    const completed = !!moduleProgress[moduleId]?.done;
    const isReading = lesson.kind === 'reading';
    return (
      <OverviewLesson
        lesson={lesson}
        moduleMeta={moduleMeta}
        completed={completed}
        openCoach={openCoach}
        goto={goto}
        mode={isReading ? 'reading' : 'overview'}
        onComplete={() => {
          if (isReading) {
            if (onComplete) onComplete();
          } else if (completeOverview) {
            completeOverview(moduleId);
          } else if (goto) {
            goto('course');
          }
        }}
      />
    );
  }

  const [section, setSection] = useStateLesson(0);
  const [marginOpen, setMarginOpen] = useStateLesson(true);

  // Reset to first section when switching modules.
  useEffectLesson(() => { setSection(0); }, [moduleId]);

  const totalSections = lesson.sections.length;
  const sec = lesson.sections[section];
  const isLast = section === totalSections - 1;
  const progress = Math.round((section + 1) / totalSections * 100);

  const renderRich = (text) => {
    const parts = text.split(/(\*\*[^*]+\*\*)/g);
    return parts.map((part, i) => {
      if (part.startsWith('**') && part.endsWith('**')) {
        return <strong key={i} style={{ color: 'var(--text)', fontWeight: 700 }}>{part.slice(2, -2)}</strong>;
      }
      return <FragmentL key={i}>{part}</FragmentL>;
    });
  };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      {/* Top progress strip */}
      <div style={{
        padding: '14px 32px', borderBottom: '1px solid var(--border)', background: 'var(--surface)',
        display: 'flex', alignItems: 'center', gap: 14, flexShrink: 0
      }}>
        <Btn onClick={() => goto && goto('course')} variant="ghost" icon={<IconArrowL size={13} />} size="sm">Back to course</Btn>
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--text-sub)' }}>
            {section + 1} / {totalSections}

                        return <>{`> You are a ${role}…`}<br/>{`> Task: 5-bullet pre-call brief…`}<br/><span style={{color:'var(--accent-2)'}}>{`> Context: Acme · Discovery · CFO joining · prior objection: pilot scope`}</span><br/>{`> Format: bullets, max 8 words…`}</>;

  <script type="text/babel">
// KNOWLEDGE CHECK with multi-question support across all 7 modules.
// Question types: 'mc' (single choice), 'multi' (multiple correct), 'free' (rubric-graded)
const { useState: useStateCheck, useEffect: useEffectCheck } = React;

const CheckScreen = ({ onComplete, gamification, moduleId = 'M04' }) => {
  const { Card, Pill, Btn, Kicker, ProgressBar } = window.BrPrim;
  const { IconArrowR, IconArrowL, IconCheck, IconClose, IconSpark, IconBolt, IconCheckCirc, IconAlert, IconCircle } = window.BrIcons;
  const { KC_BY_MODULE, KC_META } = window.BrKC;

  const PASS_THRESHOLD = 80;

  const KC = KC_BY_MODULE[moduleId] || KC_BY_MODULE.M04;
  const meta = KC_META[moduleId] || KC_META.M04;

  const [idx, setIdx] = useStateCheck(0);
  const [answers, setAnswers] = useStateCheck({});      // {qid: index | indices[] | text}
  const [submitted, setSubmitted] = useStateCheck({});  // {qid: true}
  const [grading, setGrading] = useStateCheck(false);
  const [grade, setGrade] = useStateCheck({});          // {qid: {checks, hitCount, total}}
  const [freeInput, setFreeInput] = useStateCheck('');
  const [phase, setPhase] = useStateCheck('quiz');      // 'quiz' | 'result'
  const [finalScore, setFinalScore] = useStateCheck(0);
  const [attempt, setAttempt] = useStateCheck(1);

  // Reset progress when the active module changes (driven by Tweaks select).
  useEffectCheck(() => {
    setIdx(0);
    setAnswers({});
    setSubmitted({});
    setGrade({});
    setGrading(false);
    setFreeInput('');
    setPhase('quiz');
    setFinalScore(0);
    setAttempt(1);
  }, [moduleId]);

  const q = KC[idx];
  const isMC = q.type === 'mc';
  const isMulti = q.type === 'multi';
  const isFree = q.type === 'free';
  const submittedThis = submitted[q.id];
  const isLast = idx === KC.length - 1;

  // For multi: answers[q.id] is array of selected indices
  const multiSelected = isMulti ? (answers[q.id] || []) : [];

  const choose = (i) => {
    if (submittedThis) return;
    if (isMC) {
      setAnswers({ ...answers, [q.id]: i });
    } else if (isMulti) {
      const cur = answers[q.id] || [];
      const next = cur.includes(i) ? cur.filter(x => x !== i) : [...cur, i];
      setAnswers({ ...answers, [q.id]: next });
    }
  };

  const submit = () => {
    if (isMC || isMulti) {
      setSubmitted({ ...submitted, [q.id]: true });
    } else if (isFree) {
      const text = freeInput.trim();
      if (!text) return;
      setAnswers({ ...answers, [q.id]: text });
      setGrading(true);
      setTimeout(() => {
        const t = text.toLowerCase();
        const checks = q.rubric.map(r => {
          const keys = r.toLowerCase().match(/\b\w{4,}\b/g) || [];
          const hits = keys.filter(k => t.includes(k.slice(0,4)));
          // Bonus: longer answers (>120 chars) more likely to hit nuance criteria
          const lengthHelp = text.length > 120 ? 0 : -1;
          return { rubric:r, hit: hits.length + (lengthHelp >= 0 ? 1 : 0) >= 2 || hits.length >= 2 };
        });
        const hitCount = checks.filter(c => c.hit).length;
        setGrade({ ...grade, [q.id]: { checks, hitCount, total:q.rubric.length } });
        setSubmitted({ ...submitted, [q.id]: true });
        setGrading(false);
      }, 1300);
    }
  };

  const computeScore = () => {
    // Per-question points: MC/multi = 1 if correct, else 0.
    // Free response = hitCount / total (partial credit).
    let earned = 0;
    let possible = 0;
    KC.forEach(qq => {
      possible += 1;
      if (qq.type === 'mc') {
        if (answers[qq.id] === qq.correctIndex) earned += 1;
      } else if (qq.type === 'multi') {
        const a = [...(answers[qq.id] || [])].sort();
        const c = [...(qq.correctIndices || [])].sort();
        if (a.length && JSON.stringify(a) === JSON.stringify(c)) earned += 1;
      } else if (qq.type === 'free') {
        const g = grade[qq.id];
        if (g && g.total) earned += g.hitCount / g.total;
      }
    });
    if (!possible) return 0;
    return Math.round((earned / possible) * 100);
  };

  const next = () => {
    if (isLast) {
      const s = computeScore();
      setFinalScore(s);
      setPhase('result');
    }
    else { setIdx(idx + 1); setFreeInput(''); }
  };

  const retake = () => {
    setIdx(0);
    setAnswers({});
    setSubmitted({});
    setGrade({});
    setGrading(false);
    setFreeInput('');
    setPhase('quiz');
    setAttempt(a => a + 1);
  };

  const prev = () => { if (idx > 0) { setIdx(idx-1); setFreeInput(''); } };

  // Compute correctness for MC + multi
  const mcCorrect    = isMC    && submittedThis && answers[q.id] === q.correctIndex;
  const multiCorrect = isMulti && submittedThis &&
    JSON.stringify([...(answers[q.id]||[])].sort()) === JSON.stringify([...q.correctIndices].sort());
  const correct = mcCorrect || multiCorrect;

  // Submit gate per type
  const canSubmit =
    isMC    ? answers[q.id] !== undefined :
    isMulti ? (answers[q.id] || []).length > 0 :
    isFree  ? !!freeInput.trim() : false;

  // Helper for option labels
  const optLetter = (i) => String.fromCharCode(65+i);

  // Per-question correctness summary for the result screen
  const questionResults = KC.map(qq => {
    if (qq.type === 'mc') {
      return { q: qq, correct: answers[qq.id] === qq.correctIndex, partial: false };
    } else if (qq.type === 'multi') {
      const a = [...(answers[qq.id] || [])].sort();
      const c = [...(qq.correctIndices || [])].sort();
      return { q: qq, correct: a.length > 0 && JSON.stringify(a) === JSON.stringify(c), partial: false };
    } else {
      const g = grade[qq.id];
      const ratio = g && g.total ? g.hitCount / g.total : 0;
      return { q: qq, correct: ratio >= 0.7, partial: ratio > 0 && ratio < 0.7, ratio };
    }
  });
  const correctCount = questionResults.filter(r => r.correct).length;

  if (phase === 'result') {
    const passed = finalScore >= PASS_THRESHOLD;
    const accent = passed ? 'var(--green)' : 'var(--accent)';
    const accentLight = passed ? 'var(--green-light)' : 'var(--accent-light)';
    const accentBorder = passed ? 'var(--green-border)' : 'var(--accent-border)';

    return (
      <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
        <div style={{
          padding:'14px 32px', borderBottom:'1px solid var(--border)', background:'var(--surface)',
          display:'flex', alignItems:'center', gap:14, flexShrink:0
        }}>
          <Pill icon={<IconBolt size={11}/>}>Knowledge check · {moduleId}</Pill>
          <span style={{ fontSize:12, color:'var(--text-sub)', fontWeight:600 }}>{meta.title}</span>
          <span style={{ flex:1 }}/>
          <span style={{
            fontSize:11, fontFamily:'var(--font-mono)', color:'var(--text-sub)',
            letterSpacing:'.06em', textTransform:'uppercase', fontWeight:700
          }}>
            {passed ? 'Result' : `Attempt ${attempt}`}
          </span>
        </div>

        <div style={{ flex:1, overflow:'auto' }}>
          <div style={{ maxWidth:760, margin:'0 auto', padding:'56px 40px 80px' }} className="bs-fade">
            {/* Score hero */}
            <div style={{
              background: accentLight, border:`1px solid ${accentBorder}`,
              borderRadius:'calc(var(--radius) + 4px)', padding:'32px 36px',
              display:'flex', alignItems:'center', gap:24, marginBottom:28
            }}>
              <div style={{
                width:88, height:88, borderRadius:'50%', flexShrink:0,
                background:'var(--card)', border:`1.5px solid ${accentBorder}`,
                display:'flex', alignItems:'center', justifyContent:'center',
                boxShadow:`0 0 0 6px color-mix(in oklab, ${accent === 'var(--green)' ? '#4CFEC8' : '#3CAFF2'} 8%, transparent)`
              }}>
                {passed
                  ? <IconCheckCirc size={42} stroke={accent}/>
                  : <IconAlert size={36} stroke={accent}/>}
              </div>
              <div style={{ flex:1 }}>
                <Kicker>{passed ? 'Knowledge check passed' : 'Not quite there yet'}</Kicker>
                <div style={{
                  display:'flex', alignItems:'baseline', gap:10, marginTop:8,
                  fontFamily:'var(--font-mono)'
                }}>
                  <span style={{
                    fontSize:48, fontWeight:700, color:'var(--text)',
                    letterSpacing:'-0.03em', lineHeight:1
                  }}>{finalScore}</span>
                  <span style={{ fontSize:18, color:'var(--text-sub)' }}>/ 100</span>
                  <span style={{
                    marginLeft:8, fontSize:12, color:'var(--text-sub)',
                    letterSpacing:'.04em'
                  }}>
                    {correctCount} of {KC.length} correct
                  </span>
                </div>
                <div style={{
                  marginTop:10, fontSize:13, color:'var(--text)', lineHeight:1.55, maxWidth:480
                }}>
                  {passed
                    ? `You cleared the ${PASS_THRESHOLD}% bar. Module ${moduleId.replace('M','')} is yours — the next module unlocks now.`
                    : `You need ${PASS_THRESHOLD}% to pass and unlock the next module. Review the questions you missed and try again.`}
                </div>
              </div>
            </div>

            {/* Question-by-question summary */}
            <div style={{
              fontFamily:'var(--font-mono)', fontSize:11, letterSpacing:'.08em',
              textTransform:'uppercase', color:'var(--text-sub)', fontWeight:700, marginBottom:12
            }}>
              Question Breakdown
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:32 }}>
              {questionResults.map((r, i) => {
                const ok = r.correct;
                const partial = r.partial;
                const dotBg = ok ? 'var(--green-light)' : partial ? 'var(--accent-light)' : 'rgba(248,113,113,0.10)';
                const dotBd = ok ? 'var(--green-border)' : partial ? 'var(--accent-border)' : 'rgba(248,113,113,0.4)';
                const dotIcon = ok
                  ? <IconCheck size={12} stroke="var(--green)"/>
                  : partial
                    ? <IconCircle size={10} stroke="var(--accent)"/>
                    : <IconClose size={12} stroke="rgba(248,113,113,1)"/>;
                return (
                  <button key={r.q.id} onClick={() => { setIdx(i); setPhase('quiz'); }}
                    style={{
                      display:'flex', alignItems:'center', gap:14, padding:'12px 14px',
                      background:'var(--card)', border:'1px solid var(--border)',
                      borderRadius:'var(--radius)', textAlign:'left', cursor:'pointer',
                      fontFamily:'inherit', color:'var(--text)', transition:'all .15s'
                    }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--border-strong)'}
                    onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
                  >
                    <span style={{
                      width:24, height:24, borderRadius:6, flexShrink:0,
                      background:dotBg, border:`1px solid ${dotBd}`,
                      display:'flex', alignItems:'center', justifyContent:'center'
                    }}>
                      {dotIcon}
                    </span>
                    <span style={{
                      fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-sub)',
                      width:32, flexShrink:0
                    }}>
                      Q{i+1}
                    </span>
                    <span style={{ fontSize:13.5, lineHeight:1.45, flex:1 }}>
                      {r.q.question.split('\n')[0].slice(0, 96)}
                      {r.q.question.length > 96 ? '…' : ''}
                    </span>
                    <span style={{
                      fontSize:11, fontFamily:'var(--font-mono)',
                      color: ok ? 'var(--green)' : partial ? 'var(--accent)' : 'var(--text-dim)',
                      letterSpacing:'.04em', flexShrink:0
                    }}>
                      {ok ? 'Correct' : partial ? 'Partial' : 'Missed'}
                    </span>
                  </button>
                );
              })}
            </div>

            {/* Footer CTAs */}
            <div style={{ display:'flex', gap:12, alignItems:'center', justifyContent:'flex-end' }}>
              {!passed && (
                <span style={{ fontSize:12, color:'var(--text-sub)', flex:1 }}>
                  No penalty for retaking — your previous answers will be cleared.
                </span>
              )}
              {passed ? (
                <Btn onClick={() => onComplete(finalScore)} icon={<IconBolt size={13}/>}>
                  Continue
                </Btn>
              ) : (
                <Btn onClick={retake} icon={<IconArrowR size={13}/>}>
                  Retake knowledge check
                </Btn>
              )}
